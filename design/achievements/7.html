<style>
    .ach-root {
        padding: 2rem 0;
        max-width: 860px;
        margin: 0 auto;
        font-family: var(--font-sans);
    }

    .ach-header {
        margin-bottom: 2rem;
    }

    .ach-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--color-text-secondary);
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
    }

    .ach-label-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #22c55e;
    }

    .ach-title {
        font-size: 22px;
        font-weight: 500;
        color: var(--color-text-primary);
        margin: 0;
        line-height: 1.2;
    }

    .ach-title em {
        font-style: normal;
        color: var(--color-text-secondary);
        font-weight: 400;
    }

    .ach-grid {
        display: flex;
        flex-direction: column;
        gap: 1px;
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-lg);
        overflow: hidden;
    }

    .ach-item {
        background: var(--color-background-primary);
        padding: 1.1rem 1.25rem;
        display: grid;
        grid-template-columns: 36px 1fr auto;
        gap: 0 14px;
        align-items: start;
        border-bottom: 0.5px solid var(--color-border-tertiary);
        transition: background 0.15s;
        cursor: default;
    }

    .ach-item:last-child {
        border-bottom: none;
    }

    .ach-item:hover {
        background: var(--color-background-secondary);
    }

    .ach-medal {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 1px;
        font-size: 16px;
    }

    .ach-medal.gold {
        background: rgba(234, 179, 8, 0.12);
        border: 0.5px solid rgba(234, 179, 8, 0.3);
    }

    .ach-medal.silver {
        background: rgba(148, 163, 184, 0.12);
        border: 0.5px solid rgba(148, 163, 184, 0.3);
    }

    .ach-medal.bronze {
        background: rgba(180, 120, 80, 0.12);
        border: 0.5px solid rgba(180, 120, 80, 0.3);
    }

    .ach-medal svg {
        width: 17px;
        height: 17px;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .gold .ach-medal-icon {
        stroke: #ca8a04;
    }

    .silver .ach-medal-icon {
        stroke: #94a3b8;
    }

    .bronze .ach-medal-icon {
        stroke: #b47a50;
    }

    .ach-body {
        min-width: 0;
    }

    .ach-top {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 3px;
        flex-wrap: wrap;
    }

    .ach-name {
        font-size: 14px;
        font-weight: 500;
        color: var(--color-text-primary);
        line-height: 1.3;
    }

    .ach-badge {
        font-size: 10px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 999px;
        line-height: 1.6;
        white-space: nowrap;
    }

    .badge-gold {
        background: rgba(234, 179, 8, 0.1);
        color: #a16207;
        border: 0.5px solid rgba(234, 179, 8, 0.25);
    }

    .badge-silver {
        background: rgba(148, 163, 184, 0.12);
        color: var(--color-text-secondary);
        border: 0.5px solid rgba(148, 163, 184, 0.25);
    }

    .badge-bronze {
        background: rgba(180, 120, 80, 0.1);
        color: #92400e;
        border: 0.5px solid rgba(180, 120, 80, 0.25);
    }

    .ach-sub {
        font-size: 12px;
        color: var(--color-text-secondary);
        line-height: 1.5;
        margin-bottom: 8px;
    }

    .ach-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .ach-meta-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: var(--color-text-tertiary);
    }

    .ach-meta-item svg {
        width: 11px;
        height: 11px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
    }

    .ach-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
        flex-shrink: 0;
        padding-top: 2px;
    }

    .ach-year {
        font-size: 11px;
        color: var(--color-text-tertiary);
        white-space: nowrap;
    }

    .ach-links {
        display: flex;
        gap: 5px;
    }

    .ach-link {
        font-size: 11px;
        font-weight: 500;
        color: var(--color-text-secondary);
        text-decoration: none;
        padding: 4px 9px;
        border-radius: var(--border-radius-md);
        border: 0.5px solid var(--color-border-secondary);
        background: var(--color-background-secondary);
        white-space: nowrap;
        transition: color 0.15s, border-color 0.15s;
    }

    .ach-link:hover {
        color: var(--color-text-primary);
        border-color: var(--color-border-primary);
    }

    .ach-more-row {
        display: flex;
        justify-content: center;
        margin-top: 1rem;
    }

    .ach-more-btn {
        background: none;
        border: 0.5px solid var(--color-border-secondary);
        border-radius: 999px;
        padding: 7px 18px;
        font-size: 12px;
        font-weight: 500;
        color: var(--color-text-secondary);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: var(--font-sans);
        transition: color 0.15s, border-color 0.15s;
    }

    .ach-more-btn:hover {
        color: var(--color-text-primary);
        border-color: var(--color-border-primary);
    }

    .ach-more-btn svg {
        width: 12px;
        height: 12px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: transform 0.2s;
    }

    .ach-more-btn.open svg {
        transform: rotate(180deg);
    }
</style>

<div class="ach-root">
    <div class="ach-header">
        <div class="ach-label"><span class="ach-label-dot"></span>Achievements</div>
        <h2 class="ach-title">Recognition & <em>awards</em></h2>
    </div>
    <div class="ach-grid" id="achGrid"></div>
    <div class="ach-more-row" id="moreRow" style="display:none">
        <button class="ach-more-btn" id="moreBtn">
            <span id="moreTxt">Show more</span>
            <svg viewBox="0 0 24 24">
                <path d="M6 9l6 6 6-6" />
            </svg>
        </button>
    </div>
</div>

<script>
    const data = [
        { event: "UIU CSE Project Show · Spring '23", rank: "Champion", medal: "gold", title: "Kairos", sub: "Ranked 1st among 71 teams — DBMS Lab Project & Poster Presentation.", date: "May 2024", category: "DBMS Lab", team: "Team Kairos", link: "https://github.com/TashinParvez/Kairos", recog: "https://cse.uiu.ac.bd/projects/database-management-systems-laboratory-2/?rank=champion" },
        { event: "UIU CSE Project Show · Spring '25", rank: "1st Runner-Up", medal: "silver", title: "DirectEdge", sub: "Ranked 2nd among 55 teams in Software Engineering Lab.", date: "June 2025", category: "SE Lab", team: "Team DirectEdge", link: "https://github.com/TashinParvez/direct-edge", recog: "https://cse.uiu.ac.bd/projects/software-engineering-laboratory/?rank=1st-runner-up" },
        { event: "UIU CSE Project Show · Spring '23", rank: "2nd Runner-Up", medal: "bronze", title: "Wayout", sub: "Ranked 3rd among 66 teams for a polished tour-planning project.", date: "Apr 2023", category: "AOOP Lab", team: "Team Wayout", link: "https://github.com/TashinParvez/Wayout-The-Ultimate-Tour-Planner", recog: "" },
        { event: "UIU CSE Project Show · 2024", rank: "Champion", medal: "gold", title: "DBMS Poster", sub: "Won poster presentation through strong technical communication.", date: "May 2024", category: "Poster", team: "Team Kairos", link: "", recog: "" },
        { event: "United International University", rank: "Scholarship", medal: "silver", title: "Academic merit", sub: "Merit-based scholarships across 13 consecutive semesters.", date: "Ongoing", category: "Academic", team: "UIU", link: "", recog: "" }
    ];

    const INITIAL = 3;
    let open = false;
    const grid = document.getElementById('achGrid');
    const moreRow = document.getElementById('moreRow');
    const moreBtn = document.getElementById('moreBtn');
    const moreTxt = document.getElementById('moreTxt');

    const trophy = `<svg viewBox="0 0 24 24" class="ach-medal-icon"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v4a5 5 0 0 1-10 0V4z"/><path d="M17 6h2a2 2 0 0 1-2 5"/><path d="M7 6H5a2 2 0 0 0 2 5"/></svg>`;
    const medal = `<svg viewBox="0 0 24 24" class="ach-medal-icon"><circle cx="12" cy="14" r="6"/><path d="M8 8.7V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v4.7"/><path d="M12 11v3l1.5 1.5"/></svg>`;
    const award = `<svg viewBox="0 0 24 24" class="ach-medal-icon"><circle cx="12" cy="8" r="5"/><path d="M8.56 14.44L7 22l5-3 5 3-1.56-7.56"/></svg>`;
    const icons = { gold: trophy, silver: medal, bronze: award };

    const calIcon = `<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>`;
    const tagIcon = `<svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1.5"/></svg>`;
    const teamIcon = `<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;

    function render() {
        grid.innerHTML = '';
        const visible = open ? data : data.slice(0, INITIAL);
        visible.forEach(d => {
            const el = document.createElement('div');
            el.className = `ach-item ${d.medal}`;
            el.innerHTML = `
      <div class="ach-medal ${d.medal}">${icons[d.medal]}</div>
      <div class="ach-body">
        <div class="ach-top">
          <span class="ach-name">${d.title}</span>
          <span class="ach-badge badge-${d.medal}">${d.rank}</span>
        </div>
        <p class="ach-sub">${d.sub}</p>
        <div class="ach-meta">
          <span class="ach-meta-item">${calIcon}${d.date}</span>
          <span class="ach-meta-item">${tagIcon}${d.category}</span>
          <span class="ach-meta-item">${teamIcon}${d.team}</span>
        </div>
      </div>
      <div class="ach-right">
        <span class="ach-year">${d.event}</span>
        <div class="ach-links">
          ${d.link ? `<a class="ach-link" href="${d.link}" target="_blank" rel="noopener">Project ↗</a>` : ''}
          ${d.recog ? `<a class="ach-link" href="${d.recog}" target="_blank" rel="noopener">Recognition ↗</a>` : ''}
        </div>
      </div>
    `;
            grid.appendChild(el);
        });
        if (data.length > INITIAL) {
            moreRow.style.display = 'flex';
            moreBtn.classList.toggle('open', open);
            moreTxt.textContent = open ? 'Show less' : `Show ${data.length - INITIAL} more`;
        }
    }

    moreBtn.addEventListener('click', () => { open = !open; render(); });
    render();
</script>
