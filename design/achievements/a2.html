<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Achievements</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #050816 0%, #07101f 100%);
      color: #ffffff;
      min-height: 100vh;
      padding: 80px 20px;
    }

    .achievements-section {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-header {
      margin-bottom: 40px;
    }

    .section-tag {
      display: inline-block;
      color: #60a5fa;
      background: rgba(96, 165, 250, 0.08);
      border: 1px solid rgba(96, 165, 250, 0.2);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 14px;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .section-title {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f8fafc;
    }

    .section-subtitle {
      color: #94a3b8;
      font-size: 16px;
      max-width: 600px;
      line-height: 1.7;
    }

    .achievement-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .achievement-card {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(7, 16, 31, 0.98));
      border: 1px solid rgba(96, 165, 250, 0.14);
      border-radius: 22px;
      overflow: hidden;
      transition: 0.35s ease;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    .achievement-card:hover {
      transform: translateY(-8px);
      border-color: rgba(96, 165, 250, 0.35);
      box-shadow: 0 18px 40px rgba(37, 99, 235, 0.18);
    }

    .card-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 24px;
    }

    .achievement-rank {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(96, 165, 250, 0.25);
      color: #93c5fd;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 18px;
    }

    .achievement-title {
      font-size: 24px;
      line-height: 1.35;
      margin-bottom: 10px;
      color: #f8fafc;
    }

    .achievement-lab {
      color: #60a5fa;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 14px;
    }

    .achievement-date {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .achievement-project {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .achievement-team {
      color: #94a3b8;
      font-size: 15px;
    }

    @media (max-width: 768px) {
      .section-title {
        font-size: 32px;
      }

      .card-content {
        padding: 20px;
      }

      .achievement-title {
        font-size: 21px;
      }

      .achievement-project {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <section class="achievements-section">
    <div class="section-header">
      <div class="section-tag">Achievements</div>
      <h2 class="section-title">Achievements & Recognition</h2>
      <p class="section-subtitle">
        A few milestones that reflect my work, creativity, and collaboration throughout my academic and project journey.
      </p>
    </div>

    <div class="achievement-grid" id="achievementGrid"></div>
  </section>

  <script>
    const achievements = [
      {
        rank: "1st Runner-Up",
        title: "UIU CSE Project Show | Fall '24",
        lab: "Software Engineering Lab",
        date: "27 January 2025",
        project: "MediTouch",
        team: "Team Bcrypt",
        image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1200&q=80"
      },
      {
        rank: "Finalist",
        title: "Department Project Showcase",
        lab: "Software Development",
        date: "12 February 2025",
        project: "HealthSync",
        team: "Team Nexus",
        image: "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1200&q=80"
      },
      {
        rank: "Best Presentation",
        title: "Tech Innovation Fair",
        lab: "Project Exhibition",
        date: "18 March 2025",
        project: "EduTrack",
        team: "Team Quantum",
        image: "https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=1200&q=80"
      }
    ];

    const achievementGrid = document.getElementById("achievementGrid");

    achievements.forEach(item => {
      const card = document.createElement("div");
      card.className = "achievement-card";

      card.innerHTML = `
        <img src="${item.image}" alt="${item.project}" class="card-image">

        <div class="card-content">
          <span class="achievement-rank">${item.rank}</span>
          <h3 class="achievement-title">${item.title}</h3>
          <p class="achievement-lab">${item.lab}</p>
          <p class="achievement-date">${item.date}</p>
          <h4 class="achievement-project">${item.project}</h4>
          <p class="achievement-team">${item.team}</p>
        </div>
      `;

      achievementGrid.appendChild(card);
    });
  </script>

</body>
</html>
