<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Achievements</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap"
    rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #080b10;
      --line: rgba(255, 255, 255, 0.07);
      --line-2: rgba(255, 255, 255, 0.12);
      --text: #f1f5f9;
      --text-soft: #cbd5e1;
      --muted: #94a3b8;
      --accent: #63b3ed;
      --accent-2: #93c5fd;
      --green: #22c55e;
      --card: rgba(255, 255, 255, 0.03);
      --card-2: rgba(255, 255, 255, 0.02);
      --shadow: 0 18px 40px rgba(2, 8, 23, 0.28);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(99, 179, 237, 0.08), transparent 30%),
        radial-gradient(circle at 85% 85%, rgba(99, 179, 237, 0.05), transparent 26%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      padding: 80px 24px;
    }

    .achievements {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    .achievements::before {
      content: '';
      display: block;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line-2) 20%, var(--line-2) 80%, transparent);
      margin-bottom: 64px;
    }

    .achievements-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 32px;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .eyebrow-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.8);
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 4.5vw, 3.35rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.02;
      color: var(--text);
    }

    .section-title span {
      background: linear-gradient(135deg, #fff 0%, var(--accent-2) 60%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .head-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 16px;
    }

    .head-desc {
      max-width: 360px;
      font-size: 0.9rem;
      line-height: 1.85;
      color: var(--muted);
      text-align: right;
    }

    .achievements-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent-2);
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid rgba(99, 179, 237, 0.2);
      background: rgba(99, 179, 237, 0.06);
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(99, 179, 237, 0.8);
    }

    .achievement-wrap {
      overflow: hidden;
      transition: max-height 0.65s cubic-bezier(.22, 1, .36, 1);
    }

    .achievement-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: stretch;
    }

    .achievement-card {
      position: relative;
      display: grid;
      grid-template-columns: 142px 1fr;
      gap: 18px;
      min-height: 245px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.028), rgba(255, 255, 255, 0.018)),
        var(--card-2);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition:
        transform .28s ease,
        border-color .28s ease,
        background .28s ease,
        box-shadow .28s ease;
      opacity: 0;
      transform: translateY(18px);
      animation: cardIn .7s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    .achievement-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(99, 179, 237, 0.10), transparent 30%),
        linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.015));
      pointer-events: none;
    }

    .achievement-card:hover {
      transform: translateY(-4px);
      border-color: rgba(99, 179, 237, 0.2);
      box-shadow: 0 18px 42px rgba(99, 179, 237, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.038), rgba(255, 255, 255, 0.02)),
        var(--card);
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-media {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
      min-height: 100%;
      background:
        linear-gradient(180deg, rgba(99, 179, 237, 0.12), rgba(15, 23, 42, 0.6)),
        #0f172a;
    }

    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.02) contrast(1.02);
    }

    .card-rank {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #dbeafe;
      background: rgba(8, 11, 16, 0.76);
      border: 1px solid rgba(147, 197, 253, 0.2);
      backdrop-filter: blur(10px);
    }

    .card-rank::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(99, 179, 237, 0.85);
    }

    .card-body {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .top-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .meta-chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.025);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.56);
      white-space: nowrap;
    }

    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.38rem;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .card-subtitle {
      font-size: 0.93rem;
      line-height: 1.7;
      color: var(--text-soft);
      max-width: 95%;
      margin-bottom: 18px;
    }

    .card-details {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 16px;
      margin-bottom: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .detail-item {
      min-width: 0;
    }

    .detail-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.24);
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--text-soft);
      word-break: break-word;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
      margin-bottom: 18px;
    }

    .skill-tag {
      font-size: 11px;
      font-weight: 500;
      color: #dbeafe;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(99, 179, 237, 0.16);
      background: rgba(99, 179, 237, 0.07);
      white-space: nowrap;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--text);
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.025);
      transition:
        color .22s ease,
        border-color .22s ease,
        background .22s ease,
        transform .22s ease;
    }

    .link-btn:hover {
      color: var(--accent-2);
      border-color: rgba(99, 179, 237, 0.22);
      background: rgba(99, 179, 237, 0.05);
      transform: translateY(-2px);
    }

    .link-btn.primary {
      color: #0f172a;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      border: none;
    }

    .link-btn.primary:hover {
      color: #0f172a;
      box-shadow: 0 10px 28px rgba(99, 179, 237, 0.22);
    }

    .actions-wrap {
      display: flex;
      justify-content: center;
      margin-top: 28px;
    }

    .more-btn {
      border: 1px solid rgba(99, 179, 237, 0.18);
      background: rgba(99, 179, 237, 0.06);
      color: var(--accent-2);
      border-radius: 999px;
      padding: 11px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition:
        transform .22s ease,
        border-color .22s ease,
        background .22s ease,
        color .22s ease;
    }

    .more-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(99, 179, 237, 0.28);
      background: rgba(99, 179, 237, 0.08);
      color: #e2efff;
    }

    .more-btn svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform .28s ease;
    }

    .more-btn.expanded svg {
      transform: rotate(180deg);
    }

    .bottom-rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line-2) 20%, var(--line-2) 80%, transparent);
      margin-top: 64px;
    }

    @media (max-width: 940px) {
      .achievement-card {
        grid-template-columns: 120px 1fr;
      }
    }

    @media (max-width: 820px) {
      .achievements-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 22px;
      }

      .head-right {
        align-items: flex-start;
      }

      .head-desc {
        text-align: left;
      }

      .achievement-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 580px) {
      body {
        padding: 72px 18px;
      }

      .achievement-card {
        grid-template-columns: 1fr;
        padding: 16px;
        border-radius: 20px;
      }

      .card-media {
        min-height: 180px;
      }

      .card-details {
        grid-template-columns: 1fr;
      }

      .card-title {
        font-size: 1.24rem;
      }

      .card-subtitle {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

  <section class="achievements" id="achievements">
    <div class="achievements-head">
      <div>
        <div class="eyebrow"><span class="eyebrow-dot"></span>Achievements</div>
        <h2 class="section-title">Built with intent.<br><span>Recognized with results.</span></h2>
      </div>

      <div class="head-right">
        <p class="head-desc">
          A selection of product, project, and academic milestones that reflect execution quality,
          team contribution, and consistent performance.
        </p>
        <span class="achievements-badge"><span class="badge-dot"></span>Selected recognitions</span>
      </div>
    </div>

    <div class="achievement-wrap" id="achievementWrap">
      <div class="achievement-grid" id="achievementGrid"></div>
    </div>

    <div class="actions-wrap" id="actionWrap" hidden>
      <button class="more-btn" id="toggleBtn" type="button" aria-expanded="false">
        <span id="toggleBtnText">Show more</span>
        <svg viewBox="0 0 24 24">
          <path d="M6 9l6 6 6-6"></path>
        </svg>
      </button>
    </div>

    <div class="bottom-rule"></div>
  </section>

  <script>
    const achievements = [
      {
        rank: "Champion",
        title: "Kairos",
        subtitle: "DBMS lab project focused on delivering a well-structured, competition-ready product backed by strong presentation clarity.",
        date: "2024",
        teamName: "Team Kairos",
        image: "https://images.unsplash.com/photo-1552664730-d307ca884978?q=80&w=1200&auto=format&fit=crop",
        organization: "UIU CSE Project Show",
        category: "Project Show / DBMS Lab",
        skills: ["Product Thinking", "DBMS", "Presentation"],
        projectLink: "https://github.com/TashinParvez/Kairos",
        recognitionLink: "https://cse.uiu.ac.bd/projects/database-management-systems-laboratory-2/?rank=champion"
      },
      {
        rank: "1st Runner-Up",
        title: "DirectEdge",
        subtitle: "Software engineering lab project recognized for strong execution, system thinking, and polished end-to-end delivery.",
        date: "2025",
        teamName: "Team DirectEdge",
        image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop",
        organization: "UIU CSE Project Show",
        category: "Software Engineering Lab",
        skills: ["Product Strategy", "Software Design", "Teamwork"],
        projectLink: "https://github.com/TashinParvez/direct-edge",
        recognitionLink: "https://cse.uiu.ac.bd/projects/software-engineering-laboratory/?rank=1st-runner-up"
      },
      {
        rank: "2nd Runner-Up",
        title: "Wayout",
        subtitle: "A tour planning project that stood out for concept quality, implementation depth, and overall product presentation.",
        date: "2023",
        teamName: "Team Wayout",
        image: "https://images.unsplash.com/photo-1488646953014-85cb44e25828?q=80&w=1200&auto=format&fit=crop",
        organization: "UIU CSE Project Show",
        category: "AOOP Lab Project",
        skills: ["Problem Solving", "OOP", "UX Thinking"],
        projectLink: "https://github.com/TashinParvez/Wayout-The-Ultimate-Tour-Planner",
        recognitionLink: ""
      },
      {
        rank: "Merit Scholarship",
        title: "Academic Excellence",
        subtitle: "Awarded repeated merit-based scholarships through consistent academic performance across multiple semesters.",
        date: "Ongoing",
        teamName: "United International University",
        image: "https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1200&auto=format&fit=crop",
        organization: "United International University",
        category: "Academic Achievement",
        skills: ["Consistency", "Discipline", "Performance"],
        projectLink: "",
        recognitionLink: ""
      },
      {
        rank: "100% Scholarship",
        title: "Six-Time Full Scholarship",
        subtitle: "Received a 100% merit-based scholarship six times for outstanding academic results and sustained excellence.",
        date: "Multiple Semesters",
        teamName: "UIU",
        image: "https://images.unsplash.com/photo-1455390582262-044cdead277a?q=80&w=1200&auto=format&fit=crop",
        organization: "United International University",
        category: "Academic Achievement",
        skills: ["Academic Excellence", "Focus", "Discipline"],
        projectLink: "",
        recognitionLink: ""
      },
      {
        rank: "50% Scholarship",
        title: "Two-Time Merit Scholarship",
        subtitle: "Earned a 50% scholarship across two semesters through strong academic consistency and measurable results.",
        date: "Multiple Semesters",
        teamName: "UIU",
        image: "https://images.unsplash.com/photo-1523240795612-9a054b0db644?q=80&w=1200&auto=format&fit=crop",
        organization: "United International University",
        category: "Academic Achievement",
        skills: ["Commitment", "Performance", "Consistency"],
        projectLink: "",
        recognitionLink: ""
      },
      {
        rank: "25% Scholarship",
        title: "Four-Time Merit Scholarship",
        subtitle: "Awarded a 25% merit scholarship in four semesters as part of a long track record of academic performance.",
        date: "Multiple Semesters",
        teamName: "UIU",
        image: "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200&auto=format&fit=crop",
        organization: "United International University",
        category: "Academic Achievement",
        skills: ["Persistence", "Academic Growth", "Discipline"],
        projectLink: "",
        recognitionLink: ""
      }
    ];

    const grid = document.getElementById('achievementGrid');
    const wrap = document.getElementById('achievementWrap');
    const actionWrap = document.getElementById('actionWrap');
    const toggleBtn = document.getElementById('toggleBtn');
    const toggleBtnText = document.getElementById('toggleBtnText');

    const INITIAL_COUNT = 4;
    let expanded = false;

    function createCard(item, index) {
      const card = document.createElement('article');
      card.className = 'achievement-card';
      card.style.animationDelay = `${index * 70}ms`;

      const safeSkills = (item.skills || []).slice(0, 4).map(skill => {
        return `<span class="skill-tag">${skill}</span>`;
      }).join('');

      const projectBtn = item.projectLink
        ? `<a class="link-btn primary" href="${item.projectLink}" target="_blank" rel="noopener">Project ↗</a>`
        : '';

      const recognitionBtn = item.recognitionLink
        ? `<a class="link-btn" href="${item.recognitionLink}" target="_blank" rel="noopener">Recognition ↗</a>`
        : '';

      card.innerHTML = `
        <div class="card-media">
          <span class="card-rank">${item.rank}</span>
          <img src="${item.image}" alt="${item.title}" loading="lazy" />
        </div>

        <div class="card-body">
          <div class="top-meta">
            <span class="meta-chip">${item.category}</span>
            <span class="meta-chip">${item.date}</span>
          </div>

          <h3 class="card-title">${item.title}</h3>
          <p class="card-subtitle">${item.subtitle}</p>

          <div class="card-details">
            <div class="detail-item">
              <span class="detail-label">Organization</span>
              <span class="detail-value">${item.organization}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Team</span>
              <span class="detail-value">${item.teamName}</span>
            </div>
          </div>

          <div class="skills">${safeSkills}</div>

          <div class="card-actions">
            ${projectBtn}
            ${recognitionBtn}
          </div>
        </div>
      `;
      return card;
    }

    function renderCards() {
      grid.innerHTML = '';

      const visibleItems = expanded ? achievements : achievements.slice(0, INITIAL_COUNT);

      visibleItems.forEach((item, index) => {
        grid.appendChild(createCard(item, index));
      });

      requestAnimationFrame(updateWrapHeight);

      if (achievements.length > INITIAL_COUNT) {
        actionWrap.hidden = false;
        toggleBtn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        toggleBtn.classList.toggle('expanded', expanded);
        toggleBtnText.textContent = expanded ? 'Show less' : `Show more (${achievements.length - INITIAL_COUNT} more)`;
      }
    }

    function updateWrapHeight() {
      wrap.style.maxHeight = grid.scrollHeight + 'px';
    }

    toggleBtn.addEventListener('click', () => {
      expanded = !expanded;
      renderCards();
    });

    window.addEventListener('resize', updateWrapHeight);

    renderCards();
  </script>
</body>

</html>
