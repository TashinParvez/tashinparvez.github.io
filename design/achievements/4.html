<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Achievements</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0f14;
            --card: #11161d;
            --card-hover: #151b22;
            --line: rgba(255, 255, 255, 0.08);
            --line-soft: rgba(255, 255, 255, 0.05);
            --text: #eef2f7;
            --text-soft: #d6deea;
            --muted: #8b9aae;
            --accent: #9ec5ff;

            --gold: #f5c451;
            --gold-soft: rgba(245, 196, 81, 0.10);

            --silver: #cbd5e1;
            --silver-soft: rgba(203, 213, 225, 0.11);

            --bronze: #d39a6a;
            --bronze-soft: rgba(211, 154, 106, 0.11);

            --green: #22c55e;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 36px 16px;
        }

        .achievements {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
        }

        .achievements-head {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .eyebrow-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
        }

        .section-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.3rem, 3vw, 1.9rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.05;
            color: var(--text);
        }

        .section-title span {
            color: var(--accent);
        }

        .head-desc {
            max-width: 260px;
            font-size: 0.74rem;
            color: var(--muted);
            line-height: 1.5;
            text-align: right;
        }

        .achievement-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .achievement-card {
            position: relative;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px 16px;
            transition: .22s ease;
        }

        .achievement-card:hover {
            transform: translateY(-2px);
            background: var(--card-hover);
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.16);
        }

        .achievement-card.gold {
            border-left: 3px solid var(--gold);
        }

        .achievement-card.silver {
            border-left: 3px solid var(--silver);
        }

        .achievement-card.bronze {
            border-left: 3px solid var(--bronze);
        }

        .achievement-card.gold:hover {
            border-color: rgba(245, 196, 81, 0.22);
            border-left-color: var(--gold);
        }

        .achievement-card.silver:hover {
            border-color: rgba(203, 213, 225, 0.22);
            border-left-color: var(--silver);
        }

        .achievement-card.bronze:hover {
            border-color: rgba(211, 154, 106, 0.22);
            border-left-color: var(--bronze);
        }

        .row-1 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .event-name {
            min-width: 0;
            flex: 1;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.08rem;
            font-weight: 700;
            line-height: 1.1;
            color: var(--text);
            letter-spacing: -0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-1-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .rank-badge,
        .year-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            line-height: 1;
        }

        .achievement-card.gold .rank-badge {
            color: var(--gold);
            background: var(--gold-soft);
            border: 1px solid rgba(245, 196, 81, 0.16);
        }

        .achievement-card.silver .rank-badge {
            color: var(--silver);
            background: var(--silver-soft);
            border: 1px solid rgba(203, 213, 225, 0.16);
        }

        .achievement-card.bronze .rank-badge {
            color: var(--bronze);
            background: var(--bronze-soft);
            border: 1px solid rgba(211, 154, 106, 0.16);
        }

        .year-badge {
            color: var(--accent);
            background: rgba(158, 197, 255, 0.10);
            border: 1px solid rgba(158, 197, 255, 0.12);
        }

        .content-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 120px;
            gap: 18px;
            align-items: center;
            margin-bottom: 10px;
        }

        .content-left {
            min-width: 0;
        }

        .row-2 {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 7px;
        }

        .project-icon-wrap {
            width: 24px;
            height: 24px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .achievement-card.gold .project-icon-wrap {
            color: var(--gold);
        }

        .achievement-card.silver .project-icon-wrap {
            color: var(--silver);
        }

        .achievement-card.bronze .project-icon-wrap {
            color: var(--bronze);
        }

        .project-icon-wrap svg {
            width: 13px;
            height: 13px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .project-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.98rem;
            font-weight: 700;
            line-height: 1.15;
            color: var(--text-soft);
        }

        .row-3 {
            font-size: 0.79rem;
            line-height: 1.55;
            color: var(--muted);
            max-width: 680px;
        }

        .content-right {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .trophy-panel {
            width: 100%;
            min-height: 92px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .achievement-card.gold .trophy-panel {
            background: linear-gradient(180deg, rgba(245, 196, 81, 0.10), rgba(245, 196, 81, 0.03));
            border-color: rgba(245, 196, 81, 0.14);
        }

        .achievement-card.silver .trophy-panel {
            background: linear-gradient(180deg, rgba(203, 213, 225, 0.10), rgba(203, 213, 225, 0.03));
            border-color: rgba(203, 213, 225, 0.14);
        }

        .achievement-card.bronze .trophy-panel {
            background: linear-gradient(180deg, rgba(211, 154, 106, 0.10), rgba(211, 154, 106, 0.03));
            border-color: rgba(211, 154, 106, 0.14);
        }

        .trophy-panel svg {
            width: 36px;
            height: 36px;
            fill: none;
            stroke-width: 1.9;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .achievement-card.gold .trophy-panel svg {
            stroke: var(--gold);
        }

        .achievement-card.silver .trophy-panel svg {
            stroke: var(--silver);
        }

        .achievement-card.bronze .trophy-panel svg {
            stroke: var(--bronze);
        }

        .row-4 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--line-soft);
            flex-wrap: wrap;
        }

        .row-4-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex-wrap: wrap;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .meta-icon {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .meta-icon svg {
            width: 10px;
            height: 10px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .meta-text {
            font-size: 0.72rem;
            color: var(--text-soft);
            line-height: 1.2;
            white-space: nowrap;
        }

        .row-4-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .action-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            font-size: 0.67rem;
            font-weight: 600;
            padding: 6px 9px;
            border-radius: 7px;
            white-space: nowrap;
            line-height: 1;
            transition: .2s ease;
        }

        .action-link.primary {
            color: #0b0f14;
            background: var(--accent);
        }

        .action-link.primary:hover {
            opacity: 0.92;
        }

        .action-link.ghost {
            color: var(--text-soft);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }

        .action-link.ghost:hover {
            border-color: rgba(158, 197, 255, 0.18);
            color: var(--accent);
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-top: 16px;
        }

        .more-btn {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #121821;
            color: var(--text-soft);
            border-radius: 999px;
            padding: 8px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.74rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .more-btn svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform .25s ease;
        }

        .more-btn.expanded svg {
            transform: rotate(180deg);
        }

        @media (max-width: 820px) {
            .achievements-head {
                flex-direction: column;
                align-items: flex-start;
            }

            .head-desc {
                text-align: left;
            }

            .content-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .content-right {
                justify-content: flex-start;
            }

            .trophy-panel {
                max-width: 120px;
                min-height: 82px;
            }
        }

        @media (max-width: 780px) {
            .row-4 {
                align-items: flex-start;
            }

            .row-4-right {
                justify-content: flex-start;
            }
        }

        @media (max-width: 560px) {
            .row-1 {
                flex-direction: column;
                align-items: flex-start;
            }

            .row-1-right {
                justify-content: flex-start;
            }

            .row-4 {
                flex-direction: column;
                align-items: flex-start;
            }

            .row-4-left,
            .row-4-right {
                width: 100%;
            }

            .event-name {
                white-space: normal;
            }
        }
    </style>
</head>

<body>
    <section class="achievements" id="achievements">
        <div class="achievements-head">
            <div>
                <div class="eyebrow"><span class="eyebrow-dot"></span>Achievements</div>
                <h2 class="section-title">A few moments of <span>recognition</span></h2>
            </div>

            <p class="head-desc">
                Awards, rankings, and academic milestones shown in a compact layout.
            </p>
        </div>

        <div class="achievement-grid" id="achievementGrid"></div>

        <div class="controls" id="controls" hidden>
            <button class="more-btn" id="toggleBtn" type="button" aria-expanded="false">
                <span id="toggleBtnText">Show more</span>
                <svg viewBox="0 0 24 24">
                    <path d="M6 9l6 6 6-6"></path>
                </svg>
            </button>
        </div>
    </section>

    <script>
        const achievements = [
            {
                event: "UIU CSE Project Show | Spring '23",
                rank: "Champion",
                medal: "gold",
                title: "Kairos",
                subtitle: "Ranked 1st among 71 teams in the DBMS Lab Project and won the DBMS Poster Presentation.",
                date: "2024",
                teamName: "Team Kairos",
                category: "DBMS Lab Project",
                achievementDate: "12 May 2024",
                link: "https://github.com/TashinParvez/Kairos",
                recognition: "https://cse.uiu.ac.bd/projects/database-management-systems-laboratory-2/?rank=champion"
            },
            {
                event: "UIU CSE Project Show | Spring '25",
                rank: "1st Runner-Up",
                medal: "silver",
                title: "DirectEdge",
                subtitle: "Ranked 2nd among 55 teams in the Software Engineering Lab for strong execution and delivery quality.",
                date: "2025",
                teamName: "Team DirectEdge",
                category: "Software Engineering Lab",
                achievementDate: "18 June 2025",
                link: "https://github.com/TashinParvez/direct-edge",
                recognition: "https://cse.uiu.ac.bd/projects/software-engineering-laboratory/?rank=1st-runner-up"
            },
            {
                event: "UIU CSE Project Show | Spring '23",
                rank: "2nd Runner-Up",
                medal: "bronze",
                title: "Wayout",
                subtitle: "Ranked 3rd among 66 teams for a tour planning project with polished implementation.",
                date: "2023",
                teamName: "Team Wayout",
                category: "AOOP Lab Project",
                achievementDate: "09 April 2023",
                link: "https://github.com/TashinParvez/Wayout-The-Ultimate-Tour-Planner",
                recognition: ""
            },
            {
                event: "UIU CSE Project Show | 2024",
                rank: "Champion",
                medal: "gold",
                title: "DBMS Poster",
                subtitle: "Won the poster presentation category through strong technical communication.",
                date: "2024",
                teamName: "Team Kairos",
                category: "Poster Presentation",
                achievementDate: "25 May 2024",
                link: "",
                recognition: ""
            },
            {
                event: "United International University",
                rank: "Scholarship",
                medal: "silver",
                title: "Academic Scholarships",
                subtitle: "Received merit-based scholarships across 13 semesters for sustained academic performance.",
                date: "Ongoing",
                teamName: "UIU",
                category: "Academic Achievement",
                achievementDate: "14 January 2024",
                link: "",
                recognition: ""
            }
        ];

        const INITIAL = 4;
        const grid = document.getElementById('achievementGrid');
        const controls = document.getElementById('controls');
        const toggleBtn = document.getElementById('toggleBtn');
        const toggleBtnText = document.getElementById('toggleBtnText');
        let expanded = false;

        function iconProject() {
            return `
                <svg viewBox="0 0 24 24">
                    <path d="M12 3l7 4v5c0 5-3.5 7.5-7 9-3.5-1.5-7-4-7-9V7l7-4z"></path>
                    <path d="M9.5 12l1.8 1.8L14.8 10"></path>
                </svg>
            `;
        }

        function iconCategory() {
            return `
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="4" width="7" height="7" rx="1.5"></rect>
                    <rect x="14" y="4" width="7" height="7" rx="1.5"></rect>
                    <rect x="3" y="15" width="7" height="7" rx="1.5"></rect>
                    <rect x="14" y="15" width="7" height="7" rx="1.5"></rect>
                </svg>
            `;
        }

        function iconTeam() {
            return `
                <svg viewBox="0 0 24 24">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
            `;
        }

        function iconDate() {
            return `
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="5" width="18" height="16" rx="2"></rect>
                    <path d="M16 3v4"></path>
                    <path d="M8 3v4"></path>
                    <path d="M3 10h18"></path>
                </svg>
            `;
        }

        function trophyIcon() {
            return `
                <svg viewBox="0 0 24 24">
                    <path d="M8 21h8"></path>
                    <path d="M12 17v4"></path>
                    <path d="M7 4h10v4a5 5 0 0 1-10 0V4z"></path>
                    <path d="M17 6h2a2 2 0 0 1-2 5"></path>
                    <path d="M7 6H5a2 2 0 0 0 2 5"></path>
                </svg>
            `;
        }

        function createCard(item) {
            const card = document.createElement('article');
            card.className = `achievement-card ${item.medal || 'gold'}`;

            const primaryLink = item.link
                ? `<a class="action-link primary" href="${item.link}" target="_blank" rel="noopener">Project ↗</a>`
                : '';

            const recogLink = item.recognition
                ? `<a class="action-link ghost" href="${item.recognition}" target="_blank" rel="noopener">Recognition ↗</a>`
                : '';

            card.innerHTML = `
                <div class="row-1">
                    <div class="event-name">${item.event}</div>
                    <div class="row-1-right">
                        <span class="rank-badge">${item.rank}</span>
                        <span class="year-badge">${item.date}</span>
                    </div>
                </div>

                <div class="content-row">
                    <div class="content-left">
                        <div class="row-2">
                            <span class="project-icon-wrap">${iconProject()}</span>
                            <h3 class="project-name">${item.title}</h3>
                        </div>

                        <p class="row-3">${item.subtitle}</p>
                    </div>

                    
                </div>

                <div class="row-4">
                    <div class="row-4-left">
                        <div class="meta-item">
                            <span class="meta-icon">${iconCategory()}</span>
                            <span class="meta-text">${item.category}</span>
                        </div>

                        <div class="meta-item">
                            <span class="meta-icon">${iconTeam()}</span>
                            <span class="meta-text">${item.teamName}</span>
                        </div>

                        <div class="meta-item">
                            <span class="meta-icon">${iconDate()}</span>
                            <span class="meta-text">${item.achievementDate}</span>
                        </div>
                    </div>

                    <div class="row-4-right">
                        ${primaryLink}
                        ${recogLink}
                    </div>
                </div>
            `;

            return card;
        }

        function render() {
            grid.innerHTML = '';
            const visible = expanded ? achievements : achievements.slice(0, INITIAL);
            visible.forEach(item => grid.appendChild(createCard(item)));

            if (achievements.length > INITIAL) {
                controls.hidden = false;
                toggleBtn.classList.toggle('expanded', expanded);
                toggleBtn.setAttribute('aria-expanded', String(expanded));
                toggleBtnText.textContent = expanded
                    ? 'Show less'
                    : `Show more (${achievements.length - INITIAL} more)`;
            }
        }

        toggleBtn.addEventListener('click', () => {
            expanded = !expanded;
            render();
        });

        render();
    </script>
</body>

</html>
