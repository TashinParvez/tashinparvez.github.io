<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Achievements</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap"
    rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #080b10;
      --line: rgba(255, 255, 255, 0.07);
      --line-2: rgba(255, 255, 255, 0.12);
      --text: #f1f5f9;
      --text-soft: #cbd5e1;
      --muted: #94a3b8;
      --accent: #63b3ed;
      --accent-2: #93c5fd;
      --green: #22c55e;
      --card: rgba(255, 255, 255, 0.028);
      --card-2: rgba(255, 255, 255, 0.018);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(99, 179, 237, 0.08), transparent 30%),
        radial-gradient(circle at 85% 85%, rgba(99, 179, 237, 0.05), transparent 26%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      padding: 80px 24px;
    }

    .achievements {
      width: 100%;
      max-width: 1050px;
      margin: 0 auto;
    }

    .achievements::before {
      content: '';
      display: block;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line-2) 20%, var(--line-2) 80%, transparent);
      margin-bottom: 64px;
    }

    .achievements-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 32px;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .eyebrow-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.8);
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 4.4vw, 3.25rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.02;
    }

    .section-title span {
      background: linear-gradient(135deg, #fff 0%, var(--accent-2) 60%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .head-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 16px;
    }

    .head-desc {
      max-width: 340px;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.8;
      text-align: right;
    }

    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent-2);
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid rgba(99, 179, 237, 0.2);
      background: rgba(99, 179, 237, 0.06);
    }

    .section-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(99, 179, 237, 0.8);
    }

    .achievement-wrap {
      overflow: hidden;
      transition: max-height 0.7s cubic-bezier(.22, 1, .36, 1);
    }

    .achievement-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .achievement-card {
      position: relative;
      padding: 22px 22px 20px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.022), rgba(255, 255, 255, 0.014)),
        var(--card-2);
      overflow: hidden;
      transition:
        transform .26s ease,
        border-color .26s ease,
        background .26s ease,
        box-shadow .26s ease,
        opacity .45s ease;
      opacity: 0;
      transform: translateY(18px);
      animation: riseIn .6s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    .achievement-card::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top right, rgba(99, 179, 237, 0.08), transparent 28%),
        linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.01));
    }

    .achievement-card:hover {
      transform: translateY(-4px);
      border-color: rgba(99, 179, 237, 0.18);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.018)),
        var(--card);
      box-shadow: 0 18px 44px rgba(2, 8, 23, 0.28);
    }

    @keyframes riseIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .rank-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid rgba(99, 179, 237, 0.18);
      background: rgba(99, 179, 237, 0.06);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #dbeafe;
      white-space: nowrap;
    }

    .rank-chip::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(99, 179, 237, 0.8);
    }

    .thumb {
      width: 62px;
      height: 62px;
      border-radius: 16px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.03);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.9;
    }

    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1.04;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 10px;
      max-width: calc(100% - 10px);
    }

    .card-subtitle {
      font-size: 0.92rem;
      line-height: 1.72;
      color: var(--text-soft);
      margin-bottom: 20px;
      max-width: 92%;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      margin-bottom: 18px;
    }

    .meta-item {
      min-width: 0;
    }

    .meta-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.23);
      margin-bottom: 6px;
    }

    .meta-value {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-soft);
      word-break: break-word;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .skill-tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.03);
      font-size: 11px;
      color: #d6e4f7;
      white-space: nowrap;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 600;
      padding: 11px 14px;
      border-radius: 12px;
      transition:
        transform .22s ease,
        border-color .22s ease,
        background .22s ease,
        color .22s ease,
        box-shadow .22s ease;
    }

    .action-link.primary {
      color: #0f172a;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
    }

    .action-link.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(99, 179, 237, 0.22);
    }

    .action-link.ghost {
      color: var(--text);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.025);
    }

    .action-link.ghost:hover {
      transform: translateY(-2px);
      color: var(--accent-2);
      border-color: rgba(99, 179, 237, 0.22);
      background: rgba(99, 179, 237, 0.05);
    }

    .controls {
      display: flex;
      justify-content: center;
      margin-top: 28px;
    }

    .more-btn {
      border: 1px solid rgba(99, 179, 237, 0.18);
      background: rgba(99, 179, 237, 0.06);
      color: var(--accent-2);
      border-radius: 999px;
      padding: 11px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: transform .22s, border-color .22s, background .22s, color .22s;
    }

    .more-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(99, 179, 237, 0.28);
      background: rgba(99, 179, 237, 0.08);
      color: #eaf3ff;
    }

    .more-btn svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform .28s ease;
    }

    .more-btn.expanded svg {
      transform: rotate(180deg);
    }

    .bottom-rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line-2) 20%, var(--line-2) 80%, transparent);
      margin-top: 64px;
    }

    @media (max-width: 780px) {
      .achievements-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      .head-right {
        align-items: flex-start;
      }

      .head-desc {
        text-align: left;
      }

      .achievement-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 72px 18px;
      }

      .achievement-card {
        padding: 18px 18px 18px;
        border-radius: 18px;
      }

      .card-top {
        gap: 12px;
      }

      .thumb {
        width: 54px;
        height: 54px;
        border-radius: 14px;
      }

      .card-title {
        font-size: 1.24rem;
      }

      .card-subtitle {
        max-width: 100%;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <section class="achievements" id="achievements">
    <div class="achievements-head">
      <div>
        <div class="eyebrow"><span class="eyebrow-dot"></span>Achievements</div>
        <h2 class="section-title">Recognitions backed by<br><span>real execution.</span></h2>
      </div>

      <div class="head-right">
        <p class="head-desc">
          A focused collection of project wins and academic milestones that reflect product thinking,
          consistency, and high-quality execution.
        </p>
        <span class="section-badge"><span class="section-badge-dot"></span>Selected achievements</span>
      </div>
    </div>

    <div class="achievement-wrap" id="achievementWrap">
      <div class="achievement-grid" id="achievementGrid"></div>
    </div>

    <div class="controls" id="controls" hidden>
      <button class="more-btn" id="toggleBtn" type="button" aria-expanded="false">
        <span id="toggleBtnText">Show more</span>
        <svg viewBox="0 0 24 24">
          <path d="M6 9l6 6 6-6"></path>
        </svg>
      </button>
    </div>

    <div class="bottom-rule"></div>
  </section>

  <script>
    const achievements = [
      {
        rank: "Champion",
        title: "Kairos",
        subtitle: "Ranked 1st among 71 teams in the DBMS Lab Project and also recognized as Champion in the DBMS Poster Presentation.",
        date: "2024",
        teamName: "Team Kairos",
        image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=400&auto=format&fit=crop",
        organization: "UIU CSE Project Show",
        category: "DBMS Lab Project",
        skills: ["DBMS", "Product Thinking", "Presentation"],
        link: "https://github.com/TashinParvez/Kairos",
        recognition: "https://cse.uiu.ac.bd/projects/database-management-systems-laboratory-2/?rank=champion"
      },
      {
        rank: "1st Runner-Up",
        title: "DirectEdge",
        subtitle: "Ranked 2nd among 55 teams in the Software Engineering Lab for strong execution, structure, and delivery quality.",
        date: "2025",
        teamName: "Team DirectEdge",
        image: "https://images.unsplash.com/photo-1552664730-d307ca884978?q=80&w=400&auto=format&fit=crop",
        organization: "UIU CSE Project Show",
        category: "Software Engineering Lab",
        skills: ["Software Design", "Teamwork", "Execution"],
        link: "https://github.com/TashinParvez/direct-edge",
        recognition: "https://cse.uiu.ac.bd/projects/software-engineering-laboratory/?rank=1st-runner-up"
      },
      {
        rank: "2nd Runner-Up",
        title: "Wayout",
        subtitle: "Ranked 3rd among 66 teams with a tour planning project recognized for concept quality and polished implementation.",
        date: "2023",
        teamName: "Team Wayout",
        image: "https://images.unsplash.com/photo-1488646953014-85cb44e25828?q=80&w=400&auto=format&fit=crop",
        organization: "UIU CSE Project Show",
        category: "AOOP Lab Project",
        skills: ["OOP", "UX Thinking", "Problem Solving"],
        link: "https://github.com/TashinParvez/Wayout-The-Ultimate-Tour-Planner",
        recognition: ""
      },
      {
        rank: "Merit Scholarship",
        title: "Academic Excellence",
        subtitle: "Earned repeated merit-based scholarships through consistent academic performance across multiple semesters.",
        date: "Ongoing",
        teamName: "United International University",
        image: "https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=400&auto=format&fit=crop",
        organization: "United International University",
        category: "Academic Achievement",
        skills: ["Consistency", "Discipline", "Performance"],
        link: "",
        recognition: ""
      },
      {
        rank: "100% Scholarship",
        title: "Six-Time Full Scholarship",
        subtitle: "Received a 100% scholarship six times for outstanding academic results and sustained consistency.",
        date: "Multiple Semesters",
        teamName: "UIU",
        image: "https://images.unsplash.com/photo-1455390582262-044cdead277a?q=80&w=400&auto=format&fit=crop",
        organization: "United International University",
        category: "Academic Achievement",
        skills: ["Focus", "Academic Excellence", "Discipline"],
        link: "",
        recognition: ""
      },
      {
        rank: "50% Scholarship",
        title: "Two-Time Merit Scholarship",
        subtitle: "Awarded a 50% scholarship in two semesters through strong academic consistency and measurable results.",
        date: "Multiple Semesters",
        teamName: "UIU",
        image: "https://images.unsplash.com/photo-1523240795612-9a054b0db644?q=80&w=400&auto=format&fit=crop",
        organization: "United International University",
        category: "Academic Achievement",
        skills: ["Commitment", "Performance", "Consistency"],
        link: "",
        recognition: ""
      },
      {
        rank: "25% Scholarship",
        title: "Four-Time Merit Scholarship",
        subtitle: "Received a 25% scholarship in four semesters as part of a consistent academic track record.",
        date: "Multiple Semesters",
        teamName: "UIU",
        image: "https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=400&auto=format&fit=crop",
        organization: "United International University",
        category: "Academic Achievement",
        skills: ["Persistence", "Growth", "Discipline"],
        link: "",
        recognition: ""
      }
    ];

    const INITIAL_VISIBLE = 4;
    const grid = document.getElementById('achievementGrid');
    const wrap = document.getElementById('achievementWrap');
    const controls = document.getElementById('controls');
    const toggleBtn = document.getElementById('toggleBtn');
    const toggleBtnText = document.getElementById('toggleBtnText');

    let expanded = false;

    function createCard(item, index) {
      const card = document.createElement('article');
      card.className = 'achievement-card';
      card.style.animationDelay = `${index * 70}ms`;

      const skillsHTML = (item.skills || []).slice(0, 4).map(skill =>
        `<span class="skill-tag">${skill}</span>`
      ).join('');

      const primaryLink = item.link
        ? `<a class="action-link primary" href="${item.link}" target="_blank" rel="noopener">Project ↗</a>`
        : '';

      const recognitionLink = item.recognition
        ? `<a class="action-link ghost" href="${item.recognition}" target="_blank" rel="noopener">Recognition ↗</a>`
        : '';

      const thumbHTML = item.image
        ? `
          <div class="thumb">
            <img src="${item.image}" alt="${item.title}" loading="lazy">
          </div>
        `
        : '';

      card.innerHTML = `
        <div class="card-top">
          <span class="rank-chip">${item.rank}</span>
          ${thumbHTML}
        </div>

        <h3 class="card-title">${item.title}</h3>
        <p class="card-subtitle">${item.subtitle}</p>

        <div class="meta-grid">
          <div class="meta-item">
            <span class="meta-label">Date</span>
            <span class="meta-value">${item.date}</span>
          </div>

          <div class="meta-item">
            <span class="meta-label">Team</span>
            <span class="meta-value">${item.teamName}</span>
          </div>

          <div class="meta-item">
            <span class="meta-label">Organization</span>
            <span class="meta-value">${item.organization}</span>
          </div>

          <div class="meta-item">
            <span class="meta-label">Category</span>
            <span class="meta-value">${item.category}</span>
          </div>
        </div>

        <div class="skills">${skillsHTML}</div>

        <div class="card-actions">
          ${primaryLink}
          ${recognitionLink}
        </div>
      `;

      return card;
    }

    function updateWrapHeight() {
      wrap.style.maxHeight = grid.scrollHeight + 'px';
    }

    function renderAchievements() {
      grid.innerHTML = '';

      const visibleItems = expanded
        ? achievements
        : achievements.slice(0, INITIAL_VISIBLE);

      visibleItems.forEach((item, index) => {
        grid.appendChild(createCard(item, index));
      });

      requestAnimationFrame(updateWrapHeight);

      if (achievements.length > INITIAL_VISIBLE) {
        controls.hidden = false;
        toggleBtn.classList.toggle('expanded', expanded);
        toggleBtn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        toggleBtnText.textContent = expanded
          ? 'Show less'
          : `Show more (${achievements.length - INITIAL_VISIBLE} more)`;
      }
    }

    toggleBtn.addEventListener('click', () => {
      expanded = !expanded;
      renderAchievements();
    });

    window.addEventListener('resize', updateWrapHeight);

    renderAchievements();
  </script>
</body>

</html>
