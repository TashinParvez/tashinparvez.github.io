<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Achievements</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0f14;
            --card: #11161d;
            --card-hover: #151b22;
            --line: rgba(255, 255, 255, 0.08);
            --line-soft: rgba(255, 255, 255, 0.05);
            --text: #eef2f7;
            --text-soft: #d6deea;
            --muted: #8b9aae;
            --accent: #9ec5ff;

            --gold: #f5c451;
            --gold-soft: rgba(245, 196, 81, 0.10);

            --silver: #cbd5e1;
            --silver-soft: rgba(203, 213, 225, 0.11);

            --bronze: #d39a6a;
            --bronze-soft: rgba(211, 154, 106, 0.11);

            --green: #22c55e;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 36px 16px;
        }

        .ach-root {
            max-width: 860px;
            margin: 0 auto;
            font-family: 'Inter', sans-serif;
        }

        .ach-header {
            margin-bottom: 20px;
        }

        .ach-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .ach-label-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.35);
        }

        .ach-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.3rem, 3vw, 1.9rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.05;
            color: var(--text);
        }

        .ach-title em {
            font-style: normal;
            color: var(--accent);
            font-weight: 700;
        }

        /* Separate cards with gap */
        .ach-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .ach-item {
            background: var(--card);
            padding: 1.1rem 1.25rem;
            display: grid;
            grid-template-columns: 36px 1fr auto;
            gap: 0 14px;
            align-items: start;
            border: 1px solid var(--line);
            border-radius: 16px;
            transition:
                transform 0.28s ease,
                background 0.28s ease,
                border-color 0.28s ease,
                box-shadow 0.28s ease;
            cursor: default;
            opacity: 0;
            transform: translateY(16px);
            animation: cardIn 0.45s ease forwards;
        }

        .ach-item:hover {
            background: var(--card-hover);
            transform: translateY(-4px);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
            border-color: rgba(158, 197, 255, 0.14);
        }

        .ach-item.gold:hover {
            box-shadow: 0 14px 34px rgba(245, 196, 81, 0.08);
            border-color: rgba(245, 196, 81, 0.22);
        }

        .ach-item.silver:hover {
            box-shadow: 0 14px 34px rgba(203, 213, 225, 0.07);
            border-color: rgba(203, 213, 225, 0.2);
        }

        .ach-item.bronze:hover {
            box-shadow: 0 14px 34px rgba(211, 154, 106, 0.08);
            border-color: rgba(211, 154, 106, 0.2);
        }

        .ach-medal {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .ach-medal.gold {
            background: var(--gold-soft);
            border: 1px solid rgba(245, 196, 81, 0.22);
        }

        .ach-medal.silver {
            background: var(--silver-soft);
            border: 1px solid rgba(203, 213, 225, 0.22);
        }

        .ach-medal.bronze {
            background: var(--bronze-soft);
            border: 1px solid rgba(211, 154, 106, 0.22);
        }

        .ach-medal svg {
            width: 17px;
            height: 17px;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .gold .ach-medal-icon {
            stroke: var(--gold);
        }

        .silver .ach-medal-icon {
            stroke: var(--silver);
        }

        .bronze .ach-medal-icon {
            stroke: var(--bronze);
        }

        .ach-body {
            min-width: 0;
        }

        .ach-top {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .ach-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .ach-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 999px;
            line-height: 1.6;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .badge-gold {
            color: var(--gold);
            background: var(--gold-soft);
            border: 1px solid rgba(245, 196, 81, 0.18);
        }

        .badge-silver {
            color: var(--silver);
            background: var(--silver-soft);
            border: 1px solid rgba(203, 213, 225, 0.18);
        }

        .badge-bronze {
            color: var(--bronze);
            background: var(--bronze-soft);
            border: 1px solid rgba(211, 154, 106, 0.18);
        }

        .ach-sub {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 9px;
        }

        .ach-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .ach-meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-soft);
            background: rgba(255, 255, 255, 0.025);
            padding: 4px 8px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .ach-meta-item svg {
            width: 11px;
            height: 11px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .ach-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            flex-shrink: 0;
            padding-top: 2px;
        }

        .ach-year {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
            text-align: right;
        }

        .ach-links {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .ach-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-soft);
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            background: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            transition:
                transform 0.18s ease,
                color 0.18s ease,
                border-color 0.18s ease,
                background 0.18s ease;
        }

        .ach-link:hover {
            color: var(--accent);
            border-color: rgba(158, 197, 255, 0.2);
            background: rgba(158, 197, 255, 0.07);
            transform: translateY(-1px);
        }

        .ach-more-row {
            display: flex;
            justify-content: center;
            margin-top: 18px;
        }

        .ach-more-btn {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: linear-gradient(180deg, #121821, #0f151d);
            color: var(--text-soft);
            border-radius: 999px;
            padding: 10px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition:
                transform 0.22s ease,
                border-color 0.22s ease,
                color 0.22s ease,
                box-shadow 0.22s ease,
                background 0.22s ease;
        }

        .ach-more-btn:hover {
            color: var(--accent);
            border-color: rgba(158, 197, 255, 0.2);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .ach-more-btn svg {
            width: 13px;
            height: 13px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.3s ease;
        }

        .ach-more-btn.open svg {
            transform: rotate(180deg);
        }

        /* Better expand/collapse animation */
        .ach-item.hidden-card {
            display: none;
        }

        .ach-item.reveal {
            animation: cardIn 0.42s ease forwards;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.985);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 720px) {
            .ach-item {
                grid-template-columns: 36px 1fr;
            }

            .ach-right {
                grid-column: 2;
                align-items: flex-start;
                padding-top: 10px;
            }

            .ach-year {
                text-align: left;
                white-space: normal;
            }

            .ach-links {
                justify-content: flex-start;
            }
        }

        @media (max-width: 560px) {
            body {
                padding: 28px 14px;
            }

            .ach-grid {
                gap: 12px;
            }

            .ach-item {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 1rem;
            }

            .ach-medal {
                margin-top: 0;
            }

            .ach-right {
                grid-column: auto;
            }
        }
    </style>
</head>

<body>
    <div class="ach-root">
        <div class="ach-header">
            <div class="ach-label"><span class="ach-label-dot"></span>Achievements</div>
            <h2 class="ach-title">Recognition & <em>awards</em></h2>
        </div>

        <div class="ach-grid" id="achGrid"></div>

        <div class="ach-more-row" id="moreRow" style="display:none">
            <button class="ach-more-btn" id="moreBtn" type="button">
                <span id="moreTxt">Show more</span>
                <svg viewBox="0 0 24 24">
                    <path d="M6 9l6 6 6-6" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const data = [
            {
                event: "UIU CSE Project Show · Spring '23",
                rank: "Champion",
                medal: "gold",
                title: "Kairos",
                sub: "Ranked 1st among 71 teams — DBMS Lab Project & Poster Presentation.",
                date: "May 2024",
                category: "DBMS Lab",
                team: "Team Kairos",
                link: "https://github.com/TashinParvez/Kairos",
                recog: "https://cse.uiu.ac.bd/projects/database-management-systems-laboratory-2/?rank=champion"
            },
            {
                event: "UIU CSE Project Show · Spring '25",
                rank: "1st Runner-Up",
                medal: "silver",
                title: "DirectEdge",
                sub: "Ranked 2nd among 55 teams in Software Engineering Lab.",
                date: "June 2025",
                category: "SE Lab",
                team: "Team DirectEdge",
                link: "https://github.com/TashinParvez/direct-edge",
                recog: "https://cse.uiu.ac.bd/projects/software-engineering-laboratory/?rank=1st-runner-up"
            },
            {
                event: "UIU CSE Project Show · Spring '23",
                rank: "2nd Runner-Up",
                medal: "bronze",
                title: "Wayout",
                sub: "Ranked 3rd among 66 teams for a polished tour-planning project.",
                date: "Apr 2023",
                category: "AOOP Lab",
                team: "Team Wayout",
                link: "https://github.com/TashinParvez/Wayout-The-Ultimate-Tour-Planner",
                recog: ""
            },
            {
                event: "UIU CSE Project Show · 2024",
                rank: "Champion",
                medal: "gold",
                title: "DBMS Poster",
                sub: "Won poster presentation through strong technical communication.",
                date: "May 2024",
                category: "Poster",
                team: "Team Kairos",
                link: "",
                recog: ""
            },
            {
                event: "United International University",
                rank: "Scholarship",
                medal: "silver",
                title: "Academic merit",
                sub: "Merit-based scholarships across 13 consecutive semesters.",
                date: "Ongoing",
                category: "Academic",
                team: "UIU",
                link: "",
                recog: ""
            }
        ];

        const INITIAL = 3;
        let open = false;

        const grid = document.getElementById('achGrid');
        const moreRow = document.getElementById('moreRow');
        const moreBtn = document.getElementById('moreBtn');
        const moreTxt = document.getElementById('moreTxt');

        const trophy = `<svg viewBox="0 0 24 24" class="ach-medal-icon"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v4a5 5 0 0 1-10 0V4z"/><path d="M17 6h2a2 2 0 0 1-2 5"/><path d="M7 6H5a2 2 0 0 0 2 5"/></svg>`;
        const medal = `<svg viewBox="0 0 24 24" class="ach-medal-icon"><circle cx="12" cy="14" r="6"/><path d="M8 8.7V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v4.7"/><path d="M12 11v3l1.5 1.5"/></svg>`;
        const award = `<svg viewBox="0 0 24 24" class="ach-medal-icon"><circle cx="12" cy="8" r="5"/><path d="M8.56 14.44L7 22l5-3 5 3-1.56-7.56"/></svg>`;
        const icons = { gold: trophy, silver: medal, bronze: award };

        const calIcon = `<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>`;
        const tagIcon = `<svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1.5"/></svg>`;
        const teamIcon = `<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;

        function createCard(d, index) {
            const el = document.createElement('div');
            el.className = `ach-item ${d.medal} reveal`;
            el.style.animationDelay = `${index * 70}ms`;

            el.innerHTML = `
                <div class="ach-medal ${d.medal}">${icons[d.medal]}</div>

                <div class="ach-body">
                    <div class="ach-top">
                        <span class="ach-name">${d.title}</span>
                        <span class="ach-badge badge-${d.medal}">${d.rank}</span>
                    </div>

                    <p class="ach-sub">${d.sub}</p>

                    <div class="ach-meta">
                        <span class="ach-meta-item">${calIcon}${d.date}</span>
                        <span class="ach-meta-item">${tagIcon}${d.category}</span>
                        <span class="ach-meta-item">${teamIcon}${d.team}</span>
                    </div>
                </div>

                <div class="ach-right">
                    <span class="ach-year">${d.event}</span>
                    <div class="ach-links">
                        ${d.link ? `<a class="ach-link" href="${d.link}" target="_blank" rel="noopener">Project ↗</a>` : ''}
                        ${d.recog ? `<a class="ach-link" href="${d.recog}" target="_blank" rel="noopener">Recognition ↗</a>` : ''}
                    </div>
                </div>
            `;
            return el;
        }

        function render() {
            grid.innerHTML = '';

            const visible = open ? data : data.slice(0, INITIAL);
            visible.forEach((item, index) => {
                grid.appendChild(createCard(item, index));
            });

            if (data.length > INITIAL) {
                moreRow.style.display = 'flex';
                moreBtn.classList.toggle('open', open);
                moreTxt.textContent = open
                    ? 'Show less'
                    : `Show ${data.length - INITIAL} more`;
            }
        }

        moreBtn.addEventListener('click', () => {
            open = !open;
            render();

            if (open) {
                setTimeout(() => {
                    moreRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 120);
            }
        });

        render();
    </script>
</body>

</html>
