<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Achievements</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #080b10;
            --bg-soft: #0d1219;
            --surface: rgba(255, 255, 255, 0.035);
            --surface-2: rgba(255, 255, 255, 0.05);
            --surface-3: rgba(255, 255, 255, 0.08);
            --line: rgba(255, 255, 255, 0.08);
            --line-strong: rgba(255, 255, 255, 0.14);
            --text: #f1f5f9;
            --text-2: #cbd5e1;
            --text-3: #94a3b8;
            --accent: #63b3ed;
            --accent-2: #3b82f6;
            --gold: #f5c24b;
            --silver: #cbd5e1;
            --bronze: #d29a6a;
            --shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 18px;
            --radius-sm: 14px;
            --container: 1120px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 18px 64px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: -140px;
            left: 50%;
            transform: translateX(-50%);
            width: 920px;
            height: 520px;
            background: radial-gradient(ellipse, rgba(99, 179, 237, 0.055) 0%, transparent 68%);
            pointer-events: none;
            z-index: 0;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            display: block;
            width: 100%;
            max-width: 100%;
        }

        button,
        input,
        textarea,
        select {
            font: inherit;
        }

        .section {
            width: min(100%, var(--container));
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .section-head {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 30px;
            padding-bottom: 22px;
            border-bottom: 1px solid var(--line-strong);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            color: var(--accent);
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: .18em;
            text-transform: uppercase;
        }

        .eyebrow::before {
            content: "";
            width: 18px;
            height: 1px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            display: block;
        }

        .title {
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(34px, 5vw, 62px);
            line-height: .92;
            letter-spacing: -.06em;
            font-weight: 700;
            max-width: 640px;
        }

        .head-copy {
            max-width: 380px;
            color: var(--text-3);
            font-size: 14px;
            line-height: 1.8;
            padding-bottom: 6px;
        }

        .achievement-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .achievement-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            overflow: hidden;
            transition: border-color .28s ease, transform .28s ease, background .28s ease, box-shadow .28s ease;
        }

        .achievement-card:hover {
            transform: translateY(-2px);
            border-color: rgba(99, 179, 237, 0.16);
            background: rgba(255, 255, 255, 0.045);
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.26);
        }

        .achievement-card.open {
            border-color: var(--line-strong);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.24);
        }

        .achievement-trigger {
            width: 100%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 44px;
            gap: 18px;
            align-items: center;
            padding: 24px;
            text-align: left;
        }

        .achievement-head {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            min-width: 0;
        }

        .achievement-badge {
            width: 46px;
            height: 46px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--line);
            flex: none;
            transition: transform .28s ease, border-color .28s ease, background .28s ease;
        }

        .achievement-card:hover .achievement-badge {
            transform: translateY(-1px);
            border-color: rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.055);
        }

        .achievement-badge.gold {
            color: var(--gold);
        }

        .achievement-badge.silver {
            color: var(--silver);
        }

        .achievement-badge.bronze {
            color: var(--bronze);
        }

        .ach-medal-icon {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            display: block;
        }

        .achievement-main {
            min-width: 0;
        }

        .achievement-title {
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(18px, 2vw, 24px);
            line-height: 1.15;
            letter-spacing: -.04em;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .achievement-subtitle {
            color: var(--text-3);
            font-size: 14px;
            line-height: 1.65;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .achievement-toggle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--line);
            color: var(--text-2);
            transition: transform .28s ease, opacity .22s ease, background .28s ease, border-color .28s ease, color .28s ease;
            flex: none;
            opacity: 0;
            pointer-events: none;
        }

        .achievement-card.open .achievement-toggle {
            opacity: 1;
            pointer-events: auto;
            transform: rotate(180deg);
            background: rgba(99, 179, 237, 0.08);
            border-color: rgba(99, 179, 237, 0.22);
            color: var(--accent);
        }

        .achievement-body {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows .36s ease;
        }

        .achievement-card.open .achievement-body {
            grid-template-rows: 1fr;
        }

        .achievement-body-inner {
            overflow: hidden;
        }

        .achievement-content {
            padding: 0 24px 24px;
        }

        .achievement-shell {
            display: grid;
            grid-template-columns: 1.05fr .95fr;
            gap: 18px;
            align-items: stretch;
            padding-top: 2px;
        }

        .detail-panel,
        .image-panel {
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.025);
        }

        .detail-panel {
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100%;
        }

        .project-name {
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(26px, 3vw, 36px);
            line-height: 1;
            letter-spacing: -.06em;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--text);
        }

        .project-details {
            color: var(--text-3);
            font-size: 15px;
            line-height: 1.8;
            max-width: 56ch;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 22px;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 22px;
        }

        .meta-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 44px;
            padding: 0 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid var(--line);
            color: var(--text-2);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -.02em;
        }

        .meta-icon {
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            flex: none;
        }

        .meta-icon svg {
            width: 18px;
            height: 18px;
            display: block;
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-2);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -.02em;
            transition: transform .22s ease, border-color .22s ease, background .22s ease, color .22s ease;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(99, 179, 237, 0.18);
            background: rgba(255, 255, 255, 0.045);
            color: var(--text);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, rgba(99, 179, 237, 0.16), rgba(59, 130, 246, 0.1));
            color: var(--text);
            border-color: rgba(99, 179, 237, 0.2);
        }

        .action-btn.primary:hover {
            background: linear-gradient(135deg, rgba(99, 179, 237, 0.22), rgba(59, 130, 246, 0.14));
            border-color: rgba(99, 179, 237, 0.28);
        }

        .image-panel {
            position: relative;
            min-height: 320px;
            isolation: isolate;
        }

        .image-panel::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(8, 11, 16, .06) 0%, rgba(8, 11, 16, .62) 100%);
            z-index: 0;
        }

        .image-overlay {
            position: absolute;
            inset: auto 0 0 0;
            z-index: 1;
            padding: 22px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 14px;
        }

        .image-copy {
            min-width: 0;
        }

        .image-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .16em;
            color: rgba(255, 255, 255, .68);
            margin-bottom: 8px;
        }

        .image-title {
            color: #ffffff;
            font-family: "Space Grotesk", sans-serif;
            font-size: 24px;
            line-height: 1.04;
            letter-spacing: -.04em;
            font-weight: 700;
            max-width: 260px;
        }

        .image-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 0 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, .14);
            color: #ffffff;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .more-wrap {
            display: flex;
            justify-content: center;
            margin-top: 24px;
        }

        .more-btn {
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.035);
            color: var(--text);
            min-height: 50px;
            padding: 0 22px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: -.02em;
            transition: transform .22s ease, background .22s ease, border-color .22s ease;
        }

        .more-btn:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(99, 179, 237, 0.18);
        }

        .more-btn .icon {
            transition: transform .28s ease;
        }

        .more-btn.expanded .icon {
            transform: rotate(180deg);
        }

        .achievement-card.hidden {
            display: none;
        }

        @media (max-width: 980px) {
            .section-head {
                flex-direction: column;
                align-items: flex-start;
            }

            .head-copy {
                max-width: 640px;
            }

            .achievement-shell {
                grid-template-columns: 1fr;
            }

            .image-panel {
                min-height: 280px;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 24px 12px 48px;
            }

            .achievement-trigger {
                padding: 18px;
                grid-template-columns: minmax(0, 1fr) 40px;
                gap: 14px;
            }

            .achievement-head {
                gap: 12px;
            }

            .achievement-badge {
                width: 42px;
                height: 42px;
                border-radius: 14px;
            }

            .achievement-title {
                font-size: 18px;
            }

            .achievement-subtitle {
                font-size: 13px;
            }

            .achievement-content {
                padding: 0 18px 18px;
            }

            .detail-panel {
                padding: 18px;
            }

            .project-name {
                font-size: 26px;
            }

            .project-details {
                font-size: 14px;
            }

            .meta-row {
                flex-direction: column;
            }

            .meta-pill {
                width: 100%;
                justify-content: flex-start;
            }

            .image-panel {
                min-height: 240px;
            }

            .image-title {
                font-size: 20px;
            }

            .more-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <section class="section" id="achievements">
        <div class="section-head">
            <div>
                <div class="eyebrow">Achievements</div>
                <h1 class="title">Moments that earned real recognition</h1>
            </div>
            <p class="head-copy">
                A refined collection of project recognitions with a minimal presentation and focused details.
            </p>
        </div>

        <div class="achievement-list" id="achievementList"></div>

        <div class="more-wrap">
            <button class="more-btn" id="moreBtn" type="button" aria-expanded="false">
                <span class="label">More</span>
                <span class="icon">↓</span>
            </button>
        </div>
    </section>

    <script>
        const achievements = [
            {
                closedTitle: "Champion - UIU CSE Project Show Spring '23",
                closedSubtitle: "UIU CSE Project Show by Department of CSE, UIU, Dhaka, Bangladesh",
                projectName: "Kairos",
                projectDetails: "Ranked 1st among 71 teams in the DBMS Lab Project and also won the DBMS Poster Presentation through strong execution, technical clarity, and presentation quality.",
                category: "DBMS Lab Project",
                team: "Team Kairos",
                image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1200&q=80",
                tag: "Champion",
                projectLink: "https://github.com/TashinParvez/Kairos",
                recognitionLink: "https://cse.uiu.ac.bd/projects/database-management-systems-laboratory-2/?rank=champion"
            },
            {
                closedTitle: "1st Runner-Up - System Analysis & Design Project Show",
                closedSubtitle: "UIU CSE Project Show Summer '23 by Department of CSE, UIU, Dhaka, Bangladesh",
                projectName: "DirectEdge",
                projectDetails: "A streamlined academic project recognized for strong execution, polished delivery, and well-structured system analysis across the full project workflow.",
                category: "DBMS Lab Project",
                team: "Team Kairos",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=1200&q=80",
                tag: "1st Runner-Up",
                projectLink: "https://github.com/TashinParvez/direct-edge",
                recognitionLink: "https://cse.uiu.ac.bd/projects/software-engineering-laboratory/?rank=1st-runner-up"
            },
            {
                closedTitle: "2nd Runner-Up - UIU CSE Project Show Spring '23",
                closedSubtitle: "UIU CSE Project Show by Department of CSE, UIU, Dhaka, Bangladesh",
                projectName: "Wayout",
                projectDetails: "A tour planning project recognized for thoughtful implementation, clean experience design, and a polished academic presentation.",
                category: "AOOP Lab Project",
                team: "Team Wayout",
                image: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80",
                tag: "2nd Runner-Up",
                projectLink: "https://github.com/TashinParvez/Wayout-The-Ultimate-Tour-Planner",
                recognitionLink: ""
            },
            {
                closedTitle: "Champion - DBMS Poster Presentation",
                closedSubtitle: "UIU CSE Project Show by Department of CSE, UIU, Dhaka, Bangladesh",
                projectName: "DBMS Poster",
                projectDetails: "Awarded for clear technical communication, visual structure, and strong presentation of database concepts in a concise format.",
                category: "Poster Presentation",
                team: "Team Kairos",
                image: "https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&w=1200&q=80",
                tag: "Champion",
                projectLink: "",
                recognitionLink: ""
            },
            {
                closedTitle: "Scholarship - Academic Excellence",
                closedSubtitle: "United International University, Dhaka, Bangladesh",
                projectName: "Academic Scholarships",
                projectDetails: "Received merit-based scholarships across multiple semesters for sustained academic performance and consistency in coursework.",
                category: "Academic Achievement",
                team: "UIU",
                image: "https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=1200&q=80",
                tag: "Scholarship",
                projectLink: "",
                recognitionLink: ""
            }
        ];

        const initialVisibleCount = 3;
        const list = document.getElementById("achievementList");
        const moreBtn = document.getElementById("moreBtn");

        function escapeHtml(text = "") {
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function getCategoryIcon() {
            return `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h11A2.5 2.5 0 0 1 20 7.5v9A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-9Z"></path>
                    <path d="M8 9h8"></path>
                    <path d="M8 13h5"></path>
                </svg>
            `;
        }

        function getTeamIcon() {
            return `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9.5" cy="7" r="3"></circle>
                    <path d="M20 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M14 4.13a4 4 0 0 1 0 7.75"></path>
                </svg>
            `;
        }

        function getAchievementIcon(tag = "") {
            const trophy = `<svg viewBox="0 0 24 24" class="ach-medal-icon"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v4a5 5 0 0 1-10 0V4z"/><path d="M17 6h2a2 2 0 0 1-2 5"/><path d="M7 6H5a2 2 0 0 0 2 5"/></svg>`;
            const medal = `<svg viewBox="0 0 24 24" class="ach-medal-icon"><circle cx="12" cy="14" r="6"/><path d="M8 8.7V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v4.7"/><path d="M12 11v3l1.5 1.5"/></svg>`;
            const award = `<svg viewBox="0 0 24 24" class="ach-medal-icon"><circle cx="12" cy="8" r="5"/><path d="M8.56 14.44L7 22l5-3 5 3-1.56-7.56"/></svg>`;

            const value = String(tag).toLowerCase();

            if (value.includes("champion") || value.includes("gold")) {
                return { icon: trophy, type: "gold" };
            }

            if (value.includes("1st") || value.includes("silver")) {
                return { icon: medal, type: "silver" };
            }

            return { icon: award, type: "bronze" };
        }

        function getActionButtons(item) {
            const buttons = [];

            if (item.projectLink) {
                buttons.push(`
                    <a class="action-btn primary" href="${item.projectLink}" target="_blank" rel="noopener noreferrer">
                        <span>View Project</span>
                        <span>↗</span>
                    </a>
                `);
            }

            if (item.recognitionLink) {
                buttons.push(`
                    <a class="action-btn" href="${item.recognitionLink}" target="_blank" rel="noopener noreferrer">
                        <span>Recognition</span>
                        <span>↗</span>
                    </a>
                `);
            }

            return buttons.join("");
        }

        function createCard(item, index) {
            const article = document.createElement("article");
            const achievementIcon = getAchievementIcon(item.tag);

            article.className = `achievement-card ${index >= initialVisibleCount ? "hidden" : ""}`;

            article.innerHTML = `
                <button class="achievement-trigger" type="button" aria-expanded="false">
                    <div class="achievement-head">
                        <div class="achievement-badge ${achievementIcon.type}">
                            ${achievementIcon.icon}
                        </div>

                        <div class="achievement-main">
                            <h2 class="achievement-title">${escapeHtml(item.closedTitle)}</h2>
                            <p class="achievement-subtitle">${escapeHtml(item.closedSubtitle)}</p>
                        </div>
                    </div>

                    <div class="achievement-toggle">↓</div>
                </button>

                <div class="achievement-body">
                    <div class="achievement-body-inner">
                        <div class="achievement-content">
                            <div class="achievement-shell">
                                <div class="detail-panel">
                                    <div>
                                        <h3 class="project-name">${escapeHtml(item.projectName)}</h3>
                                        <p class="project-details">${escapeHtml(item.projectDetails)}</p>

                                        <div class="meta-row">
                                            <div class="meta-pill">
                                                <span class="meta-icon">${getCategoryIcon()}</span>
                                                <span>${escapeHtml(item.category)}</span>
                                            </div>
                                            <div class="meta-pill">
                                                <span class="meta-icon">${getTeamIcon()}</span>
                                                <span>${escapeHtml(item.team)}</span>
                                            </div>
                                        </div>
                                    </div>

                                    ${getActionButtons(item) ? `<div class="action-row">${getActionButtons(item)}</div>` : ""}
                                </div>

                                <div class="image-panel" style="background:
                                    linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.36)),
                                    url('${item.image}') center/cover no-repeat;">
                                    <div class="image-overlay">
                                        <div class="image-copy">
                                            <div class="image-label">Project</div>
                                            <div class="image-title">${escapeHtml(item.projectName)}</div>
                                        </div>

                                    </div>
                                </div>

                        </div>
                    </div>
                </div>
            `;

            return article;
        }

        achievements.forEach((item, index) => {
            list.appendChild(createCard(item, index));
        });

        const cards = [...document.querySelectorAll(".achievement-card")];

        function closeOthers(activeCard) {
            cards.forEach((card) => {
                const trigger = card.querySelector(".achievement-trigger");

                if (card !== activeCard) {
                    card.classList.remove("open");
                    trigger.setAttribute("aria-expanded", "false");
                }
            });
        }

        cards.forEach((card) => {
            const trigger = card.querySelector(".achievement-trigger");

            trigger.addEventListener("click", () => {
                const isOpen = card.classList.contains("open");
                closeOthers(card);

                if (isOpen) {
                    card.classList.remove("open");
                    trigger.setAttribute("aria-expanded", "false");
                } else {
                    card.classList.add("open");
                    trigger.setAttribute("aria-expanded", "true");
                }
            });
        });

        let expandedList = false;

        moreBtn.addEventListener("click", () => {
            expandedList = !expandedList;

            cards.forEach((card, index) => {
                if (index >= initialVisibleCount) {
                    if (expandedList) {
                        card.classList.remove("hidden");
                    } else {
                        card.classList.add("hidden");
                        card.classList.remove("open");
                        card.querySelector(".achievement-trigger").setAttribute("aria-expanded", "false");
                    }
                }
            });

            moreBtn.classList.toggle("expanded", expandedList);
            moreBtn.setAttribute("aria-expanded", expandedList ? "true" : "false");
            moreBtn.querySelector(".label").textContent = expandedList ? "Show Less" : "More";
        });
    </script>
