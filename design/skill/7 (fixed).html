<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Engineering × Capability Groups</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #080b10;
            --panel: rgba(255, 255, 255, 0.025);
            --panel-2: rgba(255, 255, 255, 0.018);
            --line: rgba(255, 255, 255, 0.07);
            --line-strong: rgba(255, 255, 255, 0.12);
            --text-1: #f1f5f9;
            --text-2: #cbd5e1;
            --text-3: #94a3b8;
            --text-4: #475569;
            --accent: #63b3ed;
            --accent-2: #3b82f6;
            --glow: rgba(99, 179, 237, 0.14);
            --radius: 26px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
            overflow-x: hidden;
            padding: 0 0 100px;
        }

        body::before {
            content: "";
            position: fixed;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 1100px;
            height: 580px;
            background: radial-gradient(ellipse, rgba(99, 179, 237, 0.05) 0%, transparent 68%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: radial-gradient(circle at center, black 28%, transparent 78%);
            pointer-events: none;
            opacity: .28;
            z-index: 0;
        }

        .container {
            width: min(1120px, calc(100% - 40px));
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .skills-section {
            padding-top: 72px;
            opacity: 0;
            transform: translateY(20px);
            animation: rise .8s .05s ease forwards;
        }

        .section-head {
            display: grid;
            grid-template-columns: 1.15fr auto;
            gap: 24px;
            align-items: end;
            padding-bottom: 28px;
            border-bottom: 1px solid var(--line-strong);
            margin-bottom: 18px;
        }

        .eyebrow {
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.8rem, 6.8vw, 5rem);
            line-height: .92;
            letter-spacing: -.05em;
            font-weight: 700;
        }

        .title em {
            font-style: normal;
            background: linear-gradient(100deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub {
            margin-top: 16px;
            max-width: 650px;
            font-size: .93rem;
            line-height: 1.8;
            color: var(--text-3);
        }

        .head-stat {
            text-align: right;
            padding-bottom: 6px;
        }

        .head-stat-num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3.5rem, 7vw, 4.7rem);
            line-height: 1;
            font-weight: 700;
            letter-spacing: -.06em;
            color: rgba(255, 255, 255, 0.06);
        }

        .head-stat-label {
            margin-top: 6px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--text-4);
        }

        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0;
            /* padding: 14px 0; */
            /* border-bottom: 1px solid var(--line); */
            margin-bottom: 18px;
        }

        .top-bar-item {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--text-4);
            padding-right: 28px;
            margin-right: 28px;
            border-right: 1px solid var(--line);
            white-space: nowrap;
        }

        .top-bar-item:last-child {
            padding-right: 0;
            margin-right: 0;
            border-right: none;
        }

        .top-bar-item span {
            color: var(--text-3);
            margin-left: 6px;
        }

        .skills-main {
            display: grid;
            gap: 26px;
        }

        .part-group {
            /* border-top: 1px solid var(--line-strong); */
            /* padding-top: 22px; */
            opacity: 0;
            transform: translateY(20px);
            animation: rise .7s ease forwards;
        }

        .part-group:nth-child(1) {
            animation-delay: .12s;
        }

        .part-group:nth-child(2) {
            animation-delay: .22s;
        }

        .part-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }

        .part-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.2rem, 2vw, 1.65rem);
            font-weight: 700;
            letter-spacing: -.03em;
            color: var(--text-1);
        }

        .part-meta {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--text-4);
            white-space: nowrap;
        }

        .part-sep {
            height: 1px;
            background: var(--line);
            margin-bottom: 6px;
        }

        .skill-row {
            position: relative;
            display: grid;
            grid-template-columns: 58px 1fr;
            gap: 0 18px;
            align-items: start;
            padding: 18px 16px 18px 10px;
            border-bottom: 1px solid var(--line);
            transition: transform .28s ease, background .28s ease, border-color .28s ease;
            overflow: hidden;
        }

        .skill-row::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(99, 179, 237, 0.05), transparent 62%);
            opacity: 0;
            transition: opacity .3s ease;
            pointer-events: none;
        }

        .skill-row::after {
            content: "";
            position: absolute;
            left: 0;
            top: 14px;
            bottom: 14px;
            width: 2px;
            background: linear-gradient(180deg, var(--accent), var(--accent-2));
            opacity: 0;
            transform: scaleY(.7);
            transition: .28s ease;
        }

        .skill-row:hover {
            transform: translateX(4px);
            background: rgba(255, 255, 255, 0.015);
            border-color: rgba(99, 179, 237, 0.16);
        }

        .skill-row:hover::before {
            opacity: 1;
        }

        .skill-row:hover::after {
            opacity: 1;
            transform: scaleY(1);
        }

        .skill-num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            line-height: 1;
            font-weight: 700;
            letter-spacing: -.05em;
            color: rgba(255, 255, 255, .07);
            padding-top: 2px;
            padding-left: 4px;
            user-select: none;
            transition: color .28s ease;
            text-align: left;
        }

        .skill-row:hover .skill-num {
            color: rgba(99, 179, 237, 0.22);
        }

        .skill-body {
            min-width: 0;
        }

        .skill-top {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
        }

        .skill-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.06rem;
            line-height: 1.2;
            font-weight: 700;
            letter-spacing: -.02em;
            color: var(--text-1);
        }

        .skill-kicker {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--text-4);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 11px;
            border-radius: 999px;
            background: var(--panel);
            border: 1px solid var(--line);
            color: var(--text-2);
            font-size: .79rem;
            font-weight: 500;
            letter-spacing: .01em;
            transition: .25s ease;
        }

        .skill-row:hover .tag {
            color: var(--text-1);
            border-color: rgba(99, 179, 237, 0.2);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 0 1px rgba(99, 179, 237, 0.03), 0 0 24px rgba(99, 179, 237, 0.05);
            transform: translateY(-1px);
        }

        @keyframes rise {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 980px) {
            .section-head {
                grid-template-columns: 1fr;
                align-items: start;
            }

            .head-stat {
                text-align: left;
                padding-bottom: 0;
            }
        }

        @media (max-width: 640px) {
            .container {
                width: min(1120px, calc(100% - 22px));
            }

            .skills-section {
                padding-top: 56px;
            }

            .title {
                font-size: clamp(2.25rem, 10vw, 3.5rem);
            }

            .skill-row {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 16px 0;
            }

            .skill-top {
                flex-direction: column;
                gap: 6px;
                align-items: flex-start;
            }

            .skill-num {
                font-size: 1.45rem;
            }

            .part-row {
                flex-direction: column;
                gap: 6px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <section class="skills-section" id="skills">
            <div class="section-head">
                <div>
                    <div class="eyebrow">Engineering × Product Depth</div>
                    <h1 class="title">Skills & <br><em>Capabilities</em>
                    </h1>
                    <p class="sub">
                        A structured view of my engineering, analytics, product, design, and collaboration skills across
                        software development and product-oriented work.
                    </p>
                </div>

                <div class="head-stat">
                    <div class="head-stat-num">13</div>
                    <div class="head-stat-label">Capability Groups</div>
                </div>
            </div>

            <!-- <div class="top-bar">
                <div class="top-bar-item">Profile<span>Engineering + Product</span></div>
                <div class="top-bar-item">Structure<span>Grouped Showcase</span></div>
                <div class="top-bar-item">Style<span>Minimal / Premium</span></div>
                <div class="top-bar-item">Interaction<span>Hover Highlight</span></div>
            </div> -->

            <div class="skills-main" id="skillsRoot"></div>
        </section>
    </div>

    <script>
        const parts = [
            {
                name: "Product",
                count: "06 categories",
                skills: [
                    {
                        n: "01",
                        kicker: "Foundation",
                        name: "Engineering & Product Foundation",
                        tags: [
                            "Product Thinking", "Product Strategy", "System Thinking",
                            "Requirement Gathering", "Feature Scoping", "Stakeholder Management",
                            "Business Analysis", "Agile", "Scrum"
                        ]
                    },
                    {
                        n: "02",
                        kicker: "Analytics",
                        name: "Product Analytics & Data",
                        tags: [
                            "Python", "Pandas", "NumPy", "MySQL", "Excel", "Google Sheets"
                        ]
                    },
                    {
                        n: "03",
                        kicker: "Research",
                        name: "User Research & Validation",
                        tags: [
                            "User Research", "User Interviews", "Survey Design",
                            "Usability Testing", "Competitive Analysis", "Market Research",
                            "Journey Mapping", "User-Centered Design"
                        ]
                    },
                    {
                        n: "04",
                        kicker: "Execution",
                        name: "Product Execution & Collaboration",
                        tags: [
                            "PRD Writing", "User Stories", "Acceptance Criteria",
                            "Documentation", "Task Planning", "Cross-functional Collaboration",
                            "Jira", "Notion"
                        ]
                    },
                    {
                        n: "05",
                        kicker: "Design",
                        name: "Design & Prototyping",
                        tags: [
                            "Figma", "Wireframing", "Prototyping",
                            "Information Architecture", "UX Thinking", "Photoshop"
                        ]
                    },
                    {
                        n: "06",
                        kicker: "Leadership",
                        name: "Communication & Leadership",
                        tags: [
                            "Stakeholder Communication", "Presentation", "Team Coordination",
                            "Leadership", "Mentoring", "Workshop Facilitation", "Decision Making"
                        ]
                    }
                ]
            },
            {
                name: "Software Development",
                count: "07 categories",
                skills: [
                    {
                        n: "07",
                        kicker: "Core",
                        name: "Core Engineering",
                        tags: [
                            "Data Structures & Algorithms", "OOP", "System Design"
                        ]
                    },
                    {
                        n: "08",
                        kicker: "Languages",
                        name: "Programming Languages",
                        tags: [
                            "C", "C++", "Java", "Python", "JavaScript", "PHP"
                        ]
                    },
                    {
                        n: "09",
                        kicker: "Application",
                        name: "Web Development",
                        tags: [
                            "HTML5", "CSS3", "Bootstrap", "JavaScript",
                            "React", "Next.js", "Node.js", "PHP"
                        ]
                    },
                    {
                        n: "10",
                        kicker: "Storage",
                        name: "Databases",
                        tags: [
                            "MySQL", "Database Design"
                        ]
                    },
                    {
                        n: "11",
                        kicker: "Infrastructure",
                        name: "DevOps & Systems",
                        tags: [
                            "Git", "GitHub", "Linux", "Bash"
                        ]
                    },
                    {
                        n: "12",
                        kicker: "Quality",
                        name: "APIs & Testing",
                        tags: [
                            "Postman", "Selenium"
                        ]
                    },
                    {
                        n: "13",
                        kicker: "Tools",
                        name: "AI & Development Environment",
                        tags: [
                            "Machine Learning", "Google Colab", "Roboflow", "Pandas",
                            "NumPy", "Visual Studio Code", "Arduino", "Overleaf"
                        ]
                    }
                ]
            }
        ];

        const root = document.getElementById("skillsRoot");

        parts.forEach((part) => {
            const group = document.createElement("section");
            group.className = "part-group";

            const partRow = document.createElement("div");
            partRow.className = "part-row";
            partRow.innerHTML = `
        <div class="part-name">${part.name}</div>
        <div class="part-meta">${part.count}</div>
      `;

            const sep = document.createElement("div");
            sep.className = "part-sep";

            group.appendChild(partRow);
            group.appendChild(sep);

            part.skills.forEach((s) => {
                const row = document.createElement("article");
                row.className = "skill-row";
                row.innerHTML = `
          <div class="skill-num">${s.n}</div>
          <div class="skill-body">
            <div class="skill-top">
              <span class="skill-name">${s.name}</span>
              <span class="skill-kicker">${s.kicker}</span>
            </div>
            <div class="tags">
              ${s.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}
            </div>
          </div>
        `;
                group.appendChild(row);
            });

            root.appendChild(group);
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.style.animationPlayState = "running";
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.08 });

        document.querySelectorAll('.skills-section, .part-group').forEach((el) => {
            el.style.animationPlayState = "paused";
            observer.observe(el);
        });
    </script>
</body>

</html>
