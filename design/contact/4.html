<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #080b10;
            --panel: rgba(12, 16, 24, .76);
            --panel-2: rgba(255, 255, 255, .03);
            --line: rgba(255, 255, 255, .08);
            --line-2: rgba(255, 255, 255, .14);
            --text: #f1f5f9;
            --text-soft: #cbd5e1;
            --muted: #94a3b8;
            --accent: #63b3ed;
            --accent-2: #93c5fd;
            --shadow: 0 24px 80px rgba(0, 0, 0, .38);
            --radius-xl: 34px;
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 15% 10%, rgba(99, 179, 237, .10), transparent 28%),
                radial-gradient(circle at 85% 85%, rgba(99, 179, 237, .06), transparent 24%),
                linear-gradient(180deg, #070a0f 0%, #080b10 100%);
            color: var(--text);
            font-family: "Inter", sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: .75;
            z-index: 0;
        }

        .contact-section {
            position: relative;
            z-index: 1;
            padding: 84px 22px;
        }

        .contact-wrap {
            max-width: 1120px;
            margin: 0 auto;
        }

        .contact-card {
            position: relative;
            display: grid;
            grid-template-columns: 1.02fr .98fr;
            gap: 18px;
            padding: 18px;
            border-radius: var(--radius-xl);
            background: rgba(255, 255, 255, .015);
            border: 1px solid rgba(255, 255, 255, .05);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            overflow: hidden;
        }

        .contact-card::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at top left, rgba(99, 179, 237, .09), transparent 24%),
                linear-gradient(180deg, rgba(255, 255, 255, .02), transparent 35%);
        }

        .contact-left,
        .contact-right {
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(12, 16, 24, .86), rgba(8, 11, 16, .92));
        }

        .contact-left {
            padding: 34px;
            min-height: 560px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .contact-right {
            padding: 34px;
            display: flex;
            align-items: center;
        }

        .contact-left::before,
        .contact-right::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 100% 0%, rgba(147, 197, 253, .08), transparent 24%),
                radial-gradient(circle at 0% 100%, rgba(99, 179, 237, .06), transparent 24%);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            width: fit-content;
            padding: 9px 13px;
            border-radius: 999px;
            border: 1px solid rgba(99, 179, 237, .18);
            background: rgba(99, 179, 237, .06);
            color: var(--accent-2);
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .eyebrow-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px rgba(99, 179, 237, .85);
        }

        .contact-title {
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(2.3rem, 4.6vw, 4.8rem);
            line-height: .94;
            letter-spacing: -.06em;
            font-weight: 800;
            max-width: 520px;
        }

        .contact-title span {
            background: linear-gradient(135deg, #fff 0%, #dbeafe 38%, #93c5fd 70%, #63b3ed 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .contact-text {
            margin-top: 18px;
            max-width: 500px;
            color: var(--muted);
            font-size: .97rem;
            line-height: 1.9;
        }

        .contact-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 28px;
        }

        .icon-link {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-soft);
            text-decoration: none;
            border: 1px solid var(--line);
            background: var(--panel-2);
            transition: .28s ease;
            position: relative;
            overflow: hidden;
        }

        .icon-link::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(147, 197, 253, .12), transparent 60%);
            opacity: 0;
            transition: .28s ease;
        }

        .icon-link:hover {
            transform: translateY(-2px);
            border-color: rgba(99, 179, 237, .28);
            color: var(--accent-2);
            background: rgba(99, 179, 237, .06);
            box-shadow: 0 10px 24px rgba(0, 0, 0, .16);
        }

        .icon-link:hover::before {
            opacity: 1;
        }

        .icon-link svg {
            width: 19px;
            height: 19px;
            position: relative;
            z-index: 1;
        }

        .contact-foot {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 20px;
            margin-top: 26px;
            flex-wrap: wrap;
        }

        .availability {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: 15px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .03);
            color: var(--text-soft);
            font-size: .9rem;
        }

        .availability-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, .8);
            flex-shrink: 0;
        }

        .big-word {
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 800;
            line-height: .95;
            letter-spacing: -.06em;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, .18);
            white-space: nowrap;
        }

        .form-shell {
            width: 100%;
            display: grid;
            gap: 16px;
        }

        .form-head {
            margin-bottom: 4px;
        }

        .form-kicker {
            color: var(--accent-2);
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: .09em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .form-title {
            font-size: clamp(1.55rem, 2.4vw, 2.15rem);
            line-height: 1.02;
            letter-spacing: -.04em;
            font-weight: 800;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            color: var(--text-soft);
            font-size: .88rem;
            font-weight: 600;
            letter-spacing: -.01em;
        }

        .field input,
        .field textarea {
            width: 100%;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .03);
            color: var(--text);
            border-radius: 17px;
            outline: none;
            padding: 15px 16px;
            font-family: "Inter", sans-serif;
            font-size: .96rem;
            transition: .28s ease;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .02);
        }

        .field textarea {
            min-height: 150px;
            resize: vertical;
        }

        .field input::placeholder,
        .field textarea::placeholder {
            color: rgba(148, 163, 184, .72);
        }

        .field input:focus,
        .field textarea:focus {
            border-color: rgba(99, 179, 237, .44);
            background: rgba(99, 179, 237, .04);
            box-shadow: 0 0 0 4px rgba(99, 179, 237, .08);
        }

        .captcha-row {
            display: grid;
            grid-template-columns: 110px 1fr 52px;
            gap: 10px;
            align-items: end;
        }

        .captcha-box {
            height: 52px;
            border-radius: 16px;
            border: 1px solid rgba(147, 197, 253, .16);
            background:
                linear-gradient(135deg, rgba(99, 179, 237, .12), rgba(59, 130, 246, .05)),
                rgba(255, 255, 255, .02);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.08rem;
            font-weight: 800;
            letter-spacing: .16em;
            color: #dbeafe;
            user-select: none;
        }

        .refresh-btn {
            height: 52px;
            border: none;
            outline: none;
            border-radius: 16px;
            cursor: pointer;
            background: rgba(255, 255, 255, .03);
            border: 1px solid var(--line);
            color: var(--text-soft);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: .28s ease;
        }

        .refresh-btn:hover {
            transform: translateY(-2px) rotate(8deg);
            color: var(--accent-2);
            border-color: rgba(99, 179, 237, .28);
            background: rgba(99, 179, 237, .06);
        }

        .refresh-btn svg {
            width: 18px;
            height: 18px;
        }

        .form-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 2px;
        }

        .status {
            min-height: 22px;
            color: var(--muted);
            font-size: .9rem;
            font-weight: 500;
        }

        .status.error {
            color: #f87171;
        }

        .status.success {
            color: #86efac;
        }

        .send-btn {
            border: none;
            outline: none;
            cursor: pointer;
            border-radius: 16px;
            padding: 14px 20px;
            min-width: 170px;
            font-family: "Inter", sans-serif;
            font-size: .95rem;
            font-weight: 700;
            letter-spacing: -.01em;
            color: #0f172a;
            background: linear-gradient(135deg, #dbeafe 0%, #93c5fd 35%, #63b3ed 70%, #3b82f6 100%);
            box-shadow:
                0 0 0 1px rgba(147, 197, 253, .24),
                0 12px 28px rgba(59, 130, 246, .22);
            transition: .28s ease;
            position: relative;
            overflow: hidden;
        }

        .send-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(255, 255, 255, .35), transparent 55%);
            pointer-events: none;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.04);
            box-shadow:
                0 0 0 1px rgba(147, 197, 253, .30),
                0 18px 34px rgba(59, 130, 246, .28);
        }

        .send-btn:disabled {
            opacity: .7;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 980px) {
            .contact-card {
                grid-template-columns: 1fr;
            }

            .contact-left {
                min-height: auto;
            }
        }

        @media (max-width: 720px) {
            .contact-section {
                padding: 64px 16px;
            }

            .contact-card {
                padding: 12px;
                border-radius: 24px;
            }

            .contact-left,
            .contact-right {
                padding: 22px;
                border-radius: 20px;
            }

            .captcha-row {
                grid-template-columns: 1fr;
            }

            .send-btn {
                width: 100%;
            }

            .form-bottom {
                align-items: stretch;
            }

            .big-word {
                white-space: normal;
            }
        }
    </style>
</head>

<body>
    <section class="contact-section" id="contact">
        <div class="contact-wrap">
            <div class="contact-card">
                <div class="contact-left">
                    <div>
                        <div class="eyebrow">
                            <span class="eyebrow-dot"></span>
                            Contact
                        </div>

                        <h2 class="contact-title">
                            Let’s talk about <span>better products.</span>
                        </h2>

                        <p class="contact-text">
                            I’m currently seeking opportunities in Product Management where I can contribute to building
                            user-focused products and continue learning through real-world challenges.
                        </p>

                        <div class="contact-actions">
                            <a class="icon-link" href="mailto:tashinparvez2002@gmail.com" aria-label="Email">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                    <path
                                        d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5v-11Z" />
                                    <path d="m5 7 7 5 7-5" />
                                </svg>
                            </a>

                            <a class="icon-link" href="https://www.linkedin.com/in/tashinparvez" target="_blank"
                                rel="noopener noreferrer" aria-label="LinkedIn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                    <path d="M16 8a6 6 0 0 1 6 6v7h-4v-6a2 2 0 1 0-4 0v6h-4v-6a6 6 0 0 1 6-6Z" />
                                    <rect x="2" y="9" width="4" height="12" rx="1" />
                                    <circle cx="4" cy="4" r="2" />
                                </svg>
                            </a>

                            <a class="icon-link" href="https://github.com/TashinParvez" target="_blank"
                                rel="noopener noreferrer" aria-label="GitHub">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                    <path
                                        d="M9 19c-4.3 1.4-4.3-2.4-6-3m12 6v-3.5a3 3 0 0 0-.88-2.12c2.94-.33 6.03-1.44 6.03-6.53A5.1 5.1 0 0 0 18.8 6.3 4.75 4.75 0 0 0 18.72 3S17.65 2.67 15 4.48a13.38 13.38 0 0 0-6 0C6.35 2.67 5.28 3 5.28 3A4.75 4.75 0 0 0 5.2 6.3 5.1 5.1 0 0 0 3.85 9.85c0 5.05 3.05 6.2 5.99 6.53A3 3 0 0 0 9 18.5V22" />
                                </svg>
                            </a>

                            <a class="icon-link" href="tel:+8801954449226" aria-label="Phone">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                    <path
                                        d="M8 11a7 7 0 0 0 5 5l1.7-1.7a1 1 0 0 1 1-.24 11.2 11.2 0 0 0 3.52.56 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.38a1 1 0 0 1 1 1 11.2 11.2 0 0 0 .56 3.52 1 1 0 0 1-.24 1L7 10.2" />
                                </svg>
                            </a>
                        </div>
                    </div>

                    <div class="contact-foot">
                        <div class="availability">
                            <span class="availability-dot"></span>
                            Open to PM roles
                        </div>
                        <div class="big-word">Connect()</div>
                    </div>
                </div>

                <div class="contact-right">
                    <form class="form-shell" id="contactForm" novalidate>
                        <div class="form-head">
                            <div class="form-kicker">Send a message</div>
                            <h3 class="form-title">Minimal, sharp, and direct.</h3>
                        </div>

                        <div class="field">
                            <label for="name">Name</label>
                            <input type="text" id="name" placeholder="Your name" required>
                        </div>

                        <div class="field">
                            <label for="email">Mail</label>
                            <input type="email" id="email" placeholder="Your email" required>
                        </div>

                        <div class="field">
                            <label for="message">Message</label>
                            <textarea id="message" placeholder="Write your message..." required></textarea>
                        </div>

                        <div class="field">
                            <label for="captchaInput">Captcha</label>
                            <div class="captcha-row">
                                <div class="captcha-box" id="captchaValue">0000</div>
                                <input type="text" id="captchaInput" placeholder="Type number" inputmode="numeric"
                                    autocomplete="off" required>
                                <button type="button" class="refresh-btn" id="refreshCaptcha"
                                    aria-label="Refresh captcha">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">
                                        <path d="M20 11a8 8 0 0 0-14.9-3M4 13a8 8 0 0 0 14.9 3" />
                                        <path d="M3 4v5h5M21 20v-5h-5" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="form-bottom">
                            <div class="status" id="formStatus" aria-live="polite"></div>
                            <button type="submit" class="send-btn" id="sendBtn">Send Message</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script>
        const form = document.getElementById("contactForm");
        const captchaValue = document.getElementById("captchaValue");
        const captchaInput = document.getElementById("captchaInput");
        const refreshCaptcha = document.getElementById("refreshCaptcha");
        const formStatus = document.getElementById("formStatus");
        const sendBtn = document.getElementById("sendBtn");

        let currentCaptcha = "";

        function generateCaptcha() {
            currentCaptcha = String(Math.floor(1000 + Math.random() * 9000));
            captchaValue.textContent = currentCaptcha;
            captchaInput.value = "";
        }

        function setStatus(message, type = "") {
            formStatus.textContent = message;
            formStatus.className = "status";
            if (type) formStatus.classList.add(type);
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
        }

        refreshCaptcha.addEventListener("click", generateCaptcha);

        form.addEventListener("submit", function (e) {
            e.preventDefault();
            setStatus("");

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const message = document.getElementById("message").value.trim();
            const captcha = captchaInput.value.trim();

            if (!name || !email || !message || !captcha) {
                setStatus("Fill all fields and captcha.", "error");
                return;
            }

            if (!validateEmail(email)) {
                setStatus("Enter a valid email.", "error");
                return;
            }

            if (captcha !== currentCaptcha) {
                setStatus("Captcha did not match.", "error");
                generateCaptcha();
                captchaInput.focus();
                return;
            }

            sendBtn.disabled = true;
            setStatus("Verified. Opening mail app...", "success");

            const finalSubject = encodeURIComponent(`Portfolio Contact | ${name}`);
            const finalBody = encodeURIComponent(
                `Name: ${name}
Email: ${email}

Message:
${message}`
            );

            window.location.href = `mailto:tashinparvez2002@gmail.com?subject=${finalSubject}&body=${finalBody}`;

            setTimeout(() => {
                form.reset();
                generateCaptcha();
                sendBtn.disabled = false;
            }, 700);
        });

        generateCaptcha();
    </script>
</body>

</html>
