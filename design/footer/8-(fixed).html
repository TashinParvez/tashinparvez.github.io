<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Updated Portfolio Footer</title>

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #07070b;
            --text: #f3f4f6;
            --muted: #9ca3af;
            --line: rgba(255, 255, 255, 0.12);
            --card: rgba(255, 255, 255, 0.05);
            --accent: #8b5cf6;
            --accent-2: #60a5fa;
        }

        body {
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            background: #111;
            color: var(--text);
        }

        .footer {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(139, 92, 246, 0.18), transparent 30%),
                radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.14), transparent 28%),
                linear-gradient(135deg, #050509 0%, #090914 55%, #06060a 100%);
            padding: 90px 8% 34px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .footer::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.14) 1px, transparent 1px);
            background-size: 42px 42px;
            opacity: 0.08;
            pointer-events: none;
        }

        .footer-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1320px;
            margin: 0 auto;
        }

        .footer-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 32px;
            padding-bottom: 42px;
            border-bottom: 1px solid var(--line);
        }

        .footer-left {
            flex: 1;
        }

        .footer-left h2 {
            font-size: clamp(2.3rem, 5vw, 5rem);
            line-height: 0.98;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 14px;
            max-width: 760px;
        }

        .footer-left p {
            max-width: 620px;
            font-size: 1.02rem;
            line-height: 1.9;
            color: var(--muted);
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .contact-pill,
        .social-link {
            height: 56px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--line);
            background: var(--card);
            backdrop-filter: blur(10px);
            transition: 0.3s ease;
        }

        .contact-pill {
            padding: 0 22px;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .contact-pill i {
            font-size: 1.1rem;
            color: #d8b4fe;
        }

        .social-link {
            width: 56px;
            font-size: 1.28rem;
        }

        .contact-pill:hover,
        .social-link:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.45);
            background: rgba(139, 92, 246, 0.14);
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.16);
        }

        .footer-bottom {
            padding-top: 28px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 26px;
            flex-wrap: wrap;
        }

        .footer-meta {
            display: flex;
            align-items: center;
            gap: 28px;
            flex-wrap: wrap;
        }

        .metric-group {
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
        }

        .metric {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.04em;
            color: #fff;
        }

        .metric-label {
            font-size: 0.92rem;
            color: var(--muted);
            line-height: 1.4;
        }

        .footer-divider {
            width: 1px;
            height: 52px;
            background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.22), transparent);
            align-self: center;
        }

        .footer-copy {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .footer-copy .name-line {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.03em;
        }

        .footer-copy .copyright {
            color: var(--muted);
        }

        .footer-copy .name {
            color: #fff;
        }

        .footer-copy .tag-line {
            font-size: 0.98rem;
            color: var(--muted);
            line-height: 1.6;
        }

        .keep-building {
            font-size: clamp(2.8rem, 8vw, 7rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.95;
            white-space: nowrap;
            color: transparent;
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.25);
        }

        @media (max-width: 980px) {
            .footer-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .footer-right {
                justify-content: flex-start;
            }

            .footer-bottom {
                flex-direction: column;
                align-items: flex-start;
            }

            .keep-building {
                white-space: normal;
            }
        }

        @media (max-width: 640px) {
            .footer {
                padding: 72px 6% 28px;
            }

            .footer-right {
                gap: 12px;
            }

            .contact-pill {
                width: 100%;
                justify-content: center;
            }

            .social-link {
                width: 52px;
                height: 52px;
            }

            .metric-group {
                gap: 18px;
            }

            .metric-value {
                font-size: 1.3rem;
            }

            .footer-divider {
                display: none;
            }
        }
    </style>
</head>

<body>

    <footer class="footer">
        <div class="footer-wrapper">

            <div class="footer-top">
                <div class="footer-left">
                    <h2>Let’s build something togather</h2>
                    <p>
                        Open to meaningful collaborations, ambitious ideas, and products that deserve
                        clean design and solid frontend execution.
                    </p>
                </div>

                <div class="footer-right" style="display: grid;">
                    <div>
                        <a class="contact-pill" href="mailto:tashinparvez2002@gmail.com">
                            <i class="ri-mail-line"></i>
                            <span>tashinparvez2002@gmail.com</span>
                        </a>
                    </div>

                    <div>
                        <a class="social-link" href="https://github.com/TashinParvez" target="_blank"
                            aria-label="GitHub">
                            <i class="ri-github-fill"></i>
                        </a>

                        <a class="social-link" href="#" target="_blank" aria-label="LinkedIn">
                            <i class="ri-linkedin-box-fill"></i>
                        </a>

                        <a class="social-link" href="#" target="_blank" aria-label="Twitter/X">
                            <i class="ri-twitter-x-line"></i>
                        </a>

                        <a class="social-link" href="#" target="_blank" aria-label="Twitter/X">
                            <i class="ri-twitter-x-line"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div class="footer-bottom">
                <div class="footer-meta">
                    <div class="metric-group text-center">
                        <div class="metric">
                            <div class="metric-value" id="totalStars">--</div>
                            <div class="metric-label">Stars</div>
                        </div>

                        <div class="metric">
                            <div class="metric-value" id="totalForks">--</div>
                            <div class="metric-label">Forks</div>
                        </div>
                    </div>

                    <div class="footer-divider" aria-hidden="true"></div>

                    <div class="footer-copy">
                        <div class="name-line">
                            <span class="copyright">© 2026 </span><span class="name">Tashin Parvez</span>
                        </div>
                        <div class="tag-line">Built with intent, not just code.</div>
                    </div>
                </div>

                <div class="keep-building">Keep_Building()</div>
            </div>
        </div>
    </footer>

    <script>
        const username = "TashinParvez";

        function formatNumber(num) {
            if (num === null || num === undefined || Number.isNaN(num)) return "--";
            return new Intl.NumberFormat("en", {
                notation: num > 999 ? "compact" : "standard",
                maximumFractionDigits: 1
            }).format(num);
        }

        async function fetchAllRepos(username) {
            let page = 1;
            let repos = [];
            let hasMore = true;

            while (hasMore) {
                const res = await fetch(`https://api.github.com/users/${username}/repos?per_page=100&page=${page}`);
                if (!res.ok) throw new Error("Failed to fetch repositories");

                const data = await res.json();
                repos = repos.concat(data);

                if (data.length < 100) {
                    hasMore = false;
                } else {
                    page++;
                }
            }

            return repos;
        }

        async function getGitHubStats() {
            const totalStarsEl = document.getElementById("totalStars");
            const totalForksEl = document.getElementById("totalForks");

            try {
                const repos = await fetchAllRepos(username);

                const totalStars = repos.reduce((sum, repo) => sum + (repo.stargazers_count || 0), 0);
                const totalForks = repos.reduce((sum, repo) => sum + (repo.forks_count || 0), 0);

                totalStarsEl.textContent = formatNumber(totalStars);
                totalForksEl.textContent = formatNumber(totalForks);
            } catch (error) {
                totalStarsEl.textContent = "N/A";
                totalForksEl.textContent = "N/A";
                console.error("GitHub stats error:", error);
            }
        }

        getGitHubStats();
    </script>

</body>

</html>
