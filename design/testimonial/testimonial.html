<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testimonials Section</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #07070b;
            --bg-2: #0b0b11;
            --text: #f5f7fb;
            --muted: #a5adba;
            --line: rgba(255, 255, 255, 0.08);
            --accent: #ff4338;
            --card-light: #ece9cf;
            --card-light-text: #ff4338;
            --card-dark: #ff4338;
            --card-dark-text: #fff3dc;
            --shadow-red: 0 20px 60px rgba(255, 67, 56, 0.18);
            --shadow-soft: 0 20px 70px rgba(0, 0, 0, 0.28);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 67, 56, 0.08), transparent 30%),
                radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.04), transparent 30%),
                linear-gradient(135deg, #050509 0%, #090914 50%, #06060a 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .testimonials-section {
            position: relative;
            overflow: hidden;
            padding: 110px 0 90px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            background:
                radial-gradient(circle at 15% 20%, rgba(255, 67, 56, 0.08), transparent 24%),
                radial-gradient(circle at 85% 80%, rgba(255, 255, 255, 0.04), transparent 24%);
        }

        .testimonials-section::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.12) 1px, transparent 1px);
            background-size: 38px 38px;
            opacity: 0.045;
            pointer-events: none;
        }

        .section-head {
            position: relative;
            z-index: 2;
            width: min(1280px, 92%);
            margin: 0 auto 52px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            flex-wrap: wrap;
        }

        .section-kicker {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.86rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #ff8e86;
            margin-bottom: 18px;
        }

        .section-kicker::before {
            content: "";
            width: 34px;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255, 67, 56, 0.95));
        }

        .section-title {
            font-size: clamp(2.6rem, 7vw, 6.2rem);
            line-height: 0.92;
            letter-spacing: -0.06em;
            font-weight: 900;
            max-width: 760px;
        }

        .section-title .outline {
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.2);
        }

        .section-text {
            max-width: 420px;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.8;
        }

        .carousel-wrap {
            position: relative;
            z-index: 2;
            display: grid;
            gap: 24px;
        }

        .carousel-row {
            position: relative;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
        }

        .carousel-track {
            width: max-content;
            display: flex;
            align-items: stretch;
            gap: 26px;
            will-change: transform;
        }

        .carousel-row.left .carousel-track {
            animation: scrollLeft 60s linear infinite;
        }

        .carousel-row.right .carousel-track {
            animation: scrollRight 60s linear infinite;
        }

        .carousel-row:hover .carousel-track {
            animation-play-state: paused;
        }

        .testimonial-card {
            position: relative;
            width: 380px;
            min-height: 300px;
            border-radius: 22px;
            padding: 30px 28px 26px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
        }

        .testimonial-card:nth-child(4n + 1) {
            transform: rotate(-1.8deg);
        }

        .testimonial-card:nth-child(4n + 2) {
            transform: rotate(1.4deg);
        }

        .testimonial-card:nth-child(4n + 3) {
            transform: rotate(-0.9deg);
        }

        .testimonial-card:nth-child(4n + 4) {
            transform: rotate(1.7deg);
        }

        .testimonial-card:hover {
            transform: translateY(-8px) rotate(0deg) !important;
        }

        .testimonial-card.dark {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0)),
                var(--card-dark);
            color: var(--card-dark-text);
            box-shadow: var(--shadow-red);
        }

        .testimonial-card.light {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0)),
                var(--card-light);
            color: var(--card-light-text);
            box-shadow: var(--shadow-soft);
        }

        .testimonial-card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .quote-mark {
            font-size: 4.8rem;
            line-height: 0.7;
            font-weight: 900;
            opacity: 0.9;
            margin-bottom: 14px;
            letter-spacing: -0.08em;
        }

        .dark .quote-mark {
            color: rgba(255, 243, 220, 0.95);
        }

        .light .quote-mark {
            color: rgba(255, 67, 56, 0.95);
        }

        .testimonial-text {
            font-size: 1.65rem;
            line-height: 1.3;
            letter-spacing: -0.045em;
            font-weight: 500;
            margin-bottom: 30px;
            max-width: 95%;
        }

        .testimonial-footer {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .writer-name {
            font-size: 1.02rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .writer-role {
            font-size: 0.93rem;
            opacity: 0.78;
            font-weight: 500;
        }

        .glow-orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(60px);
            pointer-events: none;
            opacity: 0.2;
        }

        .glow-orb.one {
            top: 80px;
            left: -80px;
            width: 220px;
            height: 220px;
            background: rgba(255, 67, 56, 0.35);
        }

        .glow-orb.two {
            bottom: 30px;
            right: -70px;
            width: 260px;
            height: 260px;
            background: rgba(255, 255, 255, 0.12);
        }

        @keyframes scrollLeft {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(calc(-50% - 13px));
            }
        }

        @keyframes scrollRight {
            from {
                transform: translateX(calc(-50% - 13px));
            }

            to {
                transform: translateX(0);
            }
        }

        @media (max-width: 900px) {
            .testimonials-section {
                padding: 88px 0 72px;
            }

            .section-head {
                margin-bottom: 38px;
            }

            .section-text {
                max-width: 100%;
            }

            .testimonial-card {
                width: 320px;
                min-height: 270px;
                padding: 24px 22px 22px;
            }

            .testimonial-text {
                font-size: 1.35rem;
            }
        }

        @media (max-width: 640px) {
            .testimonials-section {
                padding: 74px 0 60px;
            }

            .carousel-wrap {
                gap: 18px;
            }

            .carousel-track {
                gap: 18px;
            }

            .testimonial-card {
                width: 280px;
                min-height: 250px;
                border-radius: 18px;
                padding: 22px 18px 18px;
            }

            .quote-mark {
                font-size: 4rem;
                margin-bottom: 10px;
            }

            .testimonial-text {
                font-size: 1.12rem;
                line-height: 1.38;
                margin-bottom: 24px;
            }

            .writer-name {
                font-size: 0.96rem;
            }

            .writer-role {
                font-size: 0.84rem;
            }

            .carousel-row.left .carousel-track,
            .carousel-row.right .carousel-track {
                animation-duration: 42s;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .carousel-track {
                animation: none !important;
            }
        }
    </style>
</head>

<body>

    <section class="testimonials-section">
        <div class="glow-orb one"></div>
        <div class="glow-orb two"></div>

        <div class="section-head">
            <div>
                <div class="section-kicker">Testimonials</div>
                <h2 class="section-title">
                    What people say <span class="outline">about me</span>
                </h2>
            </div>
            <p class="section-text">
                A collection of words from people who have seen how I approach coding,
                problem-solving, collaboration, and continuous growth.
            </p>
        </div>

        <div class="carousel-wrap">
            <div class="carousel-row left">
                <div class="carousel-track" id="trackTop"></div>
            </div>

            <div class="carousel-row right">
                <div class="carousel-track" id="trackBottom"></div>
            </div>
        </div>
    </section>

    <script>
        const testimonials = [
            {
                text: "Working with Tashin was a game-changer. His problem-solving mindset and ability to break down complex logic into simple steps really stood out.",
                name: "Arif Hasan",
                role: "Software Engineer"
            },
            {
                text: "Tashin has an impressive analytical mind. Whether it's competitive programming or real-world coding challenges, he consistently delivers efficient solutions.",
                name: "Nusrat Jahan",
                role: "Computer Science Lecturer"
            },
            {
                text: "I've rarely seen someone so dedicated to improving every single day. Tashin doesn't just code—he thinks deeply about problems.",
                name: "Mahmud Rahman",
                role: "Tech Lead"
            },
            {
                text: "His ability to teach and explain concepts clearly makes him stand out. He helped me understand algorithms I struggled with for weeks.",
                name: "Fahim Ahmed",
                role: "Undergraduate Student"
            },
            {
                text: "Tashin approaches every challenge with creativity and persistence. That combination makes him a strong future leader in tech.",
                name: "Sabrina Karim",
                role: "Product Manager"
            },
            {
                text: "What impressed me most is his consistency. Competitive programming requires discipline, and Tashin has mastered that.",
                name: "Rakib Chowdhury",
                role: "Competitive Programmer"
            },
            {
                text: "He's not just focused on solving problems but also on understanding the why behind them. That mindset is rare and valuable.",
                name: "Tanvir Hossain",
                role: "Backend Developer"
            },
            {
                text: "Tashin brings energy and curiosity into everything he does. He's always exploring new ideas and pushing his limits.",
                name: "Jannatul Ferdous",
                role: "UI/UX Designer"
            },
            {
                text: "A highly motivated individual who is always willing to help others grow. His collaborative mindset makes him a great team member.",
                name: "Imran Kabir",
                role: "Team Coordinator"
            },
            {
                text: "Tashin has a strong foundation in algorithms and problem-solving. With his mindset, he's definitely on track for big achievements.",
                name: "Shafiq Islam",
                role: "Senior Software Engineer"
            }
        ];

        const topTrack = document.getElementById("trackTop");
        const bottomTrack = document.getElementById("trackBottom");

        function createCard(item, index) {
            const card = document.createElement("article");
            card.className = `testimonial-card ${index % 2 === 0 ? "dark" : "light"}`;

            card.innerHTML = `
        <div>
          <div class="quote-mark">“</div>
          <p class="testimonial-text">${item.text}</p>
        </div>
        <div class="testimonial-footer">
          <h3 class="writer-name">${item.name}</h3>
          <p class="writer-role">${item.role}</p>
        </div>
      `;

            return card;
        }

        const topRowData = testimonials.slice(0, 5);
        const bottomRowData = testimonials.slice(5);

        function fillTrack(track, data, offset = 0) {
            const duplicated = [...data, ...data];
            duplicated.forEach((item, index) => {
                track.appendChild(createCard(item, index + offset));
            });
        }

        fillTrack(topTrack, topRowData, 0);
        fillTrack(bottomTrack, bottomRowData, 3);
    </script>
</body>

</html>
