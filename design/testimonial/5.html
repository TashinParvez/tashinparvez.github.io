<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testimonials</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --testi-bg: transparent;
            --testi-border: rgba(255, 255, 255, 0.07);
            --testi-border-strong: rgba(255, 255, 255, 0.13);
            --testi-accent: #63b3ed;
            --testi-accent-2: #3b82f6;
            --testi-text-1: #f1f5f9;
            --testi-text-2: #cbd5e1;
            --testi-text-3: #94a3b8;
            --testi-text-4: #64748b;
            --testi-dim: rgba(255, 255, 255, 0.03);
            --testi-card: rgba(10, 14, 22, 0.58);
            --testi-shadow: 0 20px 50px rgba(0, 0, 0, 0.22);
            --testi-radius: 24px;
            --page-bg:
                radial-gradient(circle at 18% 18%, rgba(99, 179, 237, 0.08), transparent 28%),
                radial-gradient(circle at 85% 20%, rgba(59, 130, 246, 0.05), transparent 24%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 28%, rgba(255, 255, 255, 0.01)),
                #050816;
        }

        body {
            font-family: "Inter", sans-serif;
            background: var(--page-bg);
            color: var(--testi-text-1);
        }

        .testimonials-section {
            width: 100%;
            position: relative;
            overflow: hidden;
            padding: 110px 0 95px;
            background: var(--testi-bg);
        }

        .testimonials-section::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 12% 10%, rgba(99, 179, 237, 0.08), transparent 20%),
                radial-gradient(circle at 88% 82%, rgba(59, 130, 246, 0.06), transparent 20%);
            pointer-events: none;
        }

        .testimonials-wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 32px;
            position: relative;
            z-index: 1;
        }

        .testimonials-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 28px;
            align-items: end;
            margin-bottom: 42px;
        }

        .testimonials-kicker {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--testi-accent);
            margin-bottom: 18px;
        }

        .testimonials-kicker::before {
            content: "";
            width: 34px;
            height: 1px;
            background: linear-gradient(90deg, var(--testi-accent), transparent);
        }

        .testimonials-title {
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 700;
            line-height: 0.94;
            letter-spacing: -0.05em;
            color: var(--testi-text-1);
            margin-bottom: 16px;
        }

        .testimonials-title .accent {
            background: linear-gradient(100deg, var(--testi-accent), var(--testi-accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .testimonials-subtitle {
            max-width: 650px;
            font-size: 1rem;
            line-height: 1.85;
            color: var(--testi-text-3);
        }

        .testimonials-count {
            text-align: right;
            padding-bottom: 6px;
        }

        .testimonials-count-number {
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(3rem, 7vw, 5rem);
            line-height: 0.9;
            font-weight: 700;
            letter-spacing: -0.06em;
            color: rgba(255, 255, 255, 0.09);
        }

        .testimonials-count-label {
            margin-top: 8px;
            font-size: 0.86rem;
            color: var(--testi-text-4);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .testimonials-meta {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 38px;
        }

        .testimonials-meta-card {
            border: 1px solid var(--testi-border);
            background: rgba(15, 23, 42, 0.34);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 18px 18px 16px;
            box-shadow: var(--testi-shadow);
        }

        .testimonials-meta-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--testi-text-4);
            margin-bottom: 10px;
        }

        .testimonials-meta-value {
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--testi-text-2);
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
        }

        .testimonial-card {
            position: relative;
            min-height: 100%;
            padding: 28px;
            border-radius: var(--testi-radius);
            border: 1px solid var(--testi-border);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.015)),
                var(--testi-card);
            box-shadow: var(--testi-shadow);
            overflow: hidden;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            transform: translateY(24px);
            opacity: 0;
            transition:
                transform 0.35s ease,
                border-color 0.35s ease,
                box-shadow 0.35s ease,
                opacity 0.5s ease;
        }

        .testimonial-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(99, 179, 237, 0.10), transparent 42%, rgba(59, 130, 246, 0.05));
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .testimonial-card:hover {
            transform: translateY(-6px);
            border-color: rgba(99, 179, 237, 0.18);
            box-shadow: 0 26px 70px rgba(0, 0, 0, 0.30);
        }

        .testimonial-card:hover::before {
            opacity: 1;
        }

        .testimonial-card.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .testimonial-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .testimonial-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid var(--testi-border);
            background: var(--testi-dim);
            color: var(--testi-text-3);
            white-space: nowrap;
        }

        .testimonial-pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }

        .testimonial-rating {
            font-size: 0.86rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: var(--testi-accent);
        }

        .testimonial-quote {
            font-family: "Space Grotesk", sans-serif;
            font-size: 4rem;
            line-height: 0.8;
            letter-spacing: -0.08em;
            color: rgba(255, 255, 255, 0.08);
            margin-bottom: 10px;
            user-select: none;
        }

        .testimonial-card:hover .testimonial-quote {
            color: rgba(99, 179, 237, 0.20);
        }

        .testimonial-text {
            font-size: 0.98rem;
            line-height: 1.9;
            color: var(--testi-text-2);
            margin-bottom: 24px;
        }

        .testimonial-footer {
            display: flex;
            align-items: center;
            gap: 14px;
            padding-top: 18px;
            border-top: 1px solid var(--testi-border);
        }

        .testimonial-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1px solid rgba(99, 179, 237, 0.20);
            background:
                linear-gradient(135deg, rgba(99, 179, 237, 0.18), rgba(59, 130, 246, 0.08)),
                rgba(255, 255, 255, 0.03);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: "Space Grotesk", sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--testi-text-1);
            flex-shrink: 0;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .testimonial-author {
            min-width: 0;
        }

        .testimonial-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--testi-text-1);
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .testimonial-role {
            font-size: 0.86rem;
            color: var(--testi-text-3);
            line-height: 1.6;
        }

        @media (max-width: 1080px) {
            .testimonials-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 820px) {
            .testimonials-header {
                grid-template-columns: 1fr;
                align-items: start;
                gap: 14px;
            }

            .testimonials-count {
                text-align: left;
                padding-bottom: 0;
            }

            .testimonials-meta {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            .testimonials-section {
                padding: 84px 0 72px;
            }

            .testimonials-wrap {
                padding: 0 20px;
            }

            .testimonials-grid {
                grid-template-columns: 1fr;
            }

            .testimonial-card {
                padding: 22px;
                border-radius: 22px;
            }

            .testimonial-text {
                font-size: 0.95rem;
            }

            .testimonials-title {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>
    <section class="testimonials-section">
        <div class="testimonials-wrap">
            <div class="testimonials-header">
                <div>
                    <div class="testimonials-kicker">What People Say</div>
                    <h2 class="testimonials-title">Trusted by <span class="accent">people</span> I worked with</h2>
                    <p class="testimonials-subtitle">
                        Reflections from mentors, peers, and collaborators who have seen my consistency,
                        technical mindset, and growth-driven approach across different environments.
                    </p>
                </div>

                <div class="testimonials-count">
                    <div class="testimonials-count-number">06</div>
                    <div class="testimonials-count-label">Featured Voices</div>
                </div>
            </div>

            <div class="testimonials-meta">
                <div class="testimonials-meta-card">
                    <div class="testimonials-meta-label">Network</div>
                    <div class="testimonials-meta-value">Mentors & Peers</div>
                </div>
                <div class="testimonials-meta-card">
                    <div class="testimonials-meta-label">Focus</div>
                    <div class="testimonials-meta-value">Problem Solving</div>
                </div>
                <div class="testimonials-meta-card">
                    <div class="testimonials-meta-label">Style</div>
                    <div class="testimonials-meta-value">Consistent Growth</div>
                </div>
            </div>

            <div class="testimonials-grid" id="testimonialsGrid"></div>
        </div>
    </section>

    <script>
        const testimonials = [
            {
                text: "Working with Tashin was a great experience. His ability to break down difficult problems into structured steps made collaboration smooth and productive.",
                name: "Arif Hasan",
                role: "Software Engineer",
                tag: "Collaboration"
            },
            {
                text: "He brings a strong analytical mindset into every challenge. What stands out most is not only solving the problem, but understanding the deeper logic behind it.",
                name: "Nusrat Jahan",
                role: "Computer Science Lecturer",
                tag: "Analytical Thinking"
            },
            {
                text: "Tashin is highly disciplined and growth-oriented. He stays consistent, keeps learning, and approaches technical work with real curiosity and maturity.",
                name: "Mahmud Rahman",
                role: "Tech Lead",
                tag: "Consistency"
            },
            {
                text: "His explanations are always clear and thoughtful. He has a natural way of helping others understand concepts that initially feel overwhelming.",
                name: "Fahim Ahmed",
                role: "Undergraduate Student",
                tag: "Mentorship"
            },
            {
                text: "He combines persistence with creativity in a very impressive way. That balance makes him reliable in both competitive and collaborative environments.",
                name: "Sabrina Karim",
                role: "Product Manager",
                tag: "Reliability"
            },
            {
                text: "What impressed me most is his mindset toward improvement. He does not chase shortcuts — he builds strong foundations and keeps moving forward.",
                name: "Shafiq Islam",
                role: "Senior Software Engineer",
                tag: "Growth Mindset"
            }
        ];

        const grid = document.getElementById("testimonialsGrid");

        function getInitials(name) {
            return name
                .split(" ")
                .slice(0, 2)
                .map(part => part[0])
                .join("")
                .toUpperCase();
        }

        function createCard(item, index) {
            const card = document.createElement("article");
            card.className = "testimonial-card";
            card.style.transitionDelay = `${index * 70}ms`;

            card.innerHTML = `
        <div class="testimonial-top">
          <span class="testimonial-pill"><span class="dot"></span>${item.tag}</span>
          <span class="testimonial-rating">★★★★★</span>
        </div>

        <div class="testimonial-quote">“</div>

        <p class="testimonial-text">${item.text}</p>

        <div class="testimonial-footer">
          <div class="testimonial-avatar">${getInitials(item.name)}</div>
          <div class="testimonial-author">
            <div class="testimonial-name">${item.name}</div>
            <div class="testimonial-role">${item.role}</div>
          </div>
        </div>
      `;

            return card;
        }

        testimonials.forEach((item, index) => {
            grid.appendChild(createCard(item, index));
        });

        const cards = document.querySelectorAll(".testimonial-card");

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("is-visible");
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.12 });

        cards.forEach(card => observer.observe(card));
    </script>
</body>

</html>
