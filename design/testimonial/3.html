<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Testimonials</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root {
  --bg: #050509;
  --text: #f3f4f6;
  --muted: #6b7280;
  --line: rgba(255,255,255,0.07);
  /* card palettes */
  --card-a-bg: #0d0d14;
  --card-a-border: rgba(139,92,246,0.18);
  --card-a-accent: #a78bfa;
  --card-b-bg: #0b1120;
  --card-b-border: rgba(96,165,250,0.16);
  --card-b-accent: #60a5fa;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── SECTION ── */
.testimonials {
  position: relative;
  overflow: hidden;
  padding: 110px 0 100px;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  background:
    radial-gradient(ellipse at 20% 0%, rgba(139,92,246,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(96,165,250,0.05) 0%, transparent 50%),
    var(--bg);
}

/* ── HEAD ── */
.head {
  max-width: 1100px;
  margin: 0 auto 64px;
  padding: 0 40px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 32px;
  flex-wrap: wrap;
}

.head-left {}

.eyebrow {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #a78bfa;
  margin-bottom: 14px;
}

.title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(2.2rem, 5vw, 3.8rem);
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1;
  color: var(--text);
}

.title em {
  font-style: normal;
  color: transparent;
  -webkit-text-stroke: 1px rgba(255,255,255,0.2);
}

.head-desc {
  max-width: 360px;
  font-size: 0.9rem;
  line-height: 1.85;
  color: var(--muted);
}

/* ── CAROUSEL ── */
.carousel-shell {
  position: relative;
  overflow: hidden;
  mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
  -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
}

.carousel-track {
  display: flex;
  align-items: center;
  gap: 16px;
  width: max-content;
  padding: 20px 0 28px;
  animation: marquee 60s linear infinite;
  will-change: transform;
}

.carousel-shell:hover .carousel-track {
  animation-play-state: paused;
}

/* ── CARDS ── */
.card {
  width: 360px;
  flex-shrink: 0;
  border-radius: 18px;
  padding: 28px 28px 26px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  position: relative;
  transition: transform .3s ease, box-shadow .3s ease;
  cursor: default;
}

/* alternating vertical offset */
.card:nth-child(odd)  { margin-top: 0; }
.card:nth-child(even) { margin-top: 36px; }

.card:hover {
  transform: translateY(-6px);
}

/* variant A — deep purple tint */
.card.a {
  background: var(--card-a-bg);
  border: 1px solid var(--card-a-border);
  box-shadow: 0 0 0 0 transparent;
}
.card.a:hover {
  box-shadow: 0 20px 50px rgba(139,92,246,0.12);
  border-color: rgba(139,92,246,0.3);
}

/* variant B — deep blue tint */
.card.b {
  background: var(--card-b-bg);
  border: 1px solid var(--card-b-border);
}
.card.b:hover {
  box-shadow: 0 20px 50px rgba(96,165,250,0.1);
  border-color: rgba(96,165,250,0.28);
}

/* accent top bar */
.card::before {
  content:'';
  position:absolute;
  top:0; left:28px; right:28px;
  height:1px;
  border-radius:999px;
  opacity:0.5;
}
.card.a::before { background: linear-gradient(90deg, transparent, var(--card-a-accent), transparent); }
.card.b::before { background: linear-gradient(90deg, transparent, var(--card-b-accent), transparent); }

/* quote mark */
.quote-mark {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 2.8rem;
  line-height: 1;
  font-weight: 700;
  letter-spacing: -0.06em;
  margin-bottom: -8px;
}
.card.a .quote-mark { color: var(--card-a-accent); opacity:0.5; }
.card.b .quote-mark { color: var(--card-b-accent); opacity:0.5; }

/* quote text */
.quote-text {
  font-size: 0.92rem;
  line-height: 1.78;
  color: rgba(255,255,255,0.75);
  font-weight: 400;
  flex: 1;
}

/* footer */
.card-footer {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.05);
}

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.card.a .avatar { background: rgba(139,92,246,0.15); color: var(--card-a-accent); border: 1px solid rgba(139,92,246,0.2); }
.card.b .avatar { background: rgba(96,165,250,0.12); color: var(--card-b-accent); border: 1px solid rgba(96,165,250,0.18); }

.author-name {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1.3;
}

.author-role {
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.3;
}

@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

@media(max-width:768px){
  .testimonials { padding: 80px 0 72px; }
  .head { padding: 0 24px; margin-bottom: 48px; }
  .card { width: 300px; padding: 22px 22px 20px; }
  .card:nth-child(even) { margin-top: 28px; }
}

@media(prefers-reduced-motion:reduce){
  .carousel-track { animation: none; }
}
</style>
</head>
<body>

<section class="testimonials">

  <div class="head">
    <div class="head-left">
      <div class="eyebrow">Testimonials</div>
      <h2 class="title">Words from <em>people</em></h2>
    </div>
    <p class="head-desc">Feedback from people who have seen my problem-solving mindset, consistency, collaboration, and growth in action.</p>
  </div>

  <div class="carousel-shell">
    <div class="carousel-track" id="carouselTrack"></div>
  </div>

</section>

<script>
const testimonials = [
  { text: "Working with Tashin was a game-changer. His problem-solving mindset and ability to break down complex logic into simple steps really stood out.", name: "Arif Hasan", role: "Software Engineer" },
  { text: "Tashin has an impressive analytical mind. Whether it's competitive programming or real-world coding challenges, he consistently delivers efficient solutions.", name: "Nusrat Jahan", role: "Computer Science Lecturer" },
  { text: "I've rarely seen someone so dedicated to improving every single day. Tashin doesn't just code—he thinks deeply about problems.", name: "Mahmud Rahman", role: "Tech Lead" },
  { text: "His ability to teach and explain concepts clearly makes him stand out. He helped me understand algorithms I struggled with for weeks.", name: "Fahim Ahmed", role: "Undergraduate Student" },
  { text: "Tashin approaches every challenge with creativity and persistence. That combination makes him a strong future leader in tech.", name: "Sabrina Karim", role: "Product Manager" },
  { text: "What impressed me most is his consistency. Competitive programming requires discipline, and Tashin has mastered that.", name: "Rakib Chowdhury", role: "Competitive Programmer" },
  { text: "He's not just focused on solving problems but also on understanding the 'why' behind them. That mindset is rare and valuable.", name: "Tanvir Hossain", role: "Backend Developer" },
  { text: "Tashin brings energy and curiosity into everything he does. He's always exploring new ideas and pushing his limits.", name: "Jannatul Ferdous", role: "UI/UX Designer" },
  { text: "A highly motivated individual who is always willing to help others grow. His collaborative mindset makes him a great team member.", name: "Imran Kabir", role: "Team Coordinator" },
  { text: "Tashin has a strong foundation in algorithms and problem-solving. With his mindset, he's definitely on track for big achievements.", name: "Shafiq Islam", role: "Senior Software Engineer" }
];

const track = document.getElementById("carouselTrack");

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

function createCard(item, index) {
  const variant = index % 2 === 0 ? 'a' : 'b';
  const card = document.createElement('article');
  card.className = `card ${variant}`;
  card.innerHTML = `
    <div class="quote-mark">"</div>
    <p class="quote-text">${item.text}</p>
    <div class="card-footer">
      <div class="avatar">${initials(item.name)}</div>
      <div>
        <div class="author-name">${item.name}</div>
        <div class="author-role">${item.role}</div>
      </div>
    </div>
  `;
  return card;
}

[...testimonials, ...testimonials].forEach((item, i) => {
  track.appendChild(createCard(item, i));
});
</script>
</body>
</html>
