<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snapshot / Quick Facts</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --border: rgba(148, 163, 184, 0.18);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.08), transparent 25%),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .section {
      max-width: 1180px;
      margin: 0 auto;
      padding: 72px 20px;
    }

    .section-header {
      max-width: 760px;
      margin-bottom: 32px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .section-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      max-width: 680px;
    }

    .quick-facts-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
      margin-top: 28px;
    }

    .fact-card,
    .domains-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      transition: transform 0.24s ease, border-color 0.24s ease, background 0.24s ease;
    }

    .fact-card:hover,
    .domains-card:hover {
      transform: translateY(-4px);
      border-color: rgba(56, 189, 248, 0.35);
      background: linear-gradient(180deg, rgba(56,189,248,0.06), rgba(255,255,255,0.02));
    }

    .fact-card {
      grid-column: span 3;
      min-height: 156px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .fact-label {
      font-size: 0.95rem;
      color: var(--muted);
      margin: 0 0 16px;
      font-weight: 600;
    }

    .fact-value {
      font-size: clamp(1.75rem, 3vw, 2.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      margin: 0 0 10px;
      color: #f8fafc;
    }

    .fact-desc {
      margin: 0;
      color: #cbd5e1;
      font-size: 0.96rem;
    }

    .fact-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.84rem;
      color: var(--muted);
      margin-top: 12px;
    }

    .fact-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: inline-grid;
      place-items: center;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.2);
      font-size: 1.05rem;
      margin-bottom: 14px;
    }

    .domains-card {
      grid-column: span 12;
      padding: 24px;
    }

    .domains-title {
      margin: 0 0 14px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .domains-subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.1);
      color: #e2e8f0;
      border: 1px solid rgba(148, 163, 184, 0.18);
      font-size: 0.92rem;
      font-weight: 600;
    }

    @media (max-width: 1024px) {
      .fact-card {
        grid-column: span 4;
      }
    }

    @media (max-width: 768px) {
      .section {
        padding: 56px 16px;
      }

      .fact-card,
      .domains-card {
        grid-column: span 12;
      }

      .fact-card {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <section class="section" id="quick-facts">
    <div class="section-header">
      <span class="eyebrow">Snapshot</span>
      <h2 class="section-title">Quick Facts</h2>
      <p class="section-subtitle">
        A fast overview of my academic background, product work, research, leadership, and areas of interest.
      </p>
    </div>

    <div class="quick-facts-grid" id="quickFactsGrid"></div>
  </section>

  <script>
    const quickFacts = [
      {
        icon: "🎓",
        label: "Education",
        value: 1,
        suffix: "",
        description: "BSc in Computer Science & Engineering",
        meta: "CGPA: 3.93"
      },
      {
        icon: "🚀",
        label: "Projects Completed",
        value: 4,
        suffix: "+",
        description: "Product and system projects across multiple domains",
        meta: "Kairos, Wayout, DirectEdge, Faculty App"
      },
      {
        icon: "📄",
        label: "Research & Publications",
        value: 1,
        suffix: "",
        description: "IEEE publication in AI-based vehicle detection and tracking",
        meta: "IEEE TENSYMP 2025"
      },
      {
        icon: "🛠️",
        label: "Tools Built",
        value: 1,
        suffix: "",
        description: "Built practical student-facing tools for real campus needs",
        meta: "UIU Faculty Schedule App"
      },
      {
        icon: "🌱",
        label: "Leadership & Extracurriculars",
        value: 3,
        suffix: "",
        description: "Leadership, teaching, and academic support roles",
        meta: "Computer Club • TA • Grader"
      },
      {
        icon: "🏆",
        label: "Major Awards",
        value: 4,
        suffix: "",
        description: "Project showcase wins across multiple university competitions",
        meta: "Champion, Champion, 1st Runner-Up, 2nd Runner-Up"
      }
    ];

    const domainInterests = [
      "EdTech",
      "Productivity",
      "AI Tools",
      "Student Tools",
      "Multi-user Systems",
      "Supply Chain Platforms",
      "Travel Platforms",
      "Consumer-facing Products"
    ];

    const grid = document.getElementById("quickFactsGrid");

    function createFactCard(item) {
      const card = document.createElement("article");
      card.className = "fact-card";

      card.innerHTML = `
        <div>
          <div class="fact-icon">${item.icon}</div>
          <p class="fact-label">${item.label}</p>
          <h3 class="fact-value" data-target="${item.value}" data-suffix="${item.suffix || ""}">0</h3>
          <p class="fact-desc">${item.description}</p>
        </div>
        <span class="fact-meta">${item.meta}</span>
      `;

      return card;
    }

    function createDomainsCard(items) {
      const card = document.createElement("article");
      card.className = "domains-card";

      const chips = items.map(item => `<span class="chip">${item}</span>`).join("");

      card.innerHTML = `
        <h3 class="domains-title">Domains of Interest</h3>
        <p class="domains-subtitle">
          Areas where I enjoy exploring product problems, user workflows, and digital experiences.
        </p>
        <div class="chip-list">${chips}</div>
      `;

      return card;
    }

    quickFacts.forEach(item => grid.appendChild(createFactCard(item)));
    grid.appendChild(createDomainsCard(domainInterests));

    function animateCounters() {
      const counters = document.querySelectorAll(".fact-value");

      counters.forEach(counter => {
        const target = Number(counter.dataset.target);
        const suffix = counter.dataset.suffix || "";
        const duration = 1200;
        const startTime = performance.now();

        function updateCount(currentTime) {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = Math.floor(eased * target);

          counter.textContent = current + suffix;

          if (progress < 1) {
            requestAnimationFrame(updateCount);
          } else {
            counter.textContent = target + suffix;
          }
        }

        requestAnimationFrame(updateCount);
      });
    }

    const observer = new IntersectionObserver(
      (entries, obs) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            animateCounters();
            obs.disconnect();
          }
        });
      },
      { threshold: 0.3 }
    );

    observer.observe(document.getElementById("quick-facts"));
  </script>
</body>
</html>
