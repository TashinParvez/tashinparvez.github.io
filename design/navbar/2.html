<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Portfolio Navbar</title>
</head>
<body style="margin:0; background:linear-gradient(135deg,#020617 0%,#0f172a 45%,#111827 100%); color:#fff; font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

  <nav style="position:sticky; top:18px; z-index:1000; width:min(1120px,calc(100% - 28px)); margin:18px auto 0; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; gap:18px; border:1px solid rgba(255,255,255,0.08); border-radius:22px; background:linear-gradient(135deg,rgba(255,255,255,0.12),rgba(255,255,255,0.04)); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); box-shadow:0 10px 35px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.08);">
    
    <div style="display:flex; align-items:center; gap:12px; min-width:max-content;">
      <div style="width:40px; height:40px; border-radius:14px; display:grid; place-items:center; font-weight:800; font-size:15px; color:#fff; background:linear-gradient(135deg,#38bdf8,#2563eb 55%,#7c3aed); box-shadow:0 8px 24px rgba(37,99,235,0.35);">A</div>
      <div style="display:flex; flex-direction:column; line-height:1;">
        <span style="font-size:1rem; font-weight:700; letter-spacing:0.4px;">Abdullah</span>
        <span style="font-size:0.72rem; color:#94a3b8; margin-top:6px; letter-spacing:1.8px; text-transform:uppercase;">Portfolio</span>
      </div>
    </div>

    <div class="nav-menu" style="display:flex; align-items:center; gap:10px; padding:7px; border-radius:16px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04); box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);">
      <a href="#home" class="nav-item active" style="text-decoration:none; color:#e2e8f0; font-size:0.95rem; font-weight:500; position:relative; padding:12px 16px; border-radius:12px; overflow:hidden; transition:color .35s ease, transform .35s ease, background .35s ease;">
        <span class="text-wrap" style="position:relative; display:block; height:20px; overflow:hidden;">
          <span class="default-text" style="display:block; line-height:20px; transition:transform .35s ease;">Home</span>
          <span class="hover-text" style="position:absolute; left:0; top:100%; display:block; line-height:20px; color:#ffffff; transition:transform .35s ease;">Home</span>
        </span>
      </a>

      <a href="#about" class="nav-item" style="text-decoration:none; color:#94a3b8; font-size:0.95rem; font-weight:500; position:relative; padding:12px 16px; border-radius:12px; overflow:hidden; transition:color .35s ease, transform .35s ease, background .35s ease;">
        <span class="text-wrap" style="position:relative; display:block; height:20px; overflow:hidden;">
          <span class="default-text" style="display:block; line-height:20px; transition:transform .35s ease;">About</span>
          <span class="hover-text" style="position:absolute; left:0; top:100%; display:block; line-height:20px; color:#ffffff; transition:transform .35s ease;">About</span>
        </span>
      </a>

      <a href="#education" class="nav-item" style="text-decoration:none; color:#94a3b8; font-size:0.95rem; font-weight:500; position:relative; padding:12px 16px; border-radius:12px; overflow:hidden; transition:color .35s ease, transform .35s ease, background .35s ease;">
        <span class="text-wrap" style="position:relative; display:block; height:20px; overflow:hidden;">
          <span class="default-text" style="display:block; line-height:20px; transition:transform .35s ease;">Education</span>
          <span class="hover-text" style="position:absolute; left:0; top:100%; display:block; line-height:20px; color:#ffffff; transition:transform .35s ease;">Education</span>
        </span>
      </a>

      <a href="#works" class="nav-item" style="text-decoration:none; color:#94a3b8; font-size:0.95rem; font-weight:500; position:relative; padding:12px 16px; border-radius:12px; overflow:hidden; transition:color .35s ease, transform .35s ease, background .35s ease;">
        <span class="text-wrap" style="position:relative; display:block; height:20px; overflow:hidden;">
          <span class="default-text" style="display:block; line-height:20px; transition:transform .35s ease;">Projects</span>
          <span class="hover-text" style="position:absolute; left:0; top:100%; display:block; line-height:20px; color:#ffffff; transition:transform .35s ease;">Projects</span>
        </span>
      </a>
    </div>

    <a href="resume.pdf" class="cta-btn" style="text-decoration:none; color:#fff; font-size:0.92rem; font-weight:600; padding:12px 18px; border-radius:14px; background:linear-gradient(135deg,#2563eb,#3b82f6 55%,#38bdf8); border:1px solid rgba(255,255,255,0.14); box-shadow:0 10px 24px rgba(37,99,235,0.28), inset 0 1px 0 rgba(255,255,255,0.18); transition:transform .35s ease, box-shadow .35s ease, filter .35s ease; white-space:nowrap;">Download CV</a>
  </nav>

  <section id="home" style="height:100vh; padding:120px 40px 60px;">
    <h1 style="font-size:3rem; margin:0 0 12px;">Home</h1>
    <p style="font-size:1.05rem; color:#94a3b8; max-width:700px;">Welcome to my portfolio.</p>
  </section>

  <section id="about" style="height:100vh; padding:120px 40px 60px; background:rgba(255,255,255,0.02);">
    <h1 style="font-size:3rem; margin:0 0 12px;">About</h1>
    <p style="font-size:1.05rem; color:#94a3b8; max-width:700px;">About me section.</p>
  </section>

  <section id="education" style="height:100vh; padding:120px 40px 60px;">
    <h1 style="font-size:3rem; margin:0 0 12px;">Education</h1>
    <p style="font-size:1.05rem; color:#94a3b8; max-width:700px;">Your education details.</p>
  </section>

  <section id="works" style="height:100vh; padding:120px 40px 60px; background:rgba(255,255,255,0.02);">
    <h1 style="font-size:3rem; margin:0 0 12px;">Projects</h1>
    <p style="font-size:1.05rem; color:#94a3b8; max-width:700px;">Your featured work.</p>
  </section>

  <style>
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    .nav-item::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:12px;
      background:linear-gradient(135deg,rgba(56,189,248,0.16),rgba(37,99,235,0.05));
      opacity:0;
      transform:scale(.92);
      transition:all .35s ease;
    }
    .nav-item::after{
      content:"";
      position:absolute;
      left:16px;
      right:16px;
      bottom:7px;
      height:2px;
      border-radius:999px;
      background:linear-gradient(90deg,#38bdf8,#60a5fa,#a78bfa);
      transform:scaleX(0);
      transform-origin:left;
      transition:transform .35s ease;
      box-shadow:0 0 18px rgba(56,189,248,0.45);
    }
    .nav-item:hover,
    .nav-item.active{
      color:#fff !important;
      transform:translateY(-1px);
    }
    .nav-item:hover::before,
    .nav-item.active::before{
      opacity:1;
      transform:scale(1);
    }
    .nav-item:hover::after,
    .nav-item.active::after{
      transform:scaleX(1);
    }
    .nav-item:hover .default-text,
    .nav-item.active .default-text{
      transform:translateY(-100%);
    }
    .nav-item:hover .hover-text,
    .nav-item.active .hover-text{
      transform:translateY(-100%);
    }
    .cta-btn:hover{
      transform:translateY(-2px);
      filter:brightness(1.06);
      box-shadow:0 14px 28px rgba(37,99,235,0.34), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    @media (max-width:900px){
      nav{
        flex-wrap:wrap;
        justify-content:center !important;
      }
      .nav-menu{
        order:3;
        width:100%;
        justify-content:center;
        flex-wrap:wrap;
      }
    }
    @media (max-width:560px){
      nav{
        padding:14px !important;
      }
      .nav-item{
        padding:10px 12px !important;
        font-size:0.88rem !important;
      }
      .cta-btn{
        padding:11px 15px !important;
        font-size:0.88rem !important;
      }
    }
  </style>

  <script>
    const sections = document.querySelectorAll("section");
    const navLinks = document.querySelectorAll(".nav-item");

    navLinks.forEach(link => {
      link.addEventListener("click", () => {
        navLinks.forEach(l => l.classList.remove("active"));
        link.classList.add("active");
      });
    });

    window.addEventListener("scroll", () => {
      let current = "";

      sections.forEach(section => {
        const sectionTop = section.offsetTop - 180;
        if (window.pageYOffset >= sectionTop) {
          current = section.getAttribute("id");
        }
      });

      navLinks.forEach(link => {
        link.classList.remove("active");
        if (link.getAttribute("href") === "#" + current) {
          link.classList.add("active");
        }
      });
    });
  </script>

</body>
</html>
