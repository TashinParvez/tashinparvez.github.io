<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Portfolio Navbar</title>
</head>

<body
    style="margin:0; background:#0a0f1c; font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#fff;">

    <nav
        style="position:fixed; top:20px; left:50%; transform:translateX(-50%); width:min(1080px,calc(100% - 24px)); z-index:999; display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-radius:22px; background:rgba(11,18,32,0.72); border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); box-shadow:0 10px 40px rgba(0,0,0,0.28);">

        <a href="#home" style="text-decoration:none; display:flex; align-items:center; gap:12px;">
            <div
                style="width:42px; height:42px; border-radius:14px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#22d3ee,#2563eb); color:#fff; font-weight:800; font-size:15px; box-shadow:0 8px 25px rgba(37,99,235,0.35);">
                A</div>
            <div style="display:flex; flex-direction:column; line-height:1;">
                <span style="color:#ffffff; font-size:1rem; font-weight:700; letter-spacing:0.2px;">Abdullah</span>
                <span
                    style="color:#7dd3fc; font-size:0.72rem; margin-top:6px; letter-spacing:1.8px; text-transform:uppercase;">Frontend
                    Dev</span>
            </div>
        </a>

        <div class="nav-menu"
            style="display:flex; align-items:center; gap:8px; padding:6px; border-radius:16px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05);">
            <a href="#home" class="nav-item active"
                style="text-decoration:none; color:#ffffff; position:relative; padding:12px 16px; border-radius:12px; font-size:0.95rem; font-weight:500; overflow:hidden;">
                <span class="text-wrap" style="position:relative; display:block; height:22px; overflow:hidden;">
                    <span class="default-text" style="display:block; line-height:22px;">Home</span>
                    <span class="hover-text" style="position:absolute; left:0; top:100%; line-height:22px;">Home</span>
                </span>
            </a>

            <a href="#about" class="nav-item"
                style="text-decoration:none; color:#94a3b8; position:relative; padding:12px 16px; border-radius:12px; font-size:0.95rem; font-weight:500; overflow:hidden;">
                <span class="text-wrap" style="position:relative; display:block; height:22px; overflow:hidden;">
                    <span class="default-text" style="display:block; line-height:22px;">About</span>
                    <span class="hover-text" style="position:absolute; left:0; top:100%; line-height:22px;">About</span>
                </span>
            </a>

            <a href="#education" class="nav-item"
                style="text-decoration:none; color:#94a3b8; position:relative; padding:12px 16px; border-radius:12px; font-size:0.95rem; font-weight:500; overflow:hidden;">
                <span class="text-wrap" style="position:relative; display:block; height:22px; overflow:hidden;">
                    <span class="default-text" style="display:block; line-height:22px;">Education</span>
                    <span class="hover-text"
                        style="position:absolute; left:0; top:100%; line-height:22px;">Education</span>
                </span>
            </a>

            <a href="#works" class="nav-item"
                style="text-decoration:none; color:#94a3b8; position:relative; padding:12px 16px; border-radius:12px; font-size:0.95rem; font-weight:500; overflow:hidden;">
                <span class="text-wrap" style="position:relative; display:block; height:22px; overflow:hidden;">
                    <span class="default-text" style="display:block; line-height:22px;">Projects</span>
                    <span class="hover-text"
                        style="position:absolute; left:0; top:100%; line-height:22px;">Projects</span>
                </span>
            </a>
        </div>

        <a href="resume.pdf" class="resume-btn"
            style="text-decoration:none; display:inline-flex; align-items:center; gap:10px; padding:12px 18px; border-radius:14px; color:#fff; font-size:0.92rem; font-weight:600; background:linear-gradient(135deg,#0f172a,#1d4ed8); border:1px solid rgba(125,211,252,0.25); box-shadow:inset 0 1px 0 rgba(255,255,255,0.08), 0 10px 24px rgba(29,78,216,0.28);">
            View Resume
            <span style="font-size:1rem;">↗</span>
        </a>
    </nav>

    <section id="home"
        style="min-height:100vh; padding:140px 40px 60px; background:radial-gradient(circle at top left,rgba(34,211,238,0.12),transparent 30%), #0a0f1c;">
        <h1 style="font-size:3rem; margin:0 0 12px;">Home</h1>
        <p style="margin:0; color:#94a3b8; font-size:1.05rem;">Welcome to my portfolio</p>
    </section>

    <section id="about" style="min-height:100vh; padding:140px 40px 60px; background:#0d1324;">
        <h1 style="font-size:3rem; margin:0 0 12px;">About</h1>
        <p style="margin:0; color:#94a3b8; font-size:1.05rem;">About me section</p>
    </section>

    <section id="education" style="min-height:100vh; padding:140px 40px 60px; background:#0a0f1c;">
        <h1 style="font-size:3rem; margin:0 0 12px;">Education</h1>
        <p style="margin:0; color:#94a3b8; font-size:1.05rem;">Your education details</p>
    </section>

    <section id="works" style="min-height:100vh; padding:140px 40px 60px; background:#0d1324;">
        <h1 style="font-size:3rem; margin:0 0 12px;">Projects</h1>
        <p style="margin:0; color:#94a3b8; font-size:1.05rem;">Your projects / work</p>
    </section>

    <style>
        * {
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth
        }

        .nav-item,
        .resume-btn,
        .default-text,
        .hover-text {
            transition: all .35s ease;
        }

        .nav-item::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            opacity: 0;
            transform: scale(.94);
            transition: all .35s ease;
        }

        .nav-item::after {
            content: "";
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: 7px;
            height: 2px;
            border-radius: 999px;
            background: linear-gradient(90deg, #22d3ee, #60a5fa);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .35s ease;
            box-shadow: 0 0 16px rgba(34, 211, 238, 0.5);
        }

        .nav-item:hover,
        .nav-item.active {
            color: #ffffff !important;
        }

        .nav-item:hover::before,
        .nav-item.active::before {
            opacity: 1;
            transform: scale(1);
        }

        .nav-item:hover::after,
        .nav-item.active::after {
            transform: scaleX(1);
        }

        .nav-item:hover .default-text,
        .nav-item.active .default-text {
            transform: translateY(-100%);
        }

        .nav-item:hover .hover-text,
        .nav-item.active .hover-text {
            transform: translateY(-100%);
        }

        .resume-btn:hover {
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 14px 30px rgba(29, 78, 216, 0.35);
        }

        @media (max-width:900px) {
            nav {
                flex-wrap: wrap;
                justify-content: center !important;
                gap: 14px;
            }

            .nav-menu {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }
        }

        @media (max-width:560px) {
            nav {
                padding: 12px !important;
                border-radius: 18px !important;
            }

            .nav-item {
                padding: 10px 12px !important;
                font-size: 0.88rem !important;
            }

            .resume-btn {
                padding: 11px 14px !important;
                font-size: 0.88rem !important;
            }

            section {
                padding-left: 22px !important;
                padding-right: 22px !important;
            }

            h1 {
                font-size: 2.2rem !important;
            }
        }
    </style>

    <script>
        const sections = document.querySelectorAll("section");
        const navLinks = document.querySelectorAll(".nav-item");

        navLinks.forEach(link => {
            link.addEventListener("click", () => {
                navLinks.forEach(item => item.classList.remove("active"));
                link.classList.add("active");
            });
        });

        window.addEventListener("scroll", () => {
            let current = "";
            sections.forEach(section => {
                const sectionTop = section.offsetTop - 180;
                if (window.pageYOffset >= sectionTop) {
                    current = section.getAttribute("id");
                }
            });

            navLinks.forEach(link => {
                link.classList.remove("active");
                if (link.getAttribute("href") === "#" + current) {
                    link.classList.add("active");
                }
            });
        });
    </script>

</body>

</html>
