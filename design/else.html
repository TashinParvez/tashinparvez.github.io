<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll Reading Text</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #0f0f0f;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .top-space,
    .bottom-space {
      height: 100vh;
    }

    .scroll-section {
      height: 300vh;
      position: relative;
    }

    .sticky-box {
      position: sticky;
      top: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .text {
      max-width: 1000px;
      font-size: clamp(28px, 4vw, 60px);
      line-height: 1.25;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .word {
      color: rgba(255, 255, 255, 0.2);
      transition: color 0.18s linear;
    }

    .word.active {
      color: rgba(255, 255, 255, 1);
    }
  </style>
</head>

<body>

  <div class="top-space"></div>

  <section class="scroll-section" id="scrollSection">
    <div class="sticky-box">
      <div class="text" id="readingText">
        Make your website fast, accessible, and built to last using modern web technologies and standards to create an
        experience that works seamlessly on any browser or device.
      </div>
    </div>
  </section>

  <div class="bottom-space"></div>

  <script>
    const textEl = document.getElementById("readingText");
    const sectionEl = document.getElementById("scrollSection");

    const text = textEl.textContent.trim();
    const words = text.split(" ");

    textEl.innerHTML = words
      .map(word => `<span class="word">${word}</span>`)
      .join(" ");

    const wordEls = textEl.querySelectorAll(".word");

    function updateWords() {
      const rect = sectionEl.getBoundingClientRect();
      const sectionStart = window.innerHeight;
      const sectionEnd = -rect.height + window.innerHeight;

      let progress = (sectionStart - rect.top) / (sectionStart - sectionEnd);
      progress = Math.max(0, Math.min(1, progress));

      const activeCount = Math.floor(progress * wordEls.length);

      wordEls.forEach((word, index) => {
        if (index < activeCount) {
          word.classList.add("active");
        } else {
          word.classList.remove("active");
        }

        .site-footer {
            text-align: center;
            padding: 24px 16px;
            font-size: 14px;
            color: #6b7280;
            border-top: 1px solid #e5e7eb;
            background-color: #f9fafb;
            line-height: 1.6;
        }

        .site-footer strong {
            color: #111827;
        }

        .github-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 12px 0 0;
        }

        .github-stats .stat {
            text-align: center;
        }

        .github-stats .number {
            font-weight: bold;
            font-size: 16px;
            display: block;
        }

        .github-stats .label {
            font-size: 12px;
            color: #6b7280;
        }

        /* Optional: small icon styling */
        .github-stats svg {
            width: 14px;
            height: 14px;
            vertical-align: middle;
            margin-right: 4px;
            fill: #fbbf24;
            /* default gold for star */
        }

        .github-stats .followers svg {
            fill: #3b82f6;
        }

        .github-stats .forks svg {
            fill: #10b981;
        }
    </style>
</head>

<body>
    <footer class="site-footer">
        <div class="github-stats">
            <div class="stat stars">
                <span class="number">
                    <svg viewBox="0 0 20 20">
                        <path
                            d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.561-.955L10 0l2.95 5.955 6.561.955-4.756 4.635 1.123 6.545z" />
                    </svg>
                    149
                </span>
                <span class="label">Stars</span>
            </div>
            <div class="stat forks">
                <span class="number">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 3v12h4v-4h4v-4h4V3h-12zm6 8H8V5h4v6z" />
                    </svg>
                    8
                </span>
                <span class="label">Forks</span>
            </div>
        </div>
        <p>© 2026 <strong>Tashin Parvez</strong></p>
        <p>Built with intent, not just code.</p>


    </footer>
</body>

</html>
