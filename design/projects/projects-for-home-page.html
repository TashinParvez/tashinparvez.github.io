            ],
            tech: ['HTML', 'CSS', 'JavaScript', 'Responsive Design', 'UI Design'],
            type: 'Portfolio Site',
            typeName: 'Web Project',
            tags: ['has-demo', 'web-development'],
            year: 2026,
            links: [
                { label: 'Live Demo', icon: 'link', href: '#', type: 'primary' }
            ],
            img: '../../assets/images/projects/portfolio-site.png',
            featured: false,
        }
    ];

    const projectsGrid = document.getElementById('projectsGrid');
    const projectFilters = document.getElementById('projectFilters');
    const projectsStatNum = document.getElementById('projectsStatNum');

    const projectModal = document.getElementById('projectModal');
    const projectModalBackdrop = document.getElementById('projectModalBackdrop');
    const closeProjectModalBtn = document.getElementById('closeProjectModalBtn');
    const prevProjectBtn = document.getElementById('prevProjectBtn');
    const nextProjectBtn = document.getElementById('nextProjectBtn');
    const modalCounter = document.getElementById('modalCounter');
    const modalContent = document.getElementById('modalContent');

    let activeFilter = 'All';
    let filteredProjects = [...projectsData];
    let currentModalIndex = 0;

    const MAX_PROJECTS_ON_LANDING = 6;
    const FULL_PROJECTS_PAGE_URL = './projects.html';

    function esc(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function getFilterKey(label) {
        const map = {
            'Featured': 'featured',
            'Case Study': 'case-study',
            'Has Demo': 'has-demo',
            'Web Development': 'web-development',
            'AI / Data Science': 'ai-data-science',
            'Research': 'research'
        };
        return map[label] || '';
    }

    function renderFilters() {
        projectFilters.innerHTML = '';

        landingProjectTags.forEach(tag => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${activeFilter === tag ? 'active' : ''}`;
            btn.type = 'button';
            btn.textContent = tag;
            btn.addEventListener('click', () => {
                activeFilter = tag;
                applyFilter();
                renderFilters();
                renderProjects();
            });
            projectFilters.appendChild(btn);
        });
    }

    function applyFilter() {
        if (activeFilter === 'All') {
            filteredProjects = [...projectsData];
            return;
        }

        const key = getFilterKey(activeFilter);
        filteredProjects = projectsData.filter(project => {
            if (key === 'featured') return project.featured === true;
            return project.tags.includes(key);
        });
    }

    function buildQuickChips(project) {
        const chips = [];

        if (project.featured) chips.push('Featured');
        if (project.tags.includes('case-study')) chips.push('Case Study');
        if (project.tags.includes('has-demo')) chips.push('Has Demo');
        if (project.tags.includes('web-development')) chips.push('Web Dev');
        if (project.tags.includes('ai-data-science')) chips.push('AI / Data');
        if (project.tags.includes('research')) chips.push('Research');

        return chips.slice(0, 3);
    }

    function renderProjects() {
        projectsGrid.innerHTML = '';
        projectsStatNum.textContent = String(projectsData.length).padStart(2, '0');

        if (!filteredProjects.length) {
            projectsGrid.innerHTML = `
                    <div class="empty-state">
                        <h3>No projects found</h3>
                        <p>There is no project under this filter right now. Try another category to explore more work.</p>
                    </div>
                `;
            return;
        }

        const landingProjects = filteredProjects.slice(0, MAX_PROJECTS_ON_LANDING);

        landingProjects.forEach((project, index) => {
            const quickChips = buildQuickChips(project);
            const techPreview = project.tech.slice(0, 4);

            const card = document.createElement('article');
            card.className = 'project-card';
            card.setAttribute('tabindex', '0');
            card.setAttribute('role', 'button');
            card.setAttribute('aria-label', `Open details for ${project.title}`);

            card.innerHTML = `
                    <div class="project-thumb">
                        <img src="${esc(project.img)}" alt="${esc(project.title)} preview" onerror="this.style.display='none'">
                        <div class="thumb-overlay"></div>

                        <div class="thumb-top">
                            <div class="project-type">${esc(project.type)}</div>
                            <div class="project-year">${esc(project.year)}</div>
                        </div>

                        <div class="thumb-bottom">
                            <div class="project-quick-tags">
                                ${quickChips.map(chip => `<span class="quick-chip">${esc(chip)}</span>`).join('')}
                            </div>
                            <div class="card-arrow">↗</div>
                        </div>
                    </div>

                    <div class="project-body">
                        <div>
                            <h3 class="project-title">${esc(project.title)}</h3>
                            <div class="project-subtitle">${esc(project.subtitle)}</div>
                        </div>

                        <p class="project-desc">${esc(project.desc)}</p>

                        <div class="project-tech">
                            ${techPreview.map(item => `<span class="tech-chip">${esc(item)}</span>`).join('')}
                        </div>

                        <div class="card-meta">
                            <div class="card-meta-left">
                                <span class="meta-mini">${esc(project.typeName)}</span>
                                <span class="meta-dot"></span>
                                <span class="meta-mini">${project.points.length} highlights</span>
                            </div>
                            <div class="card-link-count">${project.links.length} link${project.links.length > 1 ? 's' : ''}</div>
                        </div>
                    </div>
                `;

            card.addEventListener('click', () => openProjectModal(index));
            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    openProjectModal(index);
                }
            });

            projectsGrid.appendChild(card);
        });
    }

    function renderModal(project) {
        const modalTags = [];
        if (project.featured) modalTags.push('Featured');
        if (project.tags.includes('case-study')) modalTags.push('Case Study');
        if (project.tags.includes('has-demo')) modalTags.push('Has Demo');
        if (project.tags.includes('web-development')) modalTags.push('Web Development');
        if (project.tags.includes('ai-data-science')) modalTags.push('AI / Data Science');
        if (project.tags.includes('research')) modalTags.push('Research');

        modalContent.innerHTML = `
                <div class="modal-left">
                    <div class="modal-hero">
                        <img src="${esc(project.img)}" alt="${esc(project.title)} project image" onerror="this.style.display='none'">
                        <div class="modal-hero-overlay">
                            <div class="modal-badges">
                                <span class="modal-badge">${esc(project.type)}</span>
                                ${modalTags.map(tag => `<span class="modal-badge">${esc(tag)}</span>`).join('')}
                            </div>

                            <div class="modal-hero-bottom">
                                <div>
                                    <div class="modal-type-name">${esc(project.typeName)}</div>
                                    <div class="modal-project-name">${esc(project.title)}</div>
                                </div>
                                <div class="modal-year-chip">${esc(project.year)}</div>
                            </div>
                        </div>
                    </div>

                    <h2 class="modal-title" id="modalProjectTitle">${esc(project.title)}</h2>
                    <div class="modal-subtitle">${esc(project.subtitle)}</div>
                    <p class="modal-desc">${esc(project.desc)}</p>

                    <div class="modal-sec">
                        <div class="modal-sec-label">Key Highlights</div>
                        <ul class="modal-points">
                            ${project.points.map(point => `<li>${esc(point)}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="modal-sec">
                        <div class="modal-sec-label">Tech Stack & Focus Areas</div>
                        <div class="modal-tech">
                            ${project.tech.map(item => `<span class="tech-chip">${esc(item)}</span>`).join('')}
                        </div>
                    </div>

                    ${project.links.length ? `
                        <div class="modal-sec">
                            <div class="modal-sec-label">Project Links</div>
                            <div class="modal-links">
                                ${project.links.map((link, index) => `
                                    <a class="modal-link ${index === 0 || link.type === 'primary' ? 'primary' : 'secondary'}"
                                       href="${esc(link.href)}"
                                       target="_blank"
                                       rel="noopener">
                                        <span>${esc(link.label)}</span>
                                        <span>↗</span>
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>

                <div class="modal-right">
                    <div class="modal-side-grid">
                        <div class="side-card">
                            <div class="side-card-title">Project Overview</div>
                            <div class="side-meta-list">
                                <div class="side-meta-item">
                                    <div class="side-meta-k">Project ID</div>
                                    <div class="side-meta-v">#${esc(project.id)}</div>
                                </div>
                                <div class="side-meta-item">
                                    <div class="side-meta-k">Type</div>
                                    <div class="side-meta-v">${esc(project.type)}</div>
                                </div>
                                <div class="side-meta-item">
                                    <div class="side-meta-k">Category</div>
                                    <div class="side-meta-v">${esc(project.typeName)}</div>
                                </div>
                                <div class="side-meta-item">
                                    <div class="side-meta-k">Year</div>
                                    <div class="side-meta-v">${esc(project.year)}</div>
                                </div>
                                <div class="side-meta-item">
                                    <div class="side-meta-k">Featured</div>
                                    <div class="side-meta-v">${project.featured ? 'Yes' : 'No'}</div>
                                </div>
                            </div>
                        </div>

                        <div class="side-card">
                            <div class="side-card-title">Tags</div>
                            <div class="side-tags">
                                ${modalTags.length ? modalTags.map(tag => `<span class="tech-chip">${esc(tag)}</span>`).join('') : `<span class="tech-chip">General</span>`}
                            </div>
                        </div>

                        <div class="side-card">
                            <div class="side-card-title">Primary Technologies</div>
                            <div class="side-tags">
                                ${project.tech.slice(0, 8).map(item => `<span class="tech-chip">${esc(item)}</span>`).join('')}
                            </div>
                        </div>

                        <div class="side-card">
                            <div class="side-card-title">Navigation</div>
                            <p class="modal-footer-note">
                                Use the previous and next buttons in the top bar to move through the currently visible
                                landing-page projects without closing the modal.
                            </p>
                        </div>
                    </div>
                </div>
            `;

        modalCounter.textContent = `${String(currentModalIndex + 1).padStart(2, '0')} / ${String(filteredProjects.slice(0, MAX_PROJECTS_ON_LANDING).length).padStart(2, '0')}`;
    }

    function openProjectModal(index) {
        const currentList = filteredProjects.slice(0, MAX_PROJECTS_ON_LANDING);
        if (!currentList.length) return;

        currentModalIndex = index < 0 ? currentList.length - 1 : index >= currentList.length ? 0 : index;
        renderModal(currentList[currentModalIndex]);

        projectModal.classList.add('open');
        projectModal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
    }

    function closeProjectModal() {
        projectModal.classList.remove('open');
        projectModal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
    }

    function showPrevProject() {
        const currentList = filteredProjects.slice(0, MAX_PROJECTS_ON_LANDING);
        if (!currentList.length) return;
        currentModalIndex = (currentModalIndex - 1 + currentList.length) % currentList.length;
        renderModal(currentList[currentModalIndex]);
    }

    function showNextProject() {
        const currentList = filteredProjects.slice(0, MAX_PROJECTS_ON_LANDING);
        if (!currentList.length) return;
        currentModalIndex = (currentModalIndex + 1) % currentList.length;
        renderModal(currentList[currentModalIndex]);
    }

    closeProjectModalBtn.addEventListener('click', closeProjectModal);
    projectModalBackdrop.addEventListener('click', closeProjectModal);
    prevProjectBtn.addEventListener('click', showPrevProject);
    nextProjectBtn.addEventListener('click', showNextProject);

    document.addEventListener('keydown', (e) => {
        if (!projectModal.classList.contains('open')) return;

        if (e.key === 'Escape') closeProjectModal();
        if (e.key === 'ArrowLeft') showPrevProject();
        if (e.key === 'ArrowRight') showNextProject();
    });

    renderFilters();
    applyFilter();
    renderProjects();

    // optional: change this if your full projects page path is different
    document.querySelector('.show-more-btn').setAttribute('href', FULL_PROJECTS_PAGE_URL);
</script>
