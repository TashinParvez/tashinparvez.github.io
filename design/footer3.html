<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Minimal Footer</title>

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #06070a;
            --panel: rgba(255, 255, 255, 0.04);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text: #f5f7fb;
            --muted: #9aa4b2;
            --soft: #c8d1dc;
            --accent: #8b5cf6;
            --line: rgba(255, 255, 255, 0.08);
        }

        body {
            background: #111;
            font-family: Inter, system-ui, sans-serif;
            color: var(--text);
        }

        .footer {
            padding: 80px 7% 30px;
            background:
                radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.12), transparent 25%),
                linear-gradient(180deg, #05060a 0%, #07090f 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-container {
            max-width: 1200px;
            margin: auto;
        }

        .footer-top {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 50px;
            padding-bottom: 50px;
            border-bottom: 1px solid var(--line);
        }

        .footer-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 15px;
        }

        .footer-desc {
            color: var(--muted);
            line-height: 1.7;
            max-width: 520px;
        }

        .footer-right {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 16px 18px;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .info-card strong {
            color: var(--text);
            display: block;
            margin-top: 4px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

        /* ==== BOTTOM ==== */
        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            padding-top: 25px;
            flex-wrap: wrap;
        }

        .brand {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.03em;
        }

        .brand span {
            color: rgba(255, 255, 255, 0.4);
            margin-right: 8px;
        }

        .nav-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .footer-nav {
            display: flex;
            gap: 20px;
        }

        .footer-nav a {
            text-decoration: none;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .footer-nav a:hover {
            color: var(--text);
        }

        /* ==== KEEP BUILDING TEXT ==== */
        .keep-building {
            font-size: clamp(2.5rem, 7vw, 7rem);
            font-weight: 900;
            letter-spacing: -0.04em;

            color: transparent;
            /* no fill */
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.25);

            opacity: 1;
            /* IMPORTANT: remove fading */
            line-height: 1;

            white-space: nowrap;
            /* keeps it in one line */
        }

        .copyright {
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 800px) {
            .footer-top {
                grid-template-columns: 1fr;
            }

            .nav-wrapper {
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

    <footer class="footer">
        <div class="footer-container">

            <!-- TOP -->
            <div class="footer-top">
                <div>
                    <h2 class="footer-title">Let’s build something clean & modern.</h2>
                    <p class="footer-desc">
                        I design and build minimal web experiences focused on clarity and performance.
                    </p>
                </div>

                <div class="footer-right">
                    <div class="info-card">
                        Status
                        <strong class="status">
                            <span class="dot"></span> Available for work
                        </strong>
                    </div>

                    <div class="info-card">
                        GitHub
                        <strong>github.com/TashinParvez</strong>
                    </div>
                </div>
            </div>

            <!-- BOTTOM -->
            <div class="footer-bottom">
                <div class="brand"><span>© 2026</span>Tashin Parvez</div>

                <div class="nav-wrapper">
                    <nav class="footer-nav">
                        <a href="#home">Home</a>
                        <a href="#work">Work</a>
                        <a href="#about">About</a>
                        <a href="#contact">Contact</a>
                    </nav>

                    <!-- YOUR CUSTOM TEXT -->
                    <div class="keep-building">
                        Keep_Building()
                    </div>
                </div>

                <p class="copyright">
                    Minimal footer crafted for a modern portfolio.
                </p>
            </div>

        </div>
    </footer>

</body>

</html>
