<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Achievements</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: #fff;
      padding: 50px 20px;
    }

    .achievement-section {
      max-width: 1200px;
      margin: auto;
    }

    .section-title {
      text-align: center;
      font-size: 2.2rem;
      margin-bottom: 40px;
      color: #38bdf8;
    }

    .achievement-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }

    .achievement-card {
      background: #1e293b;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .achievement-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 14px 30px rgba(56, 189, 248, 0.25);
    }

    .achievement-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .achievement-content {
      padding: 20px;
    }

    .achievement-rank {
      display: inline-block;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 0.85rem;
      margin-bottom: 14px;
    }

    .achievement-title {
      font-size: 1.35rem;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .achievement-subtitle {
      font-size: 0.95rem;
      color: #cbd5e1;
      margin-bottom: 10px;
    }

    .achievement-date {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .achievement-team {
      font-size: 0.95rem;
      color: #f8fafc;
      font-weight: 500;
    }

    @media (max-width: 600px) {
      .section-title {
        font-size: 1.8rem;
      }

      .achievement-img {
        height: 180px;
      }
    }
  </style>
</head>
<body>

  <section class="achievement-section" id="achievements">
    <h2 class="section-title">Achievements</h2>

    <div class="achievement-container" id="achievementContainer">
      <!-- Cards will be inserted by JavaScript -->
    </div>
  </section>

  <script>
    const achievements = [
      {
        rank: "1st Runner-Up",
        title: "UIU CSE Project Show | Fall '24",
        subtitle: "Software Engineering Lab",
        date: "27 January 2025",
        team: "MediTouch | Team Bcrypt",
        image: "https://via.placeholder.com/400x250?text=Achievement+1"
      },
      {
        rank: "Champion",
        title: "Hackathon 2025",
        subtitle: "Innovation Challenge",
        date: "10 February 2025",
        team: "SmartCare | Team Alpha",
        image: "https://via.placeholder.com/400x250?text=Achievement+2"
      },
      {
        rank: "Best Project",
        title: "University Tech Fest",
        subtitle: "Final Year Project",
        date: "15 March 2025",
        team: "EduSync | Team Delta",
        image: "https://via.placeholder.com/400x250?text=Achievement+3"
      }
    ];

    const container = document.getElementById("achievementContainer");

    achievements.forEach(item => {
      const card = document.createElement("div");
      card.classList.add("achievement-card");

      card.innerHTML = `
        <img src="${item.image}" alt="${item.title}" class="achievement-img">
        <div class="achievement-content">
          <span class="achievement-rank">${item.rank}</span>
          <h3 class="achievement-title">${item.title}</h3>
          <p class="achievement-subtitle">${item.subtitle}</p>
          <p class="achievement-date">${item.date}</p>
          <p class="achievement-team">${item.team}</p>
        </div>
      `;

      container.appendChild(card);
    });
  </script>

</body>
</html>
