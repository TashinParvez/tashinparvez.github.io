<style>
  .contact-wrap *,
  .contact-wrap *::before,
  .contact-wrap *::after {
    box-sizing: border-box;
  }

  .contact-wrap {
    --bg: #080b10;
    --line: rgba(255, 255, 255, 0.07);
    --line-2: rgba(255, 255, 255, 0.12);
    --text: #f1f5f9;
    --text-soft: #cbd5e1;
    --muted: #94a3b8;
    --accent: #63b3ed;
    --accent-2: #93c5fd;
    --green: #22c55e;

    width: 100%;
    max-width: 960px;
    margin: 0 auto;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    padding: 80px 24px;
  }

  .contact-wrap::before {
    content: '';
    display: block;
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--line-2) 20%, var(--line-2) 80%, transparent);
    margin-bottom: 64px;
  }

  .contact-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 32px;
    margin-bottom: 56px;
    flex-wrap: wrap;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .eyebrow-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.8);
  }

  .contact-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2rem, 4.5vw, 3.4rem);
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--text);
  }

  .contact-title span {
    background: linear-gradient(135deg, #fff 0%, var(--accent-2) 60%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .head-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 16px;
  }

  .head-desc {
    max-width: 300px;
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.8;
    text-align: right;
  }

  .avail-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 500;
    color: var(--green);
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid rgba(34, 197, 94, 0.22);
    background: rgba(34, 197, 94, 0.06);
  }

  .avail-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.8);
  }

  .contact-body {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 0 64px;
    align-items: start;
  }

  .links-col {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-top: 4px;
  }

  .links-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.15);
    margin-bottom: 12px;
  }

  .social-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid var(--line);
    color: var(--muted);
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 500;
    transition: color .22s, gap .22s;
    position: relative;
    overflow: hidden;
  }

  .social-link:first-of-type {
    border-top: 1px solid var(--line);
  }

  .social-link svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .social-link:hover {
    color: var(--text);
    gap: 16px;
  }

  .social-link-arrow {
    margin-left: auto;
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity .22s, transform .22s;
    font-size: 12px;
    color: var(--accent);
  }

  .social-link:hover .social-link-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  .form-shell {
    display: grid;
    gap: 14px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .field label {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.25);
  }

  .field input,
  .field textarea {
    width: 100%;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.92rem;
    padding: 13px 15px;
    outline: none;
    transition: border-color .22s, background .22s, box-shadow .22s;
  }

  .field textarea {
    min-height: 110px;
    resize: vertical;
  }

  .field input::placeholder,
  .field textarea::placeholder {
    color: rgba(148, 163, 184, 0.4);
  }

  .field input:focus,
  .field textarea:focus {
    border-color: rgba(99, 179, 237, 0.35);
    background: rgba(99, 179, 237, 0.03);
    box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.07);
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .captcha-row {
    display: grid;
    grid-template-columns: 96px 1fr 44px;
    gap: 10px;
    align-items: end;
  }

  .captcha-box {
    height: 46px;
    border-radius: 12px;
    border: 1px solid rgba(99, 179, 237, 0.15);
    background: rgba(99, 179, 237, 0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--accent-2);
    user-select: none;
  }

  .refresh-btn {
    height: 46px;
    width: 44px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color .22s, border-color .22s, transform .22s;
  }

  .refresh-btn:hover {
    color: var(--accent);
    border-color: rgba(99, 179, 237, 0.28);
    transform: rotate(90deg);
  }

  .refresh-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.9;
    stroke-linecap: round;
  }

  .form-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-top: 2px;
  }

  .status {
    font-size: 0.85rem;
    color: var(--muted);
    min-height: 20px;
  }

  .status.error {
    color: #f87171;
  }

  .status.success {
    color: #86efac;
  }

  .send-btn {
    border: none;
    cursor: pointer;
    border-radius: 12px;
    padding: 12px 24px;
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: #0f172a;
    background: linear-gradient(135deg, var(--accent-2), var(--accent));
    transition: opacity .22s, transform .22s, box-shadow .22s;
    white-space: nowrap;
  }

  .send-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(99, 179, 237, 0.22);
  }

  .send-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .contact-bottom-rule {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--line-2) 20%, var(--line-2) 80%, transparent);
    margin-top: 64px;
  }

  @media (max-width: 760px) {
    .contact-head {
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
    }

    .head-right {
      align-items: flex-start;
    }

    .head-desc {
      text-align: left;
    }

    .contact-body {
      grid-template-columns: 1fr;
      gap: 40px;
    }

    .links-col {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 0;
    }

    .social-link {
      flex: 1 1 46%;
      min-width: 140px;
      border-top: 1px solid var(--line);
    }

    .field-row {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 480px) {
    .captcha-row {
      grid-template-columns: 84px 1fr 40px;
    }

    .form-foot {
      flex-direction: column;
      align-items: stretch;
    }

    .send-btn {
      text-align: center;
    }
  }
</style>

<div class="contact-wrap" id="contact">
  <div class="contact-head">
    <div>
      <div class="eyebrow"><span class="eyebrow-dot"></span>Contact</div>
      <h2 class="contact-title">Let's talk about<br><span>better products.</span></h2>
    </div>

    <div class="head-right">
      <p class="head-desc">
        Seeking PM opportunities where I can build user-focused products and grow through real-world challenges.
      </p>
      <span class="avail-badge"><span class="avail-dot"></span>Open to PM roles</span>
    </div>
  </div>

  <div class="contact-body">
    <div class="links-col">
      <div class="links-label">Reach out</div>

      <a class="social-link" href="mailto:tashinparvez2002@gmail.com" aria-label="Email">
        <svg viewBox="0 0 24 24">
          <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5v-11Z" />
          <path d="m5 7 7 5 7-5" />
        </svg>
        Email
        <span class="social-link-arrow">↗</span>
      </a>

      <a class="social-link" href="https://www.linkedin.com/in/tashinparvez" target="_blank" rel="noopener" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-6a2 2 0 1 0-4 0v6h-4v-6a6 6 0 0 1 6-6Z" />
          <rect x="2" y="9" width="4" height="12" rx="1" />
          <circle cx="4" cy="4" r="2" />
        </svg>
        LinkedIn
        <span class="social-link-arrow">↗</span>
      </a>

      <a class="social-link" href="https://github.com/TashinParvez" target="_blank" rel="noopener" aria-label="GitHub">
        <svg viewBox="0 0 24 24">
          <path d="M9 19c-4.3 1.4-4.3-2.4-6-3m12 6v-3.5a3 3 0 0 0-.88-2.12c2.94-.33 6.03-1.44 6.03-6.53A5.1 5.1 0 0 0 18.8 6.3 4.75 4.75 0 0 0 18.72 3S17.65 2.67 15 4.48a13.38 13.38 0 0 0-6 0C6.35 2.67 5.28 3 5.28 3A4.75 4.75 0 0 0 5.2 6.3 5.1 5.1 0 0 0 3.85 9.85c0 5.05 3.05 6.2 5.99 6.53A3 3 0 0 0 9 18.5V22" />
        </svg>
        GitHub
        <span class="social-link-arrow">↗</span>
      </a>

      <a class="social-link" href="tel:+8801954449226" aria-label="Phone">
        <svg viewBox="0 0 24 24">
          <path d="M8 11a7 7 0 0 0 5 5l1.7-1.7a1 1 0 0 1 1-.24 11.2 11.2 0 0 0 3.52.56 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.38a1 1 0 0 1 1 1 11.2 11.2 0 0 0 .56 3.52 1 1 0 0 1-.24 1L7 10.2" />
        </svg>
        Phone
        <span class="social-link-arrow">↗</span>
      </a>
    </div>

    <form class="form-shell" id="contactForm" novalidate>
      <div class="field-row">
        <div class="field">
          <label for="contact-name">Name</label>
          <input type="text" id="contact-name" placeholder="Your name" required />
        </div>

        <div class="field">
          <label for="contact-email">Email</label>
          <input type="email" id="contact-email" placeholder="your@email.com" required />
        </div>
      </div>

      <div class="field">
        <label for="contact-message">Message</label>
        <textarea id="contact-message" placeholder="Write your message..." required></textarea>
      </div>

      <div class="field">
        <label for="captchaInput">Verify</label>
        <div class="captcha-row">
          <div class="captcha-box" id="captchaValue">0000</div>
          <input
            type="text"
            id="captchaInput"
            placeholder="Enter the number"
            inputmode="numeric"
            autocomplete="off"
            required
          />
          <button type="button" class="refresh-btn" id="refreshCaptcha" aria-label="Refresh">
            <svg viewBox="0 0 24 24">
              <path d="M20 11a8 8 0 0 0-14.9-3M4 13a8 8 0 0 0 14.9 3" />
              <path d="M3 4v5h5M21 20v-5h-5" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-foot">
        <div class="status" id="formStatus" aria-live="polite"></div>
        <button type="submit" class="send-btn" id="sendBtn">Send Message</button>
      </div>
    </form>
  </div>

  <div class="contact-bottom-rule"></div>
</div>

<script>
  (() => {
    const root = document.getElementById('contact');
    if (!root) return;

    const form = root.querySelector('#contactForm');
    const captchaEl = root.querySelector('#captchaValue');
    const captchaInput = root.querySelector('#captchaInput');
    const refreshBtn = root.querySelector('#refreshCaptcha');
    const statusEl = root.querySelector('#formStatus');
    const sendBtn = root.querySelector('#sendBtn');
    const nameInput = root.querySelector('#contact-name');
    const emailInput = root.querySelector('#contact-email');
    const messageInput = root.querySelector('#contact-message');

    let current = '';

    function gen() {
      current = String(Math.floor(1000 + Math.random() * 9000));
      captchaEl.textContent = current;
      captchaInput.value = '';
    }

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    refreshBtn.addEventListener('click', gen);

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      setStatus('');

      const name = nameInput.value.trim();
      const email = emailInput.value.trim();
      const message = messageInput.value.trim();
      const cap = captchaInput.value.trim();

      if (!name || !email || !message || !cap) {
        setStatus('Please fill all fields.', 'error');
        return;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setStatus('Enter a valid email.', 'error');
        return;
      }

      if (cap !== current) {
        setStatus('Captcha did not match.', 'error');
        gen();
        captchaInput.focus();
        return;
      }

      sendBtn.disabled = true;
      setStatus('Opening mail app…', 'success');

      const sub = encodeURIComponent(`Portfolio Contact | ${name}`);
      const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\nMessage:\n${message}`);

      window.location.href = `mailto:tashinparvez2002@gmail.com?subject=${sub}&body=${body}`;

      setTimeout(() => {
        form.reset();
        gen();
        sendBtn.disabled = false;
        setStatus('');
      }, 800);
    });

    gen();
  })();
</script>
