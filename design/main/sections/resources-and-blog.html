<style>

        border: 1px solid rgba(255, 255, 255, 0.05);

    }

    .resources-banner::after {

        text-shadow: 0 0 24px rgba(99, 179, 237, 0.18);
    }

    .resources-text {
        max-width: 660px;
        font-size: 1rem;
        line-height: 1.85;
        color: #96a6b8;
        letter-spacing: 0.01em;
    }

    .resources-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: center;
        align-items: center;
        margin-top: 4px;
    }

    .resource-btn {
        appearance: none;
        border: none;
        outline: none;
        text-decoration: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-width: 196px;
        padding: 15px 22px;
        border-radius: 18px;
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        transition:
            transform .28s ease,
            border-color .28s ease,
            background .28s ease,
            box-shadow .28s ease;
    }

    .resource-btn-primary {
        color: #07111c;
        background: linear-gradient(135deg, #8fd0ff 0%, #63b3ed 45%, #4d9fe8 100%);
        box-shadow: 0 18px 40px rgba(99, 179, 237, 0.16);
    }

    .resource-btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 22px 42px rgba(99, 179, 237, 0.22);
    }

    .resource-btn-secondary {
        color: #f5f8fc;

    .resource-btn svg {

        flex-shrink: 0;
    }

    @media (max-width: 560px) {

        }

        .resources-actions {
