<script>
    (() => {
        const achievements = [
            {
                closedTitle: "Champion - UIU CSE Project Show Spring '23",
                closedSubtitle: "UIU CSE Project Show by Department of CSE, UIU, Dhaka, Bangladesh",
                projectName: "Kairos",
                projectDetails: "Ranked 1st among 71 teams in the DBMS Lab Project and also won the DBMS Poster Presentation through strong execution, technical clarity, and presentation quality.",
                category: "DBMS Lab Project",

            },
            {
                closedTitle: "1st Runner-Up - System Analysis & Design Project Show",
                closedSubtitle: "UIU CSE Project Show Summer '23 by Department of CSE, UIU, Dhaka, Bangladesh",
                projectName: "DirectEdge",
                projectDetails: "A streamlined academic project recognized for strong execution, polished delivery, and well-structured system analysis across the full project workflow.",
                category: "DBMS Lab Project",
                team: "Team Kairos",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=1200&q=80",
                tag: "1st Runner-Up",
                projectLink: "https://github.com/TashinParvez/direct-edge",
                recognitionLink: "https://cse.uiu.ac.bd/projects/software-engineering-laboratory/?rank=1st-runner-up"
            },
            {
                closedTitle: "2nd Runner-Up - UIU CSE Project Show Spring '23",
                closedSubtitle: "UIU CSE Project Show by Department of CSE, UIU, Dhaka, Bangladesh",
                projectName: "Wayout",
                projectDetails: "A tour planning project recognized for thoughtful implementation, clean experience design, and a polished academic presentation.",
                category: "AOOP Lab Project",
                team: "Team Wayout",
                image: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80",
                tag: "2nd Runner-Up",
                projectLink: "https://github.com/TashinParvez/Wayout-The-Ultimate-Tour-Planner",
                recognitionLink: ""
            },
            {
                closedTitle: "Champion - DBMS Poster Presentation",
                closedSubtitle: "UIU CSE Project Show by Department of CSE, UIU, Dhaka, Bangladesh",
                projectName: "DBMS Poster",
                projectDetails: "Awarded for clear technical communication, visual structure, and strong presentation of database concepts in a concise format.",
                category: "Poster Presentation",
                team: "Team Kairos",
                image: "https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&w=1200&q=80",
                tag: "Champion",
                projectLink: "",
                recognitionLink: ""
            },
            {
                closedTitle: "Scholarship - Academic Excellence",
                closedSubtitle: "United International University, Dhaka, Bangladesh",
                projectName: "Academic Scholarships",
                projectDetails: "Received merit-based scholarships across multiple semesters for sustained academic performance and consistency in coursework.",
                category: "Academic Achievement",
                team: "UIU",
                image: "https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=1200&q=80",
                tag: "Scholarship",
                projectLink: "",
                recognitionLink: ""
            }
        ];

        const initialVisibleCount = 3;
        const list = document.getElementById("achievementList");
        const moreBtn = document.getElementById("moreBtn");

        if (!list || !moreBtn || list.dataset.loaded === "true") return;
        list.dataset.loaded = "true";

        function escapeHtml(text = "") {
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function getCategoryIcon() {
            return `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h11A2.5 2.5 0 0 1 20 7.5v9A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-9Z"></path>
                    <path d="M8 9h8"></path>
                    <path d="M8 13h5"></path>
                </svg>
            `;
        }

        function getTeamIcon() {
            return `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9.5" cy="7" r="3"></circle>
                    <path d="M20 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M14 4.13a4 4 0 0 1 0 7.75"></path>
                </svg>
            `;
        }

        function getAchievementIcon(tag = "") {
            const trophy = `<svg viewBox="0 0 24 24" class="ach-medal-icon"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v4a5 5 0 0 1-10 0V4z"/><path d="M17 6h2a2 2 0 0 1-2 5"/><path d="M7 6H5a2 2 0 0 0 2 5"/></svg>`;
            const medal = `<svg viewBox="0 0 24 24" class="ach-medal-icon"><circle cx="12" cy="14" r="6"/><path d="M8 8.7V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v4.7"/><path d="M12 11v3l1.5 1.5"/></svg>`;
            const award = `<svg viewBox="0 0 24 24" class="ach-medal-icon"><circle cx="12" cy="8" r="5"/><path d="M8.56 14.44L7 22l5-3 5 3-1.56-7.56"/></svg>`;

            const value = String(tag).toLowerCase();

            if (value.includes("champion") || value.includes("gold")) {
                return { icon: trophy, type: "gold" };
            }
            if (value.includes("1st") || value.includes("silver")) {
                return { icon: medal, type: "silver" };
            }
            return { icon: award, type: "bronze" };
        }

        function getActionButtons(item) {
            const buttons = [];

            if (item.projectLink) {
                buttons.push(`
                    <a class="action-btn primary" href="${item.projectLink}" target="_blank" rel="noopener noreferrer">
                        <span>View Project</span>
                        <span>↗</span>
                    </a>
                `);
            }

            if (item.recognitionLink) {
                buttons.push(`
                    <a class="action-btn" href="${item.recognitionLink}" target="_blank" rel="noopener noreferrer">
                        <span>Recognition</span>
                        <span>↗</span>
                    </a>
                `);
            }

            return buttons.join("");
        }

        function createCard(item, index) {
            const article = document.createElement("article");
            const achievementIcon = getAchievementIcon(item.tag);

            article.className = `achievement-card ${achievementIcon.type} ${index >= initialVisibleCount ? "hidden" : ""}`;

            article.innerHTML = `
                <button class="achievement-trigger" type="button" aria-expanded="false">
                    <div class="achievement-head">
                        <div class="achievement-badge ${achievementIcon.type}">
                            ${achievementIcon.icon}
                        </div>

                        <div class="achievement-main">
                            <h2 class="achievement-title">${escapeHtml(item.closedTitle)}</h2>
                            <p class="achievement-subtitle">${escapeHtml(item.closedSubtitle)}</p>
                        </div>
                    </div>

                    <div class="achievement-toggle">↓</div>
                </button>

                <div class="achievement-body">
                    <div class="achievement-body-inner">
                        <div class="achievement-content">
                            <div class="achievement-shell">
                                <div class="detail-panel">
                                    <div>
                                        <h3 class="project-name">${escapeHtml(item.projectName)}</h3>
                                        <p class="project-details">${escapeHtml(item.projectDetails)}</p>

                                        <div class="meta-row">
                                            <div class="meta-pill">
                                                <span class="meta-icon">${getCategoryIcon()}</span>
                                                <span>${escapeHtml(item.category)}</span>
                                            </div>
                                            <div class="meta-pill">
                                                <span class="meta-icon">${getTeamIcon()}</span>
                                                <span>${escapeHtml(item.team)}</span>
                                            </div>
                                        </div>
                                    </div>

                                    ${getActionButtons(item) ? `<div class="action-row">${getActionButtons(item)}</div>` : ""}
                                </div>

                                <div class="image-panel" style="background:
                                    linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.36)),
                                    url('${item.image}') center/cover no-repeat;">
                                    <div class="image-overlay">
                                        <div class="image-copy">
                                            <div class="image-label">Project</div>
                                            <div class="image-title">${escapeHtml(item.projectName)}</div>
                                        </div>
                                        <div class="image-chip">${escapeHtml(item.tag)}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            return article;
        }

        achievements.forEach((item, index) => {
            list.appendChild(createCard(item, index));
        });

        const cards = [...list.querySelectorAll(".achievement-card")];

        function closeOthers(activeCard) {
            cards.forEach((card) => {
                const trigger = card.querySelector(".achievement-trigger");
                if (card !== activeCard) {
                    card.classList.remove("open");
                    trigger.setAttribute("aria-expanded", "false");
                }
            });
        }

        cards.forEach((card) => {
            const trigger = card.querySelector(".achievement-trigger");

            trigger.addEventListener("click", () => {
                const isOpen = card.classList.contains("open");
                closeOthers(card);

                if (isOpen) {
                    card.classList.remove("open");
                    trigger.setAttribute("aria-expanded", "false");
                } else {
                    card.classList.add("open");
                    trigger.setAttribute("aria-expanded", "true");
                }
            });
        });

        let expandedList = false;

        moreBtn.addEventListener("click", () => {
            expandedList = !expandedList;

            cards.forEach((card, index) => {
                if (index >= initialVisibleCount) {
                    if (expandedList) {
                        card.classList.remove("hidden");
                    } else {
                        card.classList.add("hidden");
                        card.classList.remove("open");
                        card.querySelector(".achievement-trigger").setAttribute("aria-expanded", "false");
                    }
                }
            });

            moreBtn.classList.toggle("expanded", expandedList);
            moreBtn.setAttribute("aria-expanded", expandedList ? "true" : "false");
            moreBtn.querySelector(".label").textContent = expandedList ? "Show Less" : "More";
        });
    })();
</script>
