<style>
    :root {
        --footer-text: #f3f4f6;
        --footer-muted: #9ca3af;
        --footer-line: rgba(255, 255, 255, 0.12);
        --footer-card: rgba(255, 255, 255, 0.05);
        --footer-accent: #8b5cf6;
        --footer-accent-2: #60a5fa;
    }

    .portfolio-footer *,
    .portfolio-footer *::before,
    .portfolio-footer *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .portfolio-footer {
        position: relative;
        overflow: hidden;
        background:
            radial-gradient(circle at top left, rgba(139, 92, 246, 0.18), transparent 30%),
            radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.14), transparent 28%),
            linear-gradient(135deg, #050509 0%, #090914 55%, #06060a 100%);
        padding: 90px 8% 34px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        color: var(--footer-text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
            Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
        width: 100%;
    }

    .portfolio-footer::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(rgba(255, 255, 255, 0.14) 1px, transparent 1px);
        background-size: 42px 42px;
        opacity: 0.08;
        pointer-events: none;
    }

    .portfolio-footer .footer-wrapper {
        position: relative;
        z-index: 1;
        max-width: 1320px;
        margin: 0 auto;
    }

    .portfolio-footer .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 32px;
        padding-bottom: 42px;
        border-bottom: 1px solid var(--footer-line);
    }

    .portfolio-footer .footer-left {
        flex: 1;
    }

    .portfolio-footer .footer-left h2 {
        font-size: clamp(2.3rem, 5vw, 5rem);
        line-height: 0.98;
        font-weight: 800;
        letter-spacing: -0.05em;
        margin-bottom: 14px;
        max-width: 760px;
        color: var(--footer-text);
    }

    .portfolio-footer .footer-left p {
        max-width: 620px;
        font-size: 1.02rem;
        line-height: 1.9;
        color: var(--footer-muted);
    }

    .portfolio-footer .footer-right {
        display: grid;
        gap: 14px;
        justify-content: flex-end;
    }

    .portfolio-footer .footer-socials {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
    }

    .portfolio-footer .contact-pill,
    .portfolio-footer .social-link {
        height: 56px;
        border-radius: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: var(--footer-text);
        border: 1px solid var(--footer-line);
        background: var(--footer-card);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition: 0.3s ease;
    }

    .portfolio-footer .contact-pill {
        padding: 0 22px;
        gap: 10px;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        max-width: 100%;
        overflow-wrap: anywhere;
    }

    .portfolio-footer .contact-pill i {
        font-size: 1.1rem;
        color: #d8b4fe;
    }

    .portfolio-footer .social-link {
        width: 56px;
        font-size: 1.28rem;
    }

    .portfolio-footer .contact-pill:hover,
    .portfolio-footer .social-link:hover {
        transform: translateY(-4px);
        border-color: rgba(139, 92, 246, 0.45);
        background: rgba(139, 92, 246, 0.14);
        box-shadow: 0 12px 30px rgba(139, 92, 246, 0.16);
    }

    .portfolio-footer .footer-bottom {
        padding-top: 28px;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 26px;
        flex-wrap: wrap;
    }

    .portfolio-footer .footer-meta {
        display: flex;
        align-items: center;
        gap: 28px;
        flex-wrap: wrap;
    }

    .portfolio-footer .metric-group {
        display: flex;
        gap: 22px;
        flex-wrap: wrap;
    }

    .portfolio-footer .metric {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .portfolio-footer .metric-value {
        font-size: 1.5rem;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.04em;
        color: #fff;
    }

    .portfolio-footer .metric-label {
        font-size: 0.92rem;
        color: var(--footer-muted);
        line-height: 1.4;
    }

    .portfolio-footer .footer-divider {
        width: 1px;
        height: 52px;
        background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.22), transparent);
        align-self: center;
    }

    .portfolio-footer .footer-copy {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .portfolio-footer .footer-copy .name-line {
        font-weight: 700;
        font-size: 1.4rem;
        letter-spacing: -0.03em;
    }

    .portfolio-footer .footer-copy .copyright {
        color: var(--footer-muted);
    }

    .portfolio-footer .footer-copy .name {
        color: #fff;
    }

    .portfolio-footer .footer-copy .tag-line {
        font-size: 0.98rem;
        color: var(--footer-muted);
        line-height: 1.6;
    }

    .portfolio-footer .keep-building {
        font-size: clamp(2.8rem, 8vw, 7rem);
        font-weight: 900;
        letter-spacing: -0.05em;
        line-height: 0.95;
        white-space: nowrap;
        color: transparent;
        -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.25);
    }

    @media (max-width: 980px) {
        .portfolio-footer .footer-top {
            flex-direction: column;
            align-items: flex-start;
        }

        .portfolio-footer .footer-right {
            justify-content: flex-start;
            width: 100%;
        }

        .portfolio-footer .footer-bottom {
            flex-direction: column;
            align-items: flex-start;
        }

        .portfolio-footer .keep-building {
            white-space: normal;
        }
    }

    @media (max-width: 640px) {
        .portfolio-footer {
            padding: 72px 6% 28px;
        }

        .portfolio-footer .footer-socials {
            gap: 12px;
        }

        .portfolio-footer .contact-pill {
            width: 100%;
            justify-content: center;
        }

        .portfolio-footer .social-link {
            width: 52px;
            height: 52px;
        }

        .portfolio-footer .metric-group {
            gap: 18px;
        }

        .portfolio-footer .metric-value {
            font-size: 1.3rem;
        }

        .portfolio-footer .footer-divider {
            display: none;
        }
    }
</style>

<link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />

<footer class="portfolio-footer">
    <div class="footer-wrapper">
        <div class="footer-top">
            <div class="footer-left">
                <h2>Let’s build something together</h2>
                <p>
                    Open to meaningful collaborations, ambitious ideas, and products that deserve
                    clean design and solid frontend execution.
                </p>
            </div>

            <div class="footer-right">
                <a class="contact-pill" href="mailto:tashinparvez2002@gmail.com">
                    <i class="ri-mail-line"></i>
                    <span>tashinparvez2002@gmail.com</span>
                </a>

                <div class="footer-socials">
                    <a class="social-link" href="https://github.com/TashinParvez" target="_blank"
                        rel="noopener noreferrer" aria-label="GitHub">
                        <i class="ri-github-fill"></i>
                    </a>

                    <a class="social-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">

        <div class="footer-bottom">
            <div class="footer-meta">
                <div class="metric-group">
                    <div class="metric">
                        <div class="metric-value" id="footerTotalStars">--</div>
                        <div class="metric-label">Stars</div>

                    <div class="metric">
                        <div class="metric-value" id="footerTotalForks">--</div>
                        <div class="metric-label">Forks</div>

                <div class="footer-divider" aria-hidden="true"></div>

                <div class="footer-copy">

                        <span class="copyright">© 2026 </span><span class="name">Tashin Parvez</span>

            <div class="keep-building">Keep_Building()</div>

</footer>

<script>
    (function () {
        const username = "TashinParvez";
        const totalStarsEl = document.getElementById("footerTotalStars");
        const totalForksEl = document.getElementById("footerTotalForks");

        function formatNumber(num) {
            if (num === null || num === undefined || Number.isNaN(num)) return "--";
            return new Intl.NumberFormat("en", {
                notation: num > 999 ? "compact" : "standard",
                maximumFractionDigits: 1
            }).format(num);
        }

        async function fetchAllRepos(user) {
            let page = 1;
            let repos = [];
            let hasMore = true;

            while (hasMore) {
                const res = await fetch(`https://api.github.com/users/${user}/repos?per_page=100&page=${page}`);
                if (!res.ok) throw new Error("Failed to fetch repositories");

                const data = await res.json();
                repos = repos.concat(data);

                if (data.length < 100) {
                    hasMore = false;
                } else {
                    page++;
                }
            }

            return repos;
        }

        async function getGitHubStats() {
            if (!totalStarsEl || !totalForksEl) return;

            try {
                const repos = await fetchAllRepos(username);
                const totalStars = repos.reduce((sum, repo) => sum + (repo.stargazers_count || 0), 0);
                const totalForks = repos.reduce((sum, repo) => sum + (repo.forks_count || 0), 0);

                totalStarsEl.textContent = formatNumber(totalStars);
                totalForksEl.textContent = formatNumber(totalForks);
            } catch (error) {
                totalStarsEl.textContent = "N/A";
                totalForksEl.textContent = "N/A";
                console.error("GitHub stats error:", error);
            }
        }

        getGitHubStats();
    })();
</script>
