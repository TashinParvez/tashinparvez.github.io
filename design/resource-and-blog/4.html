<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxury Resources Banner</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #070707;
            --bg-2: #0f0d0a;
            --surface: rgba(255, 255, 255, 0.035);
            --surface-2: rgba(212, 175, 55, 0.06);
            --border: rgba(212, 175, 55, 0.16);
            --border-soft: rgba(255, 255, 255, 0.07);
            --gold: #d4af37;
            --gold-soft: #f3df9b;
            --text-1: #f8f4ec;
            --text-2: #d9d1c3;
            --text-3: #a79d8c;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top center, rgba(212, 175, 55, 0.08), transparent 30%),
                linear-gradient(180deg, #050505 0%, #0b0907 100%);
            color: var(--text-1);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
            pointer-events: none;
            opacity: 0.18;
            z-index: 0;
        }

        .resources-banner {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 72px clamp(22px, 5vw, 70px);
            background:
                linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)),
                radial-gradient(circle at top right, rgba(212, 175, 55, 0.09), transparent 25%),
                radial-gradient(circle at bottom left, rgba(255,255,255,0.03), transparent 30%),
                var(--surface);
            border-top: 1px solid var(--border-soft);
            border-bottom: 1px solid var(--border-soft);
            overflow: hidden;
        }

        .resources-banner::before {
            content: '';
            position: absolute;
            inset: 16px;
            border: 1px solid rgba(212, 175, 55, 0.14);
            border-radius: 28px;
            pointer-events: none;
        }

        .resources-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(115deg,
                    transparent 20%,
                    rgba(255, 255, 255, 0.04) 48%,
                    transparent 72%);
            opacity: 0.35;
            pointer-events: none;
        }

        .banner-inner {
            width: 100%;
            max-width: 980px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 26px;
            text-align: center;
            padding: 24px 12px;
        }

        .eyebrow {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold-soft);
            padding: 8px 14px;
            border: 1px solid rgba(212, 175, 55, 0.18);
            border-radius: 999px;
            background: rgba(212, 175, 55, 0.05);
        }

        .title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.6rem, 5vw, 4.7rem);
            line-height: 0.96;
            letter-spacing: -0.03em;
            font-weight: 600;
            max-width: 780px;
            color: var(--text-1);
            text-wrap: balance;
        }

        .title span {
            font-style: italic;
            color: var(--gold-soft);
            text-shadow: 0 0 18px rgba(212, 175, 55, 0.12);
        }

        .text {
            max-width: 680px;
            font-size: 1.02rem;
            line-height: 1.9;
            color: var(--text-3);
            letter-spacing: 0.01em;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            align-items: center;
            margin-top: 8px;
        }

        .btn {
            appearance: none;
            border: none;
            outline: none;
            text-decoration: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 210px;
            padding: 16px 24px;
            border-radius: 999px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            transition: transform .28s ease, box-shadow .28s ease, border-color .28s ease, background .28s ease;
            box-shadow: var(--shadow);
        }

        .btn-primary {
            color: #15120a;
            background: linear-gradient(135deg, #f3df9b 0%, #d4af37 45%, #b89225 100%);
            box-shadow:
                0 14px 34px rgba(0, 0, 0, 0.35),
                0 8px 30px rgba(212, 175, 55, 0.18);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.45),
                0 10px 36px rgba(212, 175, 55, 0.24);
        }

        .btn-secondary {
            color: var(--text-1);
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(212, 175, 55, 0.16);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            background: rgba(212, 175, 55, 0.06);
            border-color: rgba(243, 223, 155, 0.32);
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.42),
                0 8px 26px rgba(212, 175, 55, 0.08);
        }

        .btn-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        @media (max-width: 560px) {
            .resources-banner {
                padding: 42px 16px;
            }

            .resources-banner::before {
                inset: 10px;
                border-radius: 22px;
            }

            .actions {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
                min-width: 0;
            }

            .title {
                font-size: clamp(2.2rem, 10vw, 3.2rem);
            }
        }
    </style>
</head>

<body>
    <section class="resources-banner" aria-labelledby="resources-title">
        <div class="banner-inner">
            <div class="eyebrow">Curated Resources</div>

            <h2 class="title" id="resources-title">
                Crafted to <span>share what matters.</span>
            </h2>

            <p class="text">
                A considered collection of notes, materials, and writings designed with clarity,
                depth, and quiet elegance for those who value refined learning.
            </p>

            <div class="actions">
                <a class="btn btn-primary" href="sections/study-materials.html">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M7 6.5C7 5.67157 7.67157 5 8.5 5H18C18.5523 5 19 5.44772 19 6V17.5C19 18.3284 18.3284 19 17.5 19H8.5C7.67157 19 7 18.3284 7 17.5V6.5Z"
                            stroke="currentColor" stroke-width="1.7" />
                        <path d="M7 7C6.17157 7 5.5 7.67157 5.5 8.5V17C5.5 18.3807 6.61929 19.5 8 19.5H17"
                            stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                        <path d="M10 9H16M10 12H16M10 15H14" stroke="currentColor" stroke-width="1.7"
                            stroke-linecap="round" />
                    </svg>
                    Study Materials
                </a>

                <a class="btn btn-secondary" href="sections/blogs.html">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M7 5.5H17C18.1046 5.5 19 6.39543 19 7.5V16.5C19 17.6046 18.1046 18.5 17 18.5H7C5.89543 18.5 5 17.6046 5 16.5V7.5C5 6.39543 5.89543 5.5 7 5.5Z"
                            stroke="currentColor" stroke-width="1.7" />
                        <path d="M8.5 9H15.5M8.5 12H15.5M8.5 15H12.5" stroke="currentColor" stroke-width="1.7"
                            stroke-linecap="round" />
                    </svg>
                    Writings / Blogs
                </a>
            </div>
        </div>
    </section>
</body>

</html>
