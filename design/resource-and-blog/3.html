<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Minimal Resources Banner</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #080b10;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-2: rgba(99, 179, 237, 0.05);
            --border: rgba(255, 255, 255, 0.07);
            --border-strong: rgba(99, 179, 237, 0.18);
            --accent: #63b3ed;
            --accent-2: #3b82f6;
            --text-1: #f1f5f9;
            --text-2: #cbd5e1;
            --text-3: #94a3b8;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: -180px;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 420px;
            background: radial-gradient(ellipse, rgba(99, 179, 237, 0.06) 0%, transparent 72%);
            pointer-events: none;
            z-index: 0;
        }

        .resources-banner {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 56px clamp(20px, 4vw, 56px);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01)),
                radial-gradient(circle at top right, rgba(99, 179, 237, 0.09), transparent 28%),
                radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.07), transparent 30%),
                var(--surface);
            backdrop-filter: blur(14px);
            overflow: hidden;
        }

        .resources-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 30%, rgba(99, 179, 237, 0.045) 50%, transparent 70%);
            opacity: 0;
            transition: opacity .45s ease;
            pointer-events: none;
        }

        .resources-banner:hover::before {
            opacity: 1;
        }

        .banner-inner {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            text-align: center;
        }

        .eyebrow {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 4vw, 3.4rem);
            line-height: 1.02;
            letter-spacing: -0.045em;
            font-weight: 700;
            max-width: 720px;
        }

        .title span {
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text {
            max-width: 640px;
            font-size: 0.98rem;
            line-height: 1.75;
            color: var(--text-3);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            align-items: center;
        }

        .btn {
            appearance: none;
            border: none;
            outline: none;
            text-decoration: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 190px;
            padding: 15px 22px;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.94rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            transition: transform .28s ease, border-color .28s ease, background .28s ease, box-shadow .28s ease;
        }

        .btn-primary {
            color: #07111c;
            background: linear-gradient(135deg, var(--accent), #8cc9f5);
            box-shadow: 0 12px 30px rgba(99, 179, 237, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 34px rgba(99, 179, 237, 0.24);
        }

        .btn-secondary {
            color: var(--text-1);
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            border-color: var(--border-strong);
            background: var(--surface-2);
        }

        .btn-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        @media (max-width: 560px) {
            .resources-banner {
                padding: 34px 16px;
            }

            .actions {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
                min-width: 0;
            }
        }
    </style>
</head>

<body>
    <section class="resources-banner" aria-labelledby="resources-title">
        <div class="banner-inner">
            <div class="eyebrow">Resources</div>

            <h2 class="title" id="resources-title">
                Built to <span>share what helps.</span>
            </h2>

            <p class="text">
                Notes, materials, and writings shaped by a habit of learning clearly and making it useful for others.
            </p>

            <div class="actions">
                <a class="btn btn-primary" href="sections/study-materials.html">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M7 6.5C7 5.67157 7.67157 5 8.5 5H18C18.5523 5 19 5.44772 19 6V17.5C19 18.3284 18.3284 19 17.5 19H8.5C7.67157 19 7 18.3284 7 17.5V6.5Z"
                            stroke="currentColor" stroke-width="1.7" />
                        <path d="M7 7C6.17157 7 5.5 7.67157 5.5 8.5V17C5.5 18.3807 6.61929 19.5 8 19.5H17"
                            stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
                        <path d="M10 9H16M10 12H16M10 15H14" stroke="currentColor" stroke-width="1.7"
                            stroke-linecap="round" />
                    </svg>
                    Study Materials
                </a>

                <a class="btn btn-secondary" href="sections/blogs.html">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M7 5.5H17C18.1046 5.5 19 6.39543 19 7.5V16.5C19 17.6046 18.1046 18.5 17 18.5H7C5.89543 18.5 5 17.6046 5 16.5V7.5C5 6.39543 5.89543 5.5 7 5.5Z"
                            stroke="currentColor" stroke-width="1.7" />
                        <path d="M8.5 9H15.5M8.5 12H15.5M8.5 15H12.5" stroke="currentColor" stroke-width="1.7"
                            stroke-linecap="round" />
                    </svg>
                    Writings / Blogs
                </a>
            </div>
        </div>
    </section>

    <script>
        document.querySelectorAll('.btn').forEach((btn) => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                btn.style.backgroundImage = `
                    radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.12), transparent 45%),
                    ${btn.classList.contains('btn-primary')
                        ? 'linear-gradient(135deg, #63b3ed, #8cc9f5)'
                        : 'linear-gradient(135deg, rgba(255,255,255,0.025), rgba(255,255,255,0.025))'}
                `;
            });

            btn.addEventListener('mouseleave', () => {
                btn.style.backgroundImage = btn.classList.contains('btn-primary')
                    ? 'linear-gradient(135deg, #63b3ed, #8cc9f5)'
                    : 'linear-gradient(135deg, rgba(255,255,255,0.025), rgba(255,255,255,0.025))';
            });
        });
    </script>
</body>

</html>
