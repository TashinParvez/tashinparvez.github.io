<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Contributions Section</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #020508;
            --bg-2: #071018;
            --panel: rgba(255, 255, 255, 0.03);
            --panel-2: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.12);
            --text: #f3f7fb;
            --muted: #8c99a6;
            --muted-2: #6f7b86;
            --green: #22c55e;
            --blue: #38bdf8;
            --shadow:
                0 20px 60px rgba(0, 0, 0, 0.45),
                0 0 0 1px rgba(255, 255, 255, 0.02);
            --radius: 28px;
            --container: 1180px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 10%, rgba(34, 197, 94, 0.08), transparent 22%),
                radial-gradient(circle at 90% 0%, rgba(56, 189, 248, 0.10), transparent 24%),
                linear-gradient(180deg, #010305 0%, #05080d 45%, #020508 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.28;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        .section {
            padding: 100px 22px;
            position: relative;
        }

        .container {
            max-width: var(--container);
            margin: 0 auto;
        }

        .header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 40px;
            align-items: end;
            margin-bottom: 34px;
        }

        .eyebrow {
            color: #cdd7df;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .title {
            margin: 0;
            font-size: clamp(2.3rem, 5.2vw, 4.8rem);
            line-height: 0.96;
            font-weight: 900;
            letter-spacing: -0.07em;
        }

        .subtitle {
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.75;
            max-width: 42ch;
        }

        .stats {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .stat {
            min-width: 150px;
            padding: 18px 18px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
        }

        .stat-value {
            font-size: 2rem;
            line-height: 1;
            font-weight: 900;
            letter-spacing: -0.07em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #c7f9d8 45%, #a7ecff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-label {
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .graph-card {
            position: relative;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.018)),
                linear-gradient(180deg, rgba(7, 16, 24, 0.95), rgba(3, 8, 12, 0.96));
            box-shadow:
                0 24px 70px rgba(0, 0, 0, 0.45),
                0 0 50px rgba(56, 189, 248, 0.05),
                0 0 50px rgba(34, 197, 94, 0.04);
            overflow: hidden;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .graph-card::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at top left, rgba(34, 197, 94, 0.08), transparent 22%),
                radial-gradient(circle at top right, rgba(56, 189, 248, 0.08), transparent 24%);
        }

        .graph-top-line {
            height: 1px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(34, 197, 94, 0.35) 20%,
                    rgba(56, 189, 248, 0.35) 80%,
                    transparent 100%);
        }

        .graph-inner {
            padding: 26px 26px 22px;
            position: relative;
            z-index: 1;
        }

        .months {
            display: grid;
            grid-template-columns: 56px repeat(12, 1fr);
            gap: 0;
            margin-bottom: 16px;
            color: var(--muted-2);
            font-size: 0.84rem;
            user-select: none;
        }

        .months span {
            white-space: nowrap;
        }

        .months .spacer {
            opacity: 0;
        }

        .graph-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 4px;
        }

        .graph-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .graph-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
        }

        .calendar {
            min-width: 860px;
            display: grid;
            grid-template-columns: 56px auto;
            gap: 14px;
            align-items: start;
        }

        .days {
            display: grid;
            grid-template-rows: repeat(7, 12px);
            gap: 5px;
            padding-top: 2px;
            color: var(--muted-2);
            font-size: 0.82rem;
            user-select: none;
        }

        .days span {
            display: flex;
            align-items: center;
            height: 12px;
        }

        .heatmap-wrap {
            position: relative;
            padding: 14px;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.015)),
                rgba(0, 0, 0, 0.18);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.03),
                inset 0 0 30px rgba(56, 189, 248, 0.02);
        }

        .heatmap-wrap::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 22px;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 35%),
                radial-gradient(circle at 20% 0%, rgba(34, 197, 94, 0.08), transparent 22%),
                radial-gradient(circle at 80% 0%, rgba(56, 189, 248, 0.08), transparent 24%);
        }

        .heatmap {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(53, 10px);
            grid-template-rows: repeat(7, 10px);
            gap: 4px;
        }

        .cell {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .cell:hover {
            transform: scale(1.12);
        }

        .l0 {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.02);
        }

        .l1 {
            background: rgba(34, 197, 94, 0.18);
            border-color: rgba(34, 197, 94, 0.20);
        }

        .l2 {
            background: rgba(34, 197, 94, 0.42);
            border-color: rgba(34, 197, 94, 0.34);
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.08);
        }

        .l3 {
            background: rgba(56, 189, 248, 0.58);
            border-color: rgba(56, 189, 248, 0.36);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.12);
        }

        .l4 {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.92), rgba(56, 189, 248, 0.95));
            border-color: rgba(125, 229, 255, 0.35);
            box-shadow:
                0 0 14px rgba(56, 189, 248, 0.16),
                0 0 12px rgba(34, 197, 94, 0.12);
        }

        .graph-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .legend {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .legend-scale {
            display: inline-flex;
            gap: 6px;
            align-items: center;
        }

        .legend-scale span {
            width: 11px;
            height: 11px;
            border-radius: 3px;
            display: block;
        }

        .legend-scale span:nth-child(1) {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .legend-scale span:nth-child(2) {
            background: rgba(34, 197, 94, 0.18);
            border: 1px solid rgba(34, 197, 94, 0.16);
        }

        .legend-scale span:nth-child(3) {
            background: rgba(34, 197, 94, 0.42);
            border: 1px solid rgba(34, 197, 94, 0.24);
        }

        .legend-scale span:nth-child(4) {
            background: rgba(56, 189, 248, 0.58);
            border: 1px solid rgba(56, 189, 248, 0.24);
        }

        .legend-scale span:nth-child(5) {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.92), rgba(56, 189, 248, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .profile-link {
            color: #d9f4ff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(56, 189, 248, 0.22);
            padding-bottom: 2px;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .profile-link:hover {
            color: #ffffff;
            border-color: rgba(34, 197, 94, 0.35);
        }

        @media (max-width: 980px) {
            .header {
                grid-template-columns: 1fr;
                align-items: start;
            }

            .stats {
                justify-content: flex-start;
            }
        }

        @media (max-width: 640px) {
            .section {
                padding: 76px 16px;
            }

            .graph-inner {
                padding: 20px 18px 18px;
            }

            .stat {
                min-width: calc(50% - 9px);
            }

            .months {
                font-size: 0.78rem;
            }
        }

        @media (max-width: 460px) {
            .stat {
                min-width: 100%;
            }
        }
    </style>
</head>

<body>
    <section class="section">
        <div class="container">
            <div class="header">
                <div>
                    <div class="eyebrow">Open Source</div>
                    <h2 class="title">GitHub Contributions</h2>
                    <p class="subtitle">Building in public, contributing to the community</p>
                </div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-value">2,237+</div>
                        <div class="stat-label">Contributions</div>
                    </div>

                    <div class="stat">
                        <div class="stat-value">85+</div>
                        <div class="stat-label">Repositories</div>
                    </div>

                    <div class="stat">
                        <div class="stat-value">88</div>
                        <div class="stat-label">Followers</div>
                    </div>
                </div>
            </div>

            <div class="graph-card">
                <div class="graph-top-line"></div>

                <div class="graph-inner">
                    <div class="months">
                        <span class="spacer">.</span>
                        <span>May</span>
                        <span>Jun</span>
                        <span>Jul</span>
                        <span>Aug</span>
                        <span>Sep</span>
                        <span>Oct</span>
                        <span>Nov</span>
                        <span>Dec</span>
                        <span>Jan</span>
                        <span>Feb</span>
                        <span>Mar</span>
                        <span>Apr</span>
                    </div>

                    <div class="graph-scroll">
                        <div class="calendar">
                            <div class="days">
                                <span></span>
                                <span>Mon</span>
                                <span></span>
                                <span>Wed</span>
                                <span></span>
                                <span>Fri</span>
                                <span></span>
                            </div>

                            <div class="heatmap-wrap">
                                <div class="heatmap" id="heatmap"></div>
                            </div>
                        </div>
                    </div>

                    <div class="graph-footer">
                        <div class="legend">
                            <span>Less</span>
                            <div class="legend-scale">
                                <span></span>
                                <span></span>
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                            <span>More</span>
                        </div>

                        <a class="profile-link" href="https://github.com/TashinParvez" target="_blank"
                            rel="noopener noreferrer">
                            View full profile on GitHub
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const heatmap = document.getElementById("heatmap");
        const username = "TashinParvez";
        const totalCells = 53 * 7;

        function seededRandom(seedText) {
            let seed = 0;
            for (let i = 0; i < seedText.length; i++) {
                seed = (seed * 31 + seedText.charCodeAt(i)) % 2147483647;
            }
            return function () {
                seed = (seed * 48271) % 2147483647;
                return seed / 2147483647;
            };
        }

        const rand = seededRandom(username);

        for (let week = 0; week < 53; week++) {
            for (let day = 0; day < 7; day++) {
                const cell = document.createElement("span");
                cell.className = "cell";

                const seasonA = (Math.sin((week / 53) * Math.PI * 2 - 0.8) + 1) / 2;
                const seasonB = (Math.cos((week / 53) * Math.PI * 3 + 0.4) + 1) / 2;
                const weekdayBoost = day === 1 || day === 2 || day === 3 ? 0.12 : 0.02;
                const intensity = rand() * 0.55 + seasonA * 0.22 + seasonB * 0.11 + weekdayBoost;

                let level = 0;
                if (intensity > 0.84) level = 4;
                else if (intensity > 0.64) level = 3;
                else if (intensity > 0.42) level = 2;
                else if (intensity > 0.24) level = 1;

                if (rand() < 0.12) level = 0;
                if (week > 47 && rand() > 0.72) level = Math.min(4, level + 1);

                cell.classList.add(`l${level}`);
                heatmap.appendChild(cell);
            }
        }
    </script>
</body>

</html>
