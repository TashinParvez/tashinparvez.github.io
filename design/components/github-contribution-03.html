<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Contributions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <style>
    :root{
      --bg:#030608;
      --bg-soft:#071018;
      --panel:rgba(255,255,255,0.03);
      --panel-2:rgba(255,255,255,0.02);
      --border:rgba(255,255,255,0.08);
      --border-strong:rgba(255,255,255,0.12);
      --text:#f5f7fb;
      --muted:#91a0ad;
      --muted-2:#73808c;
      --green:#22c55e;
      --blue:#38bdf8;
      --shadow:0 24px 80px rgba(0,0,0,0.45);
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:18px;
      --max-width:1160px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(34,197,94,0.10), transparent 22%),
        radial-gradient(circle at 88% 8%, rgba(56,189,248,0.10), transparent 24%),
        linear-gradient(180deg, #020406 0%, #04080d 100%);
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.22;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size:32px 32px;
      mask-image:radial-gradient(circle at center, black 42%, transparent 100%);
    }

    .section{
      padding:96px 22px;
    }

    .container{
      max-width:var(--max-width);
      margin:0 auto;
    }

    .header{
      margin-bottom:28px;
    }

    .eyebrow{
      color:#d4dde6;
      font-size:12px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      margin-bottom:14px;
    }

    .title{
      font-size:clamp(2.2rem, 5vw, 4.3rem);
      line-height:.96;
      letter-spacing:-.06em;
      font-weight:900;
      margin-bottom:10px;
    }

    .subtitle{
      color:var(--muted);
      font-size:1rem;
      line-height:1.7;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:16px;
      margin:34px 0 28px;
    }

    .stat{
      background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.02));
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:22px 20px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
    }

    .stat:hover{
      transform:translateY(-4px);
      border-color:rgba(56,189,248,.18);
      box-shadow:
        0 24px 80px rgba(0,0,0,.48),
        0 0 24px rgba(56,189,248,.06);
    }

    .stat-number{
      font-size:clamp(2rem, 4vw, 3rem);
      line-height:1;
      font-weight:900;
      letter-spacing:-.07em;
      margin-bottom:8px;
      background:linear-gradient(135deg, #ffffff 0%, #bdf7d1 45%, #a7ebff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .stat-label{
      color:var(--muted);
      font-size:.94rem;
      line-height:1.55;
    }

    .graph-card{
      position:relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015)),
        linear-gradient(180deg, rgba(5,10,14,.96), rgba(4,8,12,.97));
      border:1px solid var(--border);
      border-radius:var(--radius-xl);
      overflow:hidden;
      box-shadow:
        0 28px 90px rgba(0,0,0,.48),
        0 0 40px rgba(34,197,94,.04),
        0 0 50px rgba(56,189,248,.05);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    .graph-card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 0% 0%, rgba(34,197,94,.10), transparent 24%),
        radial-gradient(circle at 100% 0%, rgba(56,189,248,.10), transparent 24%);
    }

    .graph-card::after{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:1px;
      background:linear-gradient(
        90deg,
        transparent 0%,
        rgba(34,197,94,.45) 18%,
        rgba(56,189,248,.45) 82%,
        transparent 100%
      );
    }

    .graph-inner{
      position:relative;
      z-index:1;
      padding:26px 26px 22px;
    }

    .months{
      display:grid;
      grid-template-columns:56px repeat(12, minmax(36px, 1fr));
      gap:0;
      color:var(--muted-2);
      font-size:.82rem;
      margin-bottom:16px;
      user-select:none;
    }

    .months .pad{
      opacity:0;
    }

    .calendar-row{
      display:grid;
      grid-template-columns:56px 1fr;
      gap:14px;
      align-items:start;
    }

    .days{
      display:grid;
      grid-template-rows:repeat(7, 12px);
      gap:6px;
      color:var(--muted-2);
      font-size:.82rem;
      user-select:none;
      padding-top:10px;
    }

    .days span{
      height:12px;
      display:flex;
      align-items:center;
    }

    .graph-shell{
      position:relative;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.07);
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.012)),
        rgba(0,0,0,.18);
      padding:18px;
      overflow:hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        inset 0 0 40px rgba(56,189,248,.02);
    }

    .graph-shell::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius:22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 40%),
        radial-gradient(circle at 20% 0%, rgba(34,197,94,.08), transparent 20%),
        radial-gradient(circle at 80% 0%, rgba(56,189,248,.08), transparent 20%);
    }

    .graph-shell::after{
      content:"";
      position:absolute;
      inset:auto 0 0 0;
      height:80px;
      pointer-events:none;
      background:linear-gradient(to top, rgba(2,6,8,.28), transparent);
    }

    .graph-image{
      position:relative;
      z-index:1;
      display:block;
      width:100%;
      max-width:100%;
      height:auto;
      filter:
        saturate(1.05)
        contrast(1.05)
        drop-shadow(0 14px 36px rgba(0,0,0,.28));
      opacity:.98;
    }

    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .legend{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:.9rem;
    }

    .legend-scale{
      display:inline-flex;
      gap:6px;
      align-items:center;
    }

    .legend-scale span{
      width:11px;
      height:11px;
      border-radius:3px;
      display:block;
      border:1px solid rgba(255,255,255,.05);
    }

    .legend-scale span:nth-child(1){ background:rgba(255,255,255,.03); }
    .legend-scale span:nth-child(2){ background:rgba(34,197,94,.18); }
    .legend-scale span:nth-child(3){ background:rgba(34,197,94,.38); }
    .legend-scale span:nth-child(4){ background:rgba(56,189,248,.56); }
    .legend-scale span:nth-child(5){
      background:linear-gradient(135deg, rgba(34,197,94,.95), rgba(56,189,248,.95));
      border-color:rgba(255,255,255,.10);
    }

    .profile-link{
      color:#d9f5ff;
      text-decoration:none;
      font-size:.95rem;
      font-weight:600;
      border-bottom:1px solid rgba(56,189,248,.22);
      padding-bottom:2px;
      transition:color .2s ease, border-color .2s ease;
    }

    .profile-link:hover{
      color:#fff;
      border-color:rgba(34,197,94,.35);
    }

    @media (max-width: 860px){
      .stats{
        grid-template-columns:1fr;
      }

      .months{
        font-size:.76rem;
        min-width:760px;
      }

      .calendar-scroll{
        overflow-x:auto;
        padding-bottom:4px;
      }

      .calendar-scroll::-webkit-scrollbar{
        height:8px;
      }

      .calendar-scroll::-webkit-scrollbar-thumb{
        background:rgba(255,255,255,.08);
        border-radius:999px;
      }

      .calendar-fixed{
        min-width:860px;
      }
    }

    @media (max-width: 640px){
      .section{
        padding:78px 16px;
      }

      .graph-inner{
        padding:20px 18px 18px;
      }
    }
  </style>
</head>
<body>
  <section class="section">
    <div class="container">

      <div class="header">
        <div class="eyebrow">Open Source</div>
        <h2 class="title">GitHub Contributions</h2>
        <p class="subtitle">Building in public, contributing to the community</p>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-number">581+</div>
          <div class="stat-label">Contributions</div>
        </div>

        <div class="stat">
          <div class="stat-number">62+</div>
          <div class="stat-label">Repositories</div>
        </div>

        <div class="stat">
          <div class="stat-number">93</div>
          <div class="stat-label">Followers</div>
        </div>
      </div>

      <div class="graph-card">
        <div class="graph-inner">
          <div class="calendar-scroll">
            <div class="calendar-fixed">
              <div class="months">
                <span class="pad">.</span>
                <span>May</span>
                <span>Jun</span>
                <span>Jul</span>
                <span>Aug</span>
                <span>Sep</span>
                <span>Oct</span>
                <span>Nov</span>
                <span>Dec</span>
                <span>Jan</span>
                <span>Feb</span>
                <span>Mar</span>
                <span>Apr</span>
              </div>

              <div class="calendar-row">
                <div class="days">
                  <span></span>
                  <span>Mon</span>
                  <span></span>
                  <span>Wed</span>
                  <span></span>
                  <span>Fri</span>
                  <span></span>
                </div>

                <div class="graph-shell">
                  <img
                    class="graph-image"
                    src="https://ghchart.rshah.org/22c55e/TashinParvez"
                    alt="GitHub contribution graph for TashinParvez"
                  />
                </div>
              </div>
            </div>
          </div>

          <div class="footer">
            <div class="legend">
              <span>Less</span>
              <div class="legend-scale">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
              </div>
              <span>More</span>
            </div>

            <a
              class="profile-link"
              href="https://github.com/TashinParvez"
              target="_blank"
              rel="noopener noreferrer"
            >
              View full profile on GitHub
            </a>
          </div>
        </div>
      </div>

    </div>
  </section>
</body>
</html>
