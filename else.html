<nav id="navbar" class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm">
    <div class="container">
        <!-- Logo -->
        <a class="navbar-brand" href="#">
            <img src="assets/icons/logo.svg" alt="Tashin Parvez Logo" class="logo-img" style="height: 50px; width: auto;">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto nav-box">
                <li class="nav-item"><a class="nav-link" href="#hero">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
                <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
                <li class="nav-item"><a class="nav-link" href="#blog">Blog</a></li>
                <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
            </ul>
        </div>
        <div class="d-flex align-items-center ms-3 theme-toggle">
            <button id="theme-toggle" class="btn btn-outline-secondary">🌙</button>
        </div>
    </div>
</nav>

<script>
    // Highlight active section based on scroll
    window.addEventListener('scroll', () => {
        const sections = document.querySelectorAll('section');
        const navLinks = document.querySelectorAll('.nav-link');
        const navbar = document.getElementById('navbar');

        sections.forEach(section => {
            const sectionTop = section.offsetTop - 60;
            const sectionBottom = sectionTop + section.offsetHeight;
            const scrollPosition = window.scrollY;

            if (scrollPosition >= sectionTop && scrollPosition < sectionBottom) {
                navLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href').substring(1) === section.getAttribute('id')) {
                        link.classList.add('active');
                    }
                });
            }
        });

        // Add background on scroll
        if (window.scrollY > 50) {
            navbar.style.backgroundColor = 'rgba(255, 255, 255, 0.9)';
        } else {
            navbar.style.backgroundColor = 'transparent';
        }
    });

    // Hover effect with duplicate and scroll
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
        item.addEventListener('mouseenter', () => {
            // Add box shadow on hover
            item.querySelector('.nav-link').style.boxShadow = '0 0 10px rgba(0, 0, 0, 0.3)';

            // Create duplicate
            const duplicate = document.createElement('li');
            duplicate.classList.add('nav-item', 'duplicate');
            duplicate.innerHTML = item.innerHTML;
            item.parentNode.appendChild(duplicate);

            // Animate duplicate sliding down
            let pos = 0;
            const interval = setInterval(() => {
                if (pos === 20) clearInterval(interval);
                duplicate.style.transform = `translateY(${pos}px)`;
                pos++;
            }, 10);
        });

        item.addEventListener('mouseleave', () => {
            const duplicate = item.parentNode.querySelector('.duplicate');
            if (duplicate) {
                // Animate duplicate sliding back up
                let pos = 20;
                const interval = setInterval(() => {
                    if (pos <= 0) {
                        clearInterval(interval);
                        duplicate.remove();
                    }
                    duplicate.style.transform = `translateY(${pos}px)`;
                    pos--;
                }, 10);
            }
            item.querySelector('.nav-link').style.boxShadow = 'none';
        });
    });
</script>

<style>
    .navbar {
        padding: 10px 20px;
        transition: background-color 0.3s;
    }

    .navbar-brand {
        margin-right: 0; /* Ensure logo stays left */
    }

    .nav-box {
        display: flex;
        justify-content: center;
        background-color: transparent;
        padding: 10px 20px;
        border: 1px solid transparent;
        border-radius: 5px;
        transition: background-color 0.3s, border-color 0.3s;
    }

    .nav-link {
        margin: 0 15px;
        color: #212529;
        transition: color 0.3s, box-shadow 0.3s;
    }

    .nav-link.active {
        color: black;
        font-weight: bold;
    }

    .theme-toggle {
        margin-left: auto; /* Push to the right */
    }

    .duplicate {
        position: absolute;
        color: #212529;
        transition: transform 0.3s;
    }

    /* Ensure content underneath isn't blurred */
    .navbar::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: inherit;
        z-index: -1;
    }
</style>
