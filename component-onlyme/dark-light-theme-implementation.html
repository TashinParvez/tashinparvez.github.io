<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Theme Toggle Page</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Light mode is default */
        body {
            transition: background-color 0.3s, color 0.3s;
            background-color: #f8f9fa;
            color: #212529;
        }

        /* Dark mode styles */
        body.dark-mode {
            background-color: #121212;
            color: #f8f9fa;
        }

        .navbar.dark-mode {
            background-color: #1f1f1f !important;
        }

        .btn-outline-secondary.dark-mode {
            border-color: #f8f9fa;
            color: #f8f9fa;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light px-4">
        <a class="navbar-brand" href="#">MyPage</a>
        <div class="ms-auto">
            <button id="theme-toggle" class="btn btn-outline-secondary">Toggle Theme</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5 text-center">
        <h1>Welcome to My Simple Page</h1>
        <p>This page demonstrates a dark/light mode toggle using JavaScript and localStorage.</p>
        <button class="btn btn-primary mt-3">Click Me</button>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>


    <script>
        const toggle = document.getElementById('theme-toggle');

        // Apply saved theme on load
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            toggle.classList.add('dark-mode');
        }

        // Toggle dark mode
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            toggle.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

    </script>
</body>

</html>
